---
# Promote one cert_targets entry into the variable names used by lifecycle
# tasks. This keeps CSR, Venafi, Vault, and OpenShift tasks simple.

# Purpose: Load the selected queue manager facts for this target.
- name: "Target context - Set current queue manager facts"
  ansible.builtin.set_fact:
    app_sys_id: "{{ cert_target.app_sys_id }}"
    app_prefix: "{{ cert_target.app_prefix }}"
    app_prefix_normalized: "{{ cert_target.app_prefix }}"
    mq_environment: "{{ cert_target.environment }}"
    env_upper: "{{ cert_target.environment }}"
    env_lower: "{{ cert_target.environment | lower }}"
    env_code: "{{ cert_target.env_code }}"
    env_ns_code: "{{ cert_target.env_ns_code }}"
    qmgr_name: "{{ cert_target.qmgr_name }}"
    qmgr_name_upper: "{{ cert_target.qmgr_name_upper }}"
    namespace: "{{ cert_target.namespace }}"
    namespace_source: "{{ cert_target.namespace_source | default('derived') }}"
    sequence_number: "{{ cert_target.sequence_number }}"
    instance_type: "{{ cert_target.instance_type }}"
    active_cert_types: "{{ cert_target.cert_profile }}"
    target_regions: "{{ cert_target.target_regions }}"
    cluster_domains: "{{ cert_target.cluster_domains }}"
    openshift_targets: "{{ cert_target.openshift_targets }}"
    _zone: "{{ cert_target.zone }}"
    vault_namespace: "{{ cert_target.vault_namespace }}"
    vault_cert_mount_point: "{{ cert_target.vault_cert_mount_point }}"
    vault_cert_base_path: "{{ cert_target.vault_cert_base_path }}"
    vault_client_trust_shared_path: "{{ cert_target.vault_client_trust_shared_path | default(mq_client_trust_vault_shared_path | default(cert_target.app_prefix ~ '/ibm-mq/shared')) }}"
    cert_delivery_backend_effective: "{{ cert_target.delivery_backend }}"
  no_log: true

# Purpose: Print the queue manager currently being processed.
- name: "Target context - Show current queue manager"
  ansible.builtin.debug:
    msg:
      - "Queue Manager : {{ qmgr_name | upper }}"
      - "Namespace     : {{ namespace }}"
      - "Namespace Src : {{ namespace_source }}"
      - "Environment   : {{ env_upper }}"
      - "Instance Type : {{ instance_type }}"
      - "Backend       : {{ cert_delivery_backend_effective }}"
      - "Regions       : {{ target_regions | join(', ') }}"
