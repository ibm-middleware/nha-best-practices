---
#  read_registry.yaml - Read Certificate Registry from Git
#
#  PURPOSE:
#    Clones the repo and reads the cert_inventory.yaml into
#    an Ansible fact for use by cert_monitor.
#
#  INPUTS FROM certs_control_vars.yaml:
#    cert_git_base_url, cert_registry_git_branch, cert_git_work_dir,
#    cert_registry_path
#
#  OUTPUT:
#    cert_registry - dict keyed by qmgr_name with cert metadata
#

# Purpose: Ensure the required output directory exists before writing files.
- name: "Registry Read - Create temporary working directory"
  ansible.builtin.tempfile:
    state: directory
    path: "{{ cert_git_work_dir | dirname }}"
    prefix: "{{ cert_git_work_dir | basename }}-"
  register: _cert_git_work_dir_temp

# Purpose: Store the temporary checkout path.
- name: "Registry Read - Set working directory fact"
  ansible.builtin.set_fact:
    _cert_git_work_dir: "{{ _cert_git_work_dir_temp.path }}"

# Purpose: Clone the certificate registry branch so inventory can be read or updated.
- name: "Registry Read - Clone repo ({{ cert_registry_git_branch }} branch)"  # noqa name[template]
  ansible.builtin.git:
    repo: "{{ cert_git_base_url }}"
    dest: "{{ _cert_git_work_dir }}"
    version: "{{ cert_registry_git_branch }}"
    force: true
    accept_hostkey: "{{ git_accept_hostkey | default(true) | bool }}"
    ssh_opts: "{{ git_ssh_options | default(omit) }}"

# Purpose: Read Git state so the workflow can enforce allowed-file rules.
- name: "Registry Read - List tracked files"
  ansible.builtin.command:
    argv: ["git", "ls-files"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  register: _registry_tracked_files
  changed_when: false

# Purpose: Stop if the registry branch contains files outside certificate inventory.
- name: "Registry Read - Validate state-only branch"
  ansible.builtin.assert:
    that:
      - (_registry_tracked_files.stdout_lines | difference([cert_registry_path])) | length == 0
    fail_msg: |-
      Certificate registry branch {{ cert_registry_git_branch }} must contain only:
      {{ cert_registry_path }}

      Unexpected tracked file(s):
      {{ _registry_tracked_files.stdout_lines | difference([cert_registry_path]) }}

      Registry state is controlled by CERT_REGISTRY_GIT_BRANCH, defaulting to
      state/cert-registry. CERT_GIT_BRANCH is ignored because it is commonly
      used for the AAP/project source branch.

      Use scripts/bootstrap_cert_registry_branch.sh to create the dedicated
      orphan state branch, then rerun the certificate job.
    quiet: true

# Purpose: Check whether certificate inventory already exists on the registry branch.
- name: "Registry Read - Check if inventory file exists"
  ansible.builtin.stat:
    path: "{{ _cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_file

# Purpose: Stop when registry does not exist.
- name: "Registry Read - Fail if registry does not exist"
  ansible.builtin.fail:
    msg: >-
      Certificate registry not found at {{ cert_registry_path }}.
      Initialize the dedicated {{ cert_registry_git_branch }} state branch with
      scripts/bootstrap_cert_registry_branch.sh, or run an onboard action after
      the state-only branch exists.
  when: not _registry_file.stat.exists

# Purpose: Read certificate inventory before deciding what must change.
- name: "Registry Read - Read inventory file"
  ansible.builtin.slurp:
    src: "{{ _cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_raw

# Purpose: Parse inventory into structured values.
- name: "Registry Read - Parse inventory"
  ansible.builtin.set_fact:
    # Only the top-level certificates map is exposed to caller tasks.
    cert_registry: >-
      {{ (_registry_raw.content | b64decode | from_yaml).certificates | default({}) }}

# Purpose: Show how many queue managers were loaded from certificate inventory.
- name: "Registry Read - Loaded {{ cert_registry | length }} queue manager(s)"  # noqa name[template]
  ansible.builtin.debug:
    msg: "Registry contains {{ cert_registry | length }} queue manager(s): {{ cert_registry.keys() | list | join(', ') | default('none') }}"

# Purpose: Remove the temporary certificate registry checkout.
- name: "Registry Read - Cleanup working directory"
  ansible.builtin.file:
    path: "{{ _cert_git_work_dir }}"
    state: absent
