---
# Resolve qmgr targets from the minimal NativeHA certificate inputs:
# app_sys_id, mq_environment, and optional qmgr_name.
# Blank qmgr_name means all queue managers in the registry for the app/env.

# Purpose: Check operator inputs before starting certificate shared logic changes.
- name: "Target resolve - Validate required inputs"
  ansible.builtin.assert:
    that:
      - app_sys_id | default('', true) | trim | length > 0
      - mq_environment | default('', true) | trim | length > 0
    fail_msg: >-
      Required inputs: app_sys_id and mq_environment. qmgr_name is optional;
      when supplied it may be one queue manager, a comma-separated list, or all.
    quiet: true

# Purpose: Trim and standardize operator input before validation.
- name: "Target resolve - Normalize input values"
  ansible.builtin.set_fact:
    app_prefix: "{{ app_sys_id | lower | trim }}"
    app_prefix_normalized: "{{ app_sys_id | lower | trim }}"
    env_upper: "{{ mq_environment | upper | trim }}"
    env_lower: "{{ mq_environment | lower | trim }}"
    qmgr_selector_raw: "{{ qmgr_name | default('all', true) | string | lower | trim }}"
    cert_delivery_backend_effective: "{{ mq_cert_delivery_backend | default('openshift_secret') | lower }}"
    custom_openshift_namespace_effective: "{{ custom_openshift_namespace | default('', true) | string | trim }}"
    custom_openshift_namespace_enabled: "{{ custom_openshift_namespace | default('', true) | string | trim | length > 0 }}"

# Purpose: Confirm namespace access before reading or writing OpenShift Secrets.
- name: "Target resolve - Validate optional custom OpenShift namespace"
  ansible.builtin.assert:
    that:
      - custom_openshift_namespace_effective | length <= 63
      - custom_openshift_namespace_effective is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
    fail_msg: |-
      custom_openshift_namespace is invalid.

      Received: {{ custom_openshift_namespace_effective }}

      It must be a Kubernetes/OpenShift namespace name: lowercase letters,
      digits, hyphens, start and end with a letter or digit, and no more than
      63 characters.

      No certificate changes were made.
    quiet: true
  when: custom_openshift_namespace_enabled | bool

# Purpose: Confirm naming maps and certificate maps contain the selected environment.
- name: "Target resolve - Validate shared configuration"
  ansible.builtin.assert:
    that:
      - app_prefix is match('^[a-z0-9]{3}$')
      - env_upper in env_qmgr_abbr
      - env_upper in env_namespace_abbr
      - env_upper in env_instance_type_map
      - env_upper in env_region_map
      - cert_delivery_backend_effective in ['openshift_secret', 'vault']
      - env_region_map[env_upper] | length > 0
    fail_msg: >-
      app_sys_id={{ app_sys_id | default('undefined') }} or
      mq_environment={{ mq_environment | default('undefined') }} is invalid, or
      NativeHA global vars are missing env_qmgr_abbr/env_namespace_abbr/
      env_instance_type_map/env_region_map/mq_cert_delivery_backend entries.
    quiet: true

# Purpose: Derive environment defaults from approved naming rules.
- name: "Target resolve - Derive environment defaults"
  ansible.builtin.set_fact:
    env_code: "{{ env_qmgr_abbr[env_upper] | lower }}"
    env_ns_code: "{{ env_namespace_abbr[env_upper] | lower }}"
    instance_type: "{{ env_instance_type_map[env_upper] }}"
    target_regions: "{{ env_region_map[env_upper] }}"
    qmgr_select_all: "{{ qmgr_selector_raw == 'all' }}"
    qmgr_requested_list: >-
      {{
        []
        if qmgr_selector_raw == 'all'
        else (qmgr_selector_raw.split(',')
              | map('trim')
              | reject('equalto', '')
              | unique
              | list)
      }}

# Purpose: Confirm the selected queue manager type has a certificate profile.
- name: "Target resolve - Validate instance type"
  ansible.builtin.assert:
    that:
      - instance_type in instance_cert_map
      - instance_cert_map[instance_type] | length > 0
    fail_msg: >-
      env_instance_type_map[{{ env_upper }}]={{ instance_type }} is not valid.
      Expected one of {{ instance_cert_map.keys() | list }}.
    quiet: true

# Purpose: Confirm OpenShift cluster definitions exist for the selected regions.
- name: "Target resolve - Validate OpenShift cluster config"
  ansible.builtin.assert:
    that:
      - cert_region in regions
      - env_upper in openshift_clusters
      - cert_region in openshift_clusters[env_upper]
      - openshift_clusters[env_upper][cert_region].api_url | default('', true) | length > 0
      - openshift_clusters[env_upper][cert_region].cluster_domain | default('', true) | length > 0
      - openshift_clusters[env_upper][cert_region].token_env | default('', true) | length > 0
    fail_msg: >-
      OpenShift cluster metadata is missing for environment={{ env_upper }},
      region={{ cert_region }}. Configure openshift_clusters in
      nativeha_qmgr_control_vars.yaml.
    quiet: true
  loop: "{{ target_regions }}"
  loop_control:
    loop_var: cert_region

# Purpose: Read certificate inventory before deciding what must change.
- name: "Target resolve - Read registry for all selector"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/read_registry.yaml"
  when:
    - qmgr_select_all | bool
    - cert_registry_enabled | default(false) | bool

# Purpose: Start clean tracking data for this part of the workflow.
- name: "Target resolve - Initialize all-selector list"
  ansible.builtin.set_fact:
    qmgr_requested_list: []
  when: qmgr_select_all | bool

# Purpose: Use certificate inventory to expand the all queue manager scope.
- name: "Target resolve - Select queue managers from registry"
  ansible.builtin.set_fact:
    qmgr_requested_list: "{{ qmgr_requested_list + [item.key | lower] }}"
  loop: "{{ cert_registry | default({}) | dict2items }}"
  when:
    - qmgr_select_all | bool
    - cert_registry_enabled | default(false) | bool
    - item.value.app_sys_id | default(item.value.app_prefix | default('')) | lower == app_prefix
    - item.value.environment | default('') | upper == env_upper

# Purpose: Sort selected queue managers so output is stable.
- name: "Target resolve - Sort all-selector targets"
  ansible.builtin.set_fact:
    qmgr_requested_list: "{{ qmgr_requested_list | unique | sort | list }}"
  when: qmgr_select_all | bool

# Purpose: Stop if the requested certificate scope produced no queue managers.
- name: "Target resolve - Validate selector produced targets"
  ansible.builtin.assert:
    that:
      - qmgr_requested_list | length > 0
    fail_msg: >-
      No queue managers matched app_sys_id={{ app_prefix }},
      mq_environment={{ env_upper }}, qmgr_name={{ qmgr_selector_raw }}.
      When the optional cert registry is disabled, qmgr_name=all cannot be
      expanded safely without querying external systems. Provide one queue
      manager or a comma-separated list, or set NATIVEHA_CERT_REGISTRY_ENABLED=true
      and keep the registry populated.
    quiet: true

# Purpose: Start clean tracking data for this part of the workflow.
- name: "Target resolve - Initialize queue manager environment code lookup"
  ansible.builtin.set_fact:
    _qmgr_env_by_code: {}

# Purpose: Prepare queue manager environment code lookup.
- name: "Target resolve - Build queue manager environment code lookup"
  ansible.builtin.set_fact:
    _qmgr_env_by_code: "{{ _qmgr_env_by_code | combine({(item.value | lower): item.key}) }}"
  loop: "{{ env_qmgr_abbr | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

# Purpose: Start an empty list so all validation problems can be reported together.
- name: "Target resolve - Initialize queue manager name validation"
  ansible.builtin.set_fact:
    _qmgr_expected_prefix: "{{ app_prefix }}{{ env_code }}"
    _qmgr_expected_example: "{{ app_prefix }}{{ env_code }}001"
    _qmgr_name_validation_failures: []

# Purpose: Add a validation message for invalid queue manager names.
- name: "Target resolve - Record invalid queue manager names"
  ansible.builtin.set_fact:
    _qmgr_name_validation_failures: >-
      {{
        _qmgr_name_validation_failures + [
          {
            'qmgr_name': item | upper,
            'detected_app': ((item[0:3] | upper) if (item | length >= 3) else 'unknown'),
            'detected_code': ((item[3:5] | upper) if (item | length >= 5) else 'unknown'),
            'detected_env': (_qmgr_env_by_code[item[3:5] | lower] | default('unknown')),
            'sequence_valid': ((item[5:] is match('^[0-9]{3}$')) if (item | length >= 5) else false)
          }
        ]
      }}
  loop: "{{ qmgr_requested_list }}"
  loop_control:
    label: "{{ item | upper }}"
  when: item is not match('^' ~ app_prefix ~ env_code ~ '[0-9]{3}$')

# Purpose: Check generated names before they are used in Kubernetes or Git paths.
- name: "Target resolve - Validate queue manager names"
  ansible.builtin.assert:
    that:
      - _qmgr_name_validation_failures | length == 0
    fail_msg: |-
      The queue manager name in this request does not match the selected application/environment.

      Request received:
      - app_sys_id: {{ app_prefix | upper }}
      - mq_environment: {{ env_upper }}
      - qmgr_name: {{ qmgr_requested_list | map('upper') | join(', ') }}

      For {{ env_upper }}, queue manager names must start with
      {{ _qmgr_expected_prefix | upper }} and end with a 3-digit number, for
      example {{ _qmgr_expected_example | upper }}.

      Invalid value(s):
      {% for invalid_qmgr in _qmgr_name_validation_failures %}
      - {{ invalid_qmgr.qmgr_name }}
      {% if invalid_qmgr.detected_app != app_prefix | upper %}
        Reason: it uses application code {{ invalid_qmgr.detected_app }} instead of {{ app_prefix | upper }}.
      {% endif %}
      {% if invalid_qmgr.detected_env != 'unknown' and invalid_qmgr.detected_env != env_upper %}
        Reason: it uses environment code {{ invalid_qmgr.detected_code }},
        which belongs to {{ invalid_qmgr.detected_env }}, but this request is
        for {{ env_upper }}.
      {% elif invalid_qmgr.detected_env == 'unknown' %}
        Reason: its environment code {{ invalid_qmgr.detected_code }} is not recognized.
      {% endif %}
      {% if not invalid_qmgr.sequence_valid %}
        Reason: it must end with exactly 3 digits.
      {% endif %}
      {% endfor %}

      No certificate changes were made. Please rerun with a {{ env_upper }}
      queue manager such as {{ _qmgr_expected_example | upper }}, or change
      mq_environment to the environment that matches the queue manager name.
    quiet: true

# Purpose: Build the normalized target list used by certificate roles.
- name: "Target resolve - Build target list"
  ansible.builtin.set_fact:
    cert_targets: []

# Purpose: Add one normalized queue manager target to the work list.
- name: "Target resolve - Add queue manager target"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/build_target.yaml"
  loop: "{{ qmgr_requested_list }}"
  loop_control:
    loop_var: cert_target_qmgr_name
    label: "{{ cert_target_qmgr_name }}"

# Purpose: Prepare the certificate shared logic result shown to the operator.
- name: "Target resolve - Summary"
  ansible.builtin.debug:
    msg:
      - "Application ID : {{ app_prefix | upper }}"
      - "Environment    : {{ env_upper }}"
      - "Instance Type  : {{ instance_type }}"
      - "Backend        : {{ cert_delivery_backend_effective }}"
      - "Regions        : {{ target_regions | join(', ') }}"
      - "Namespace      : {{ custom_openshift_namespace_effective if custom_openshift_namespace_enabled | bool else 'derived per queue manager' }}"
      - "Queue Managers : {{ cert_targets | map(attribute='qmgr_name') | map('upper') | join(', ') }}"
