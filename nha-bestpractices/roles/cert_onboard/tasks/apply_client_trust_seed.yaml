---
# Create or update deterministic QueueManager client/signer trust material.
# OpenShift-secret mode writes the Kubernetes Secret directly. Vault mode writes
# public CA material to the app shared Vault path for VSO sync. GitOps stores
# only the QueueManager trust reference and item names, never PEM content.

# Purpose: Choose secret identity from inputs and defaults.
- name: "Client trust seed - Resolve Secret identity"
  ansible.builtin.set_fact:
    _client_trust_seed_secret_name: "{{ qmgr_name }}-{{ mq_client_trust_secret_suffix | default('client-certs') }}"
    _client_trust_seed_source_name: "{{ mq_client_trust_source_name | default('clientcerts') }}"
    _client_trust_seed_item: "{{ mq_client_trust_default_ca_item | default('company-ca.crt') }}"
    _client_trust_seed_pem: "{{ _client_trust_default_ca_pem | trim }}"
    _client_trust_seed_backend: "{{ cert_delivery_backend_effective | default('openshift_secret') }}"
    _client_trust_seed_vault_path: >-
      {{
        vault_client_trust_shared_path
        | default(mq_client_trust_vault_shared_path | default(app_prefix ~ '/ibm-mq/shared'))
        | string
        | trim
        | regex_replace('^/+', '')
        | regex_replace('/+$', '')
      }}
  no_log: true

# Purpose: Confirm default CA material exists before seeding the client trust Secret.
- name: "Client trust seed - Validate default CA material"
  ansible.builtin.assert:
    that:
      - _client_trust_seed_secret_name is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - _client_trust_seed_source_name is match('^[a-z0-9]+$')
      - _client_trust_seed_item is match('^[A-Za-z0-9._-]+$')
      - _client_trust_seed_vault_path | length > 0
      - _client_trust_seed_vault_path is not search('//|\\.\\.')
      - _client_trust_seed_pem | length > 0
      - (_client_trust_seed_pem | regex_search('-----BEGIN CERTIFICATE-----')) is not none
      - (_client_trust_seed_pem | regex_search('-----BEGIN [A-Z ]*PRIVATE KEY-----')) is none
    fail_msg: >-
      Client trust seed material is incomplete for {{ qmgr_name | upper }}.
      Expected public CA certificate material for item {{ _client_trust_seed_item }}.
    quiet: true
  no_log: true

# Purpose: Start clean tracking data for this part of the workflow.
- name: "Client trust seed - Initialize Secret data"
  ansible.builtin.set_fact:
    _client_trust_seed_existing_data: {}
    _client_trust_seed_string_data: {}
    _client_trust_seed_apply_failures: []
  no_log: true

# Purpose: Read the existing OpenShift Secret before merge, delete, or diagnostics.
- name: "Client trust seed - Read existing Secret"
  kubernetes.core.k8s_info:
    host: "{{ item.api_url }}"
    api_key: "{{ item.api_key }}"
    validate_certs: "{{ item.validate_certs | default(true) }}"
    ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
    api_version: v1
    kind: Secret
    namespace: "{{ namespace }}"
    name: "{{ _client_trust_seed_secret_name }}"
  loop: "{{ openshift_targets }}"
  loop_control:
    label: "{{ item.region }}"
  register: _client_trust_seed_reads
  no_log: true
  when: _client_trust_seed_backend == 'openshift_secret'

# Purpose: Read existing shared Vault trust data before merging the default CA.
- name: "Client trust seed - Read shared Vault trust data"
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    auth_method: "{{ vault_cert_auth_method }}"
    token: "{{ vault_cert_token if vault_cert_auth_method == 'token' else omit }}"
    role_id: "{{ vault_cert_role_id if vault_cert_auth_method == 'approle' else omit }}"
    secret_id: "{{ vault_cert_secret_id if vault_cert_auth_method == 'approle' else omit }}"
    validate_certs: "{{ vault_validate_certs | default(true) }}"
    engine_mount_point: "{{ vault_cert_mount_point }}"
    namespace: "{{ vault_namespace if (vault_namespace | default('') | length > 0) else omit }}"
    path: "{{ _client_trust_seed_vault_path }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
  register: _client_trust_seed_vault_read
  failed_when: false
  no_log: true
  when: _client_trust_seed_backend == 'vault'

# Purpose: Decide whether a Vault read failure is only an empty bootstrap path.
- name: "Client trust seed - Classify shared Vault read"
  ansible.builtin.set_fact:
    _client_trust_seed_vault_missing: >-
      {{
        (_client_trust_seed_vault_read.status | default(0) | int == 404)
        or (
          _client_trust_seed_vault_read.msg | default('', true) | string
          is search('(?i)(not found|does not exist|not exist|missing path|no secret|secret not found)')
        )
      }}
  no_log: true
  when: _client_trust_seed_backend == 'vault'

# Purpose: Stop if existing shared Vault trust data cannot be read safely.
- name: "Client trust seed - Fail if shared Vault trust read failed"
  ansible.builtin.fail:
    msg: |-
      Shared client/signer trust Vault path could not be read for {{ app_prefix | upper }}.

      Vault URL: {{ vault_url }}
      KV mount: {{ vault_cert_mount_point }}
      Vault path: {{ _client_trust_seed_vault_path }}

      Certificate onboarding stopped before writing shared client trust data so existing client certificates or signers are not overwritten.
  when:
    - _client_trust_seed_backend == 'vault'
    - _client_trust_seed_vault_read.failed | default(false) | bool
    - not (_client_trust_seed_vault_missing | default(false) | bool)

# Purpose: Preserve existing shared Vault trust items before adding the default CA.
- name: "Client trust seed - Collect existing shared Vault data"
  ansible.builtin.set_fact:
    _client_trust_seed_string_data: "{{ _client_trust_seed_vault_read.data.data | default({}) }}"
  no_log: true
  when:
    - _client_trust_seed_backend == 'vault'
    - not (_client_trust_seed_vault_missing | default(false) | bool)
    - _client_trust_seed_vault_read.data is defined
    - _client_trust_seed_vault_read.data.data is defined

# Purpose: Keep existing client trust Secret keys before adding the default CA.
- name: "Client trust seed - Collect existing Secret data"
  ansible.builtin.set_fact:
    _client_trust_seed_existing_data: >-
      {{
        _client_trust_seed_existing_data
        | combine((item.resources | first).data | default({}))
      }}
  loop: "{{ _client_trust_seed_reads.results | default([]) }}"
  loop_control:
    label: "{{ item.item.region | default('unknown') }}"
  no_log: true
  when:
    - _client_trust_seed_backend == 'openshift_secret'
    - item.resources | default([]) | length > 0

# Purpose: Decode existing client trust Secret data before merging the default CA.
- name: "Client trust seed - Decode existing Secret data"
  ansible.builtin.set_fact:
    _client_trust_seed_string_data: >-
      {{
        _client_trust_seed_string_data
        | combine({item.key: (item.value | b64decode)})
      }}
  loop: "{{ _client_trust_seed_existing_data | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  when: _client_trust_seed_backend == 'openshift_secret'

# Purpose: Merge the default company CA with existing client trust Secret data.
- name: "Client trust seed - Merge default company CA"
  ansible.builtin.set_fact:
    _client_trust_seed_string_data: >-
      {{
        _client_trust_seed_string_data
        | combine({_client_trust_seed_item: _client_trust_seed_pem ~ '\n'})
      }}
  no_log: true

# Purpose: Create or update the OpenShift Secret with approved certificate data.
- name: "Client trust seed - Apply Secret"
  kubernetes.core.k8s:
    host: "{{ item.api_url }}"
    api_key: "{{ item.api_key }}"
    validate_certs: "{{ item.validate_certs | default(true) }}"
    ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ _client_trust_seed_secret_name }}"
        namespace: "{{ namespace }}"
        labels:
          app.kubernetes.io/name: "{{ qmgr_name }}"
          app.kubernetes.io/managed-by: ansible-automation
          mq.ibm.com/environment: "{{ env_upper }}"
          mq.ibm.com/cert-type: "client-trust"
          mq.ibm.com/cert-backend: "openshift-secret"
      type: Opaque
      stringData: "{{ _client_trust_seed_string_data }}"
  loop: "{{ openshift_targets }}"
  loop_control:
    label: "{{ item.region }}"
  register: _client_trust_seed_apply
  failed_when: false
  no_log: true
  when: _client_trust_seed_backend == 'openshift_secret'

# Purpose: Write shared public client/signer trust data to Vault for VSO sync.
- name: "Client trust seed - Write shared Vault trust data"
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_url }}"
    auth_method: "{{ vault_cert_auth_method }}"
    token: "{{ vault_cert_token if vault_cert_auth_method == 'token' else omit }}"
    role_id: "{{ vault_cert_role_id if vault_cert_auth_method == 'approle' else omit }}"
    secret_id: "{{ vault_cert_secret_id if vault_cert_auth_method == 'approle' else omit }}"
    validate_certs: "{{ vault_validate_certs | default(true) }}"
    engine_mount_point: "{{ vault_cert_mount_point }}"
    namespace: "{{ vault_namespace if (vault_namespace | default('') | length > 0) else omit }}"
    path: "{{ _client_trust_seed_vault_path }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
    data: "{{ _client_trust_seed_string_data }}"
  no_log: true
  when: _client_trust_seed_backend == 'vault'

# Purpose: Convert failed module results into safe, readable failure messages.
- name: "Client trust seed - Collect apply failures"
  ansible.builtin.set_fact:
    _client_trust_seed_apply_failures: >-
      {{
        _client_trust_seed_apply_failures + [
          {
            'region': item.item.region | default('unknown'),
            'message': (
              item.msg
              | default(item.stderr | default('OpenShift Secret apply failed without a module message.', true), true)
              | string
              | regex_replace('\n+', ' ')
              | regex_replace('\s+', ' ')
              | regex_replace('(?i)(api[_-]?key|token|password|tls\\.key|tls\\.crt|ca\\.crt)[:=][^\\s,;}]+', '\\1=[redacted]')
              | regex_replace('.*namespaces \\\\"([^\\"]+)\\\\" not found.*', 'OpenShift namespace \1 was not found.')
              | regex_replace('.*namespaces "([^"]+)" not found.*', 'OpenShift namespace \1 was not found.')
              | regex_replace(
                  '.*User \\\\"([^\\"]+)\\\\" cannot ([a-z]+) resource '
                  ~ '\\\\"([^\\"]+)\\\\".* namespace \\\\"([^\\"]+)\\\\".*',
                  'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                )
              | regex_replace(
                  '.*User "([^"]+)" cannot ([a-z]+) resource "([^"]+)".* '
                  ~ 'namespace "([^"]+)".*',
                  'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                )
              | trim
            )
          }
        ]
      }}
  loop: "{{ _client_trust_seed_apply.results | default([]) }}"
  loop_control:
    label: "{{ item.item.region | default('unknown') }}"
  when: >-
    item.failed | default(false) | bool
    or item.rc | default(0) | int != 0
    or item.exception is defined
    or item.module_stderr | default('', true) | string | trim | length > 0
    or item.status | default(0) | int >= 400
    or (
      item.msg is defined
      and item.msg | string | trim is search('(?i)(failed|forbidden|unauthorized|invalid|denied|cannot|unable|error)')
    )
  no_log: true

# Purpose: Stop when secret apply failed.
- name: "Client trust seed - Fail if Secret apply failed"
  ansible.builtin.fail:
    msg: |-
      Client/signer trust seed Secret delivery failed for {{ qmgr_name | upper }}.

      Secret: {{ _client_trust_seed_secret_name }}
      Namespace: {{ namespace }}
      Default item: {{ _client_trust_seed_item }}

      Failed region(s):
      {% for failure in _client_trust_seed_apply_failures %}
      - {{ failure.region }}: {{ failure.message }}
      {% endfor %}
  when: _client_trust_seed_apply_failures | length > 0

# Purpose: Store the client trust seed result for certificate lifecycle reporting.
- name: "Client trust seed - Record result"
  ansible.builtin.set_fact:
    cert_client_trust_seed_result:
      secret_name: "{{ _client_trust_seed_secret_name }}"
      source_name: "{{ _client_trust_seed_source_name }}"
      item: "{{ _client_trust_seed_item }}"
      regions: "{{ openshift_targets | map(attribute='region') | list }}"
      backend: "{{ _client_trust_seed_backend }}"
      vault_path: "{{ _client_trust_seed_vault_path if _client_trust_seed_backend == 'vault' else '' }}"
      source: "app certificate signer chain"

# Purpose: Record the workflow result for final reporting.
- name: "Client trust seed - Complete"
  ansible.builtin.debug:
    msg:
      - "Client Trust Secret : {{ _client_trust_seed_secret_name }}"
      - "Backend             : {{ _client_trust_seed_backend }}"
      - "Vault Path          : {{ _client_trust_seed_vault_path if _client_trust_seed_backend == 'vault' else 'not used' }}"
      - "Default CA Item     : {{ _client_trust_seed_item }}"
      - "Regions             : {{ openshift_targets | map(attribute='region') | join(', ') }}"
