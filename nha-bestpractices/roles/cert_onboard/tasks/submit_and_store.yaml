---
#  submit_and_store.yaml - Venafi Submit -> Deliver Cert Material
#
#  PURPOSE:
#    Takes a generated CSR, submits it to Venafi TPP for signing
#    using Venafi WebSDK REST calls, then delivers artifacts to the
#    selected backend: OpenShift Secrets or Vault KV.
#
#  CALLED WITH:
#    cert_type    - loop var: app | nha | nhacrr
#
#  REQUIRES:
#    cert_tmp_dir - contains the generated .key and .csr files
#    venafi_token - valid OAuth bearer token (from main.yml)
#
#  BACKEND PATHS:
#    Vault: {mount}/data/{vault_cert_base_path}/{cert_type_vault_subpath}
#    OCP:   Secret {qmgr_name}-{cert_type_vault_subpath} in every target cluster
#    Keys:
#      tls.crt - Leaf certificate (PEM)
#      tls.key - Private key (PEM)
#      ca.crt  - Signer CA chain (PEM)
#

# Purpose: Store certificate file paths for {{ cert_type }}.
- name: Set certificate file paths for {{ cert_type }}
  ansible.builtin.set_fact:
    _cert_key_path: "{{ cert_tmp_dir.path }}/{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}.key"
    _cert_csr_path: "{{ cert_tmp_dir.path }}/{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}.csr"
    _cert_crt_path: "{{ cert_tmp_dir.path }}/{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}.crt"
    _cert_chain_path: "{{ cert_tmp_dir.path }}/{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}_chain.crt"
    _venafi_object_name: "{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}"
    _venafi_cert_dn: "{{ venafi_policy_dn }}\\{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}"
    _venafi_existing_dn: >-
      {{
        cert_actions[cert_type].existing_venafi_dn
        | default(venafi_policy_dn ~ '\\' ~ qmgr_name ~ '_' ~ cert_type_csr_suffix[cert_type], true)
      }}
    _venafi_submit_mode: "{{ cert_actions[cert_type].action | default('request_new') }}"

# Purpose: Read certificate details needed for lifecycle decisions and reporting.
- name: Read CSR for certificate request - {{ cert_type }}
  ansible.builtin.slurp:
    src: "{{ _cert_csr_path }}"
  register: _slurp_csr

# Purpose: Build the Venafi request payload from the CSR and policy settings.
- name: Prepare CSR payload for certificate request - {{ cert_type }}
  ansible.builtin.set_fact:
    _cert_csr_compact: >-
      {{ (_slurp_csr.content | b64decode) | regex_replace('[\r\n]+', '') }}

# Purpose: Submit a new {{ cert_type }} certificate request to Venafi.
- name: Request certificate for {{ cert_type }}
  ansible.builtin.uri:
    url: "{{ venafi_url }}{{ venafi_cert_request }}"
    method: POST
    headers:
      Authorization: "Bearer {{ venafi_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      PolicyDN: "{{ venafi_policy_dn }}"
      ObjectName: "{{ _venafi_object_name }}"
      Subject: "{{ cert_common_name }}"
      PKCS10: "{{ _cert_csr_compact }}"
      Format: "Base64"
      IncludeChain: true
      IncludePrivateKey: false
      RootFirstOrder: false
      SetWorkToDo: true
      WorkToDoTimeout: "{{ [venafi_poll_delay | int, 120] | min }}"
      Origin: "NativeHA_MQ_Management"
    status_code:
      - 200
      - 202
    return_content: true
    validate_certs: "{{ venafi_validate_certs }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
    use_netrc: false
    unredirected_headers:
      - Authorization
  register: _venafi_cert_request_result
  no_log: true
  when: _venafi_submit_mode == 'request_new'

# Purpose: Submit a {{ cert_type }} renewal request to Venafi.
- name: Renew certificate for {{ cert_type }}
  ansible.builtin.uri:
    url: "{{ venafi_url }}{{ venafi_cert_renew }}"
    method: POST
    headers:
      Authorization: "Bearer {{ venafi_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      CertificateDN: "{{ _venafi_existing_dn }}"
      PKCS10: "{{ _cert_csr_compact }}"
      Format: "Base64"
      IncludeChain: true
      IncludePrivateKey: false
      RootFirstOrder: false
      WorkToDoTimeout: "{{ [venafi_poll_delay | int, 120] | min }}"
    status_code:
      - 200
      - 202
    return_content: true
    validate_certs: "{{ venafi_validate_certs }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
    use_netrc: false
    unredirected_headers:
      - Authorization
  register: _venafi_cert_request_result
  no_log: true
  when: _venafi_submit_mode == 'renew'

# Purpose: Choose issued certificate identifiers for {{ cert_type }} from inputs and defaults.
- name: Resolve issued certificate identifiers for {{ cert_type }}
  ansible.builtin.set_fact:
    _venafi_request_dn: >-
      {{
        _venafi_cert_request_result.json.CertificateDN
        | default((_venafi_submit_mode == 'renew') | ternary(_venafi_existing_dn, _venafi_cert_dn), true)
      }}
    _venafi_request_guid: "{{ _venafi_cert_request_result.json.Guid | default('') }}"
    _venafi_certificate_data_b64: "{{ _venafi_cert_request_result.json.CertificateData | default('') }}"

# Purpose: Fetch the issued {{ cert_type }} certificate bundle from Venafi.
- name: Retrieve issued certificate for {{ cert_type }}
  ansible.builtin.uri:
    url: "{{ venafi_url }}{{ venafi_cert_retrieve }}"
    method: POST
    headers:
      Authorization: "Bearer {{ venafi_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    body_format: json
    body:
      CertificateDN: "{{ _venafi_request_dn }}"
      Format: "Base64"
      IncludeChain: true
      IncludePrivateKey: false
      RootFirstOrder: false
      WorkToDoTimeout: "{{ [venafi_poll_delay | int, 120] | min }}"
    status_code: "{{ [200, 202] + (nativeha_transient_http_statuses | default([429, 500, 502, 503, 504])) }}"
    return_content: true
    validate_certs: "{{ venafi_validate_certs }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
    use_netrc: false
    unredirected_headers:
      - Authorization
  register: _venafi_cert_retrieve_result
  until:
    - _venafi_cert_retrieve_result.status | default(0) == 200
    - _venafi_cert_retrieve_result.json is defined
    - _venafi_cert_retrieve_result.json.CertificateData is defined
  retries: "{{ venafi_poll_retries | int }}"
  delay: "{{ venafi_poll_delay | int }}"
  no_log: true
  when: _venafi_certificate_data_b64 | length == 0

# Purpose: Select the certificate data returned by the provider for storage.
- name: Use retrieved certificate data for {{ cert_type }}
  ansible.builtin.set_fact:
    _venafi_certificate_data_b64: "{{ _venafi_cert_retrieve_result.json.CertificateData }}"
  when: _venafi_certificate_data_b64 | length == 0

# Purpose: Decode the {{ cert_type }} certificate bundle returned by Venafi.
- name: Decode certificate bundle for {{ cert_type }}
  ansible.builtin.set_fact:
    _issued_cert_bundle: "{{ _venafi_certificate_data_b64 | b64decode | trim }}"
    _issued_cert_blocks: >-
      {{
        (_venafi_certificate_data_b64 | b64decode | trim)
        | regex_findall('-----BEGIN CERTIFICATE-----(?s:.*?)-----END CERTIFICATE-----')
      }}

# Purpose: Confirm the provider returned a leaf certificate and signer chain.
- name: Validate returned leaf and signer chain for {{ cert_type }}
  ansible.builtin.assert:
    that:
      - _issued_cert_blocks | length > 1
    fail_msg: >-
      Certificate provider returned {{ _issued_cert_blocks | length }} certificate
      block(s) for {{ cert_type }}. Expected leaf plus signer chain. Confirm the
      certificate policy and permissions allow retrieval with IncludeChain=true.

# Purpose: Read dates, subject, issuer, and serial from certificate content.
- name: Parse returned certificate blocks for {{ cert_type }}
  community.crypto.x509_certificate_info:
    content: "{{ item }}"
  loop: "{{ _issued_cert_blocks }}"
  loop_control:
    index_var: cert_block_index
    label: "certificate block {{ cert_block_index + 1 }}"
  register: _issued_cert_info
  no_log: true

# Purpose: Select the queue manager leaf certificate from the {{ cert_type }} bundle.
- name: Select issued leaf certificate for {{ cert_type }}
  ansible.builtin.set_fact:
    _issued_leaf_result: >-
      {{
        (
          _issued_cert_info.results
          | selectattr('subject.commonName', 'defined')
          | selectattr('subject.commonName', 'equalto', cert_common_name)
          | list
          | first
        )
        | default({})
      }}
  no_log: true

# Purpose: Confirm the issued certificate can be identified from the returned bundle.
- name: Validate issued leaf certificate selection for {{ cert_type }}
  ansible.builtin.assert:
    that:
      - _issued_leaf_result | length > 0
      - _issued_leaf_result.cert_block_index is defined
    fail_msg: >-
      Certificate provider returned a certificate bundle for {{ cert_type }}, but
      no block matched the requested leaf certificate CN {{ cert_common_name }}.
      Refusing to store CA-chain material as tls.crt.

# Purpose: Separate the {{ cert_type }} leaf certificate from its signer chain.
- name: Split issued leaf and signer chain for {{ cert_type }}
  ansible.builtin.set_fact:
    _issued_leaf_block: "{{ _issued_leaf_result.item | trim }}"
    _issued_leaf_index: "{{ _issued_leaf_result.cert_block_index | int }}"
    _issued_chain_blocks: >-
      {{
        _issued_cert_info.results
        | rejectattr('cert_block_index', 'equalto', _issued_leaf_result.cert_block_index)
        | map(attribute='item')
        | list
      }}
  no_log: true

# Purpose: Read certificate details needed for lifecycle decisions and reporting.
- name: Read private key for {{ cert_type }}
  ansible.builtin.slurp:
    src: "{{ _cert_key_path }}"
  register: _slurp_key
  no_log: true

# Purpose: Build the {{ cert_type }} data structure that backend storage tasks consume.
- name: Prepare certificate data for backend delivery - {{ cert_type }}
  ansible.builtin.set_fact:
    _tls_crt: "{{ _issued_leaf_block }}"
    _tls_key: "{{ _slurp_key.content | b64decode | trim }}"
    _ca_crt: >-
      {{ (_issued_chain_blocks | join('\n')) | trim }}
  no_log: true

# Purpose: Use the app signer as the default company CA for client trust seeding.
- name: Capture default client trust CA from app certificate
  ansible.builtin.set_fact:
    _client_trust_default_ca_pem: "{{ _ca_crt }}"
  when: cert_type == 'app'
  no_log: true

# Purpose: Write certificate inventory metadata on the registry branch.
- name: Write leaf certificate file for registry parsing - {{ cert_type }}
  ansible.builtin.copy:
    content: "{{ _tls_crt }}\n"
    dest: "{{ _cert_crt_path }}"
    mode: "0600"

# Purpose: Save the signer chain only when audit debug output is enabled.
- name: Write signer chain file for audit/debug - {{ cert_type }}
  ansible.builtin.copy:
    content: "{{ _ca_crt }}\n"
    dest: "{{ _cert_chain_path }}"
    mode: "0600"

# Purpose: Record issued certificate metadata for summary and registry update.
- name: Certificate issued for {{ cert_type }}
  ansible.builtin.debug:
    msg: "Certificate issued for {{ cert_type }} - CN: {{ cert_common_name }}"

# Purpose: Store {{ cert_type }} certificate material in Vault.
- name: "Deliver to Vault for {{ cert_type }}"
  ansible.builtin.include_tasks: vault_write.yaml
  when: cert_delivery_backend_effective == 'vault'

# Purpose: Store {{ cert_type }} certificate material in OpenShift Secrets.
- name: "Deliver to OpenShift Secrets for {{ cert_type }}"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_store_ocp/tasks/apply_secret.yaml"
  when: cert_delivery_backend_effective == 'openshift_secret'

# Purpose: Read safe {{ cert_type }} certificate metadata for inventory and reports.
- name: Extract signed cert info for registry - {{ cert_type }}
  community.crypto.x509_certificate_info:
    path: "{{ _cert_crt_path }}"
  register: _signed_cert_info

# Purpose: Prepare registry entry for {{ cert_type }}.
- name: Build registry entry for {{ cert_type }}
  ansible.builtin.set_fact:
    registry_cert_data: >-
      {{ registry_cert_data | default({}) | combine({
           cert_type: {
             'status': 'active',
             'common_name': _signed_cert_info.subject.commonName | default(cert_common_name),
             'subject_alt_name': _signed_cert_info.subject_alt_name | default([]),
             'subject': _signed_cert_info.subject | default({}),
             'issuer': _signed_cert_info.issuer.commonName | default(_signed_cert_info.issuer | default({}) | string),
             'serial_number': (_signed_cert_info.serial_number | community.crypto.to_serial) if (_signed_cert_info.serial_number is defined) else '',
             'thumbprint': _signed_cert_info.fingerprints.sha256 | default(''),
             'not_before': _signed_cert_info.not_before | default(''),
             'not_after': _signed_cert_info.not_after | default(''),
             'days_remaining': ((_signed_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) - (now(utc=true))).days | int,
             'venafi_dn': _venafi_request_dn,
             'venafi_guid': _venafi_request_guid,
             'vault_path': vault_cert_base_path ~ '/' ~ cert_type_vault_subpath[cert_type],
             'openshift_secret': qmgr_name ~ '-' ~ cert_type_vault_subpath[cert_type],
             'delivery_backend': cert_delivery_backend_effective,
             'last_action': cert_actions[cert_type].action | default('onboard'),
             'last_action_date': now(utc=true) | string
           }
         })
      }}
