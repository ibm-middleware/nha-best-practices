---
# Repair OpenShift Secret delivery from already-valid certificate material.
# This path is intentionally Venafi-free: it copies complete material found in
# one regional Secret to missing/incomplete regional Secrets for the same qmgr.

# Purpose: Load reusable {{ cert_type }} material before repairing backend storage.
- name: "Backend repair - Load existing material for {{ cert_type }}"
  ansible.builtin.set_fact:
    _tls_crt: "{{ cert_repair_material[cert_type]['tls.crt'] }}"
    _tls_key: "{{ cert_repair_material[cert_type]['tls.key'] }}"
    _ca_crt: "{{ cert_repair_material[cert_type]['ca.crt'] }}"
  no_log: true

# Purpose: Use the app signer as the default company CA for client trust seeding.
- name: "Backend repair - Capture default client trust CA from app certificate"
  ansible.builtin.set_fact:
    _client_trust_default_ca_pem: "{{ _ca_crt }}"
  when: cert_type == 'app'
  no_log: true

# Purpose: Confirm existing certificate material is complete enough for backend repair.
- name: "Backend repair - Validate reusable material for {{ cert_type }}"
  ansible.builtin.assert:
    that:
      - _tls_crt | length > 0
      - _tls_key | length > 0
      - _ca_crt | length > 0
      - (_tls_crt | regex_search('-----BEGIN CERTIFICATE-----')) is not none
      - (_tls_key | regex_search('-----BEGIN [A-Z ]*PRIVATE KEY-----')) is not none
      - (_ca_crt | regex_search('-----BEGIN CERTIFICATE-----')) is not none
    fail_msg: >-
      Existing certificate material for {{ qmgr_name | upper }} {{ cert_type }}
      is not complete enough to repair backend delivery safely. No Venafi
      request was made.
    quiet: true
  no_log: true

# Purpose: Confirm the selected backend can be repaired for this certificate type.
- name: "Backend repair - Validate backend for {{ cert_type }}"
  ansible.builtin.assert:
    that:
      - cert_delivery_backend_effective == 'openshift_secret'
    fail_msg: >-
      Backend repair is only supported for direct OpenShift Secret delivery.
      No new certificate request was made.
    quiet: true

# Purpose: Store {{ cert_type }} certificate material in OpenShift Secrets.
- name: "Backend repair - Deliver to OpenShift Secrets for {{ cert_type }}"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_store_ocp/tasks/apply_secret.yaml"

# Purpose: Record that backend repair finished for {{ cert_type }}.
- name: "Backend repair - Complete for {{ cert_type }}"
  ansible.builtin.debug:
    msg: >-
      Repaired {{ cert_delivery_backend_effective }} delivery for
      {{ qmgr_name | upper }} {{ cert_type }} without requesting a new
      certificate.
