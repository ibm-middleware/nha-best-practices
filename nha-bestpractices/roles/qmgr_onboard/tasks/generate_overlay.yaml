---
# Generate overlay manifests for a single region
# Called by workflow.yaml (Step 12) with loop_var: current_region
#
# In the Base+Overlays pattern, this task generates ONLY:
#   overlays/<region>/<region_label>-patch-restart.yaml
#   overlays/<region>/<region_label>-patch-topology.yaml (CRR only, immutable)
#   overlays/<region>/<region_label>-patch-role.yaml  (CRR only)
#   overlays/<region>/kustomization.yaml               (all)
#
# The base qmgr.yaml is generated separately in Step 11.
# Queue-manager-wide mutable files, such as image and app MQSC, are generated
# once in overlays/_shared and consumed by each regional overlay.

# Purpose: Store region-specific values used to render overlays.
- name: "Set CRR role for region {{ current_region }}"
  ansible.builtin.set_fact:
    crr_role: >-
      {% if instance_type == 'nhacrr' %}{{ 'Live' if current_region == live_region_lower else 'Recovery' }}{% else %}{% endif %}

# Purpose: Store region-specific values used to render overlays.
- name: "Set overlay directory for region {{ current_region }}"
  ansible.builtin.set_fact:
    overlay_dir: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/{{ current_region }}"

# Role patch files are the ONLY files touched by qmgr_role_switch.
# Using JSON patches (not strategic merge) because CRDs don't
# have built-in merge strategies.

# Purpose: Write the regional restart patch used by Day 2 restart requests.
- name: "Generate restart patch for region {{ current_region }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/restart_patch.yaml.j2"
    dest: "{{ overlay_dir }}/{{ regions[current_region].region_label }}-patch-restart.yaml"
    mode: "0644"
  vars:
    qmgr_restart_at: "initial"
    qmgr_restart_reason: "onboarded"
    qmgr_restart_requested_by: "ansible-automation"

# Purpose: Write immutable CRR remote endpoint settings for this region.
- name: "Generate CRR topology patch for region {{ current_region }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/crr_topology_patch.yaml.j2"
    dest: "{{ overlay_dir }}/{{ regions[current_region].region_label }}-patch-topology.yaml"
    mode: "0644"
  when: instance_type == 'nhacrr'

# Purpose: Write the regional CRR role patch used by Day 2 role switches.
- name: "Generate role patch for region {{ current_region }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/role_patch.yaml.j2"
    dest: "{{ overlay_dir }}/{{ regions[current_region].region_label }}-patch-role.yaml"
    mode: "0644"
  when: instance_type == 'nhacrr'

# Purpose: Overlay kustomization for region {{ current_region }}.
- name: "Generate overlay kustomization for region {{ current_region }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/overlay_kustomization.yaml.j2"
    dest: "{{ overlay_dir }}/kustomization.yaml"
    mode: "0644"
