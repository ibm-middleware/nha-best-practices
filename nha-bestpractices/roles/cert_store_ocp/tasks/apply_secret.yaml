---
# Create or update the MQ TLS secret for cert_type in every target cluster.

# Purpose: Build the OpenShift Secret name for {{ cert_type }}.
- name: "OpenShift - Resolve secret name for {{ cert_type }}"
  ansible.builtin.set_fact:
    _ocp_secret_name: "{{ qmgr_name }}-{{ cert_type_vault_subpath[cert_type] }}"

# Purpose: Create or update the OpenShift Secret with approved certificate data.
- name: "OpenShift - Apply secret {{ _ocp_secret_name }}"
  kubernetes.core.k8s:
    host: "{{ item.api_url }}"
    api_key: "{{ item.api_key }}"
    validate_certs: "{{ item.validate_certs | default(true) }}"
    ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ _ocp_secret_name }}"
        namespace: "{{ namespace }}"
        labels:
          app.kubernetes.io/name: "{{ qmgr_name }}"
          app.kubernetes.io/managed-by: ansible-automation
          mq.ibm.com/environment: "{{ env_upper }}"
          mq.ibm.com/cert-type: "{{ cert_type }}"
          mq.ibm.com/cert-backend: "openshift-secret"
      type: "{{ cert_openshift_secret_type }}"
      stringData:
        tls.crt: "{{ _tls_crt }}"
        tls.key: "{{ _tls_key }}"
        ca.crt: "{{ _ca_crt }}"
  loop: "{{ openshift_targets }}"
  loop_control:
    label: "{{ item.region }}"
  register: _ocp_secret_apply
  failed_when: false
  no_log: true

# Purpose: Create or update the OpenShift Secret with approved certificate data.
- name: "OpenShift - Initialize secret apply failures"
  ansible.builtin.set_fact:
    _ocp_secret_apply_failures: []

# Purpose: Create or update the OpenShift Secret with approved certificate data.
- name: "OpenShift - Collect secret apply failures"
  ansible.builtin.set_fact:
    _ocp_secret_apply_failures: >-
      {{
        _ocp_secret_apply_failures + [
          {
            'region': item.item.region | default('unknown'),
            'region_label': item.item.region_label | default(item.item.region | default('unknown')),
            'status': item.status | default(item.code | default(item.rc | default('unknown'))),
            'reason': item.reason | default(item.status_reason | default(('module_error' if item.rc is defined else 'unknown'))),
            'message': (
              (
                item.msg
                if (
                  item.msg is defined
                  and not (item.msg | string | trim is search('^MODULE FAILURE'))
                )
                else (
                  'OpenShift API client could not connect to the cluster or '
                  ~ 'complete API discovery. Check the cluster API URL, '
                  ~ 'network reachability, token validity, and TLS/CA settings.'
                  if (
                    item.module_stderr is defined
                    or item.exception is defined
                    or item.rc is defined
                  )
                  else item.stderr | default('OpenShift API call failed without a module message.', true)
                )
              )
              | string
              | regex_replace('\n+', ' ')
              | regex_replace('\s+', ' ')
              | regex_replace('-----BEGIN [^-]+-----.*-----END [^-]+-----', '[redacted certificate material]')
              | regex_replace('(?i)(api[_-]?key|token|password|tls\\.key|tls\\.crt|ca\\.crt)[:=][^\\s,;}]+', '\\1=[redacted]')
              | regex_replace(
                  '.*namespaces \\\\"([^\\"]+)\\\\" not found.*',
                  'OpenShift namespace \1 was not found. Create the namespace before certificate onboarding.'
                )
              | regex_replace(
                  '.*namespaces "([^"]+)" not found.*',
                  'OpenShift namespace \1 was not found. Create the namespace before certificate onboarding.'
                )
              | regex_replace(
                  '.*User \\\\"([^\\"]+)\\\\" cannot ([a-z]+) resource '
                  ~ '\\\\"([^\\"]+)\\\\".* namespace \\\\"([^\\"]+)\\\\".*',
                  'OpenShift denied access. Service account \1 cannot \2 \3 in namespace \4. '
                  ~ 'Configure the OpenShift token/service account or grant the required Secret permission.'
                )
              | regex_replace(
                  '.*User "([^"]+)" cannot ([a-z]+) resource "([^"]+)".* '
                  ~ 'namespace "([^"]+)".*',
                  'OpenShift denied access. Service account \1 cannot \2 \3 in namespace \4. '
                  ~ 'Configure the OpenShift token/service account or grant the required Secret permission.'
                )
              | regex_replace(
                  '.*"reason":"Forbidden".*',
                  'OpenShift denied access to the Secret operation. '
                  ~ 'Configure the OpenShift service account permissions for this namespace.'
                )
              | trim
            )
          }
        ]
      }}
  loop: "{{ _ocp_secret_apply.results | default([]) }}"
  loop_control:
    label: "{{ item.item.region | default('unknown') }}"
  when: >-
    item.failed | default(false) | bool
    or item.rc | default(0) | int != 0
    or item.exception is defined
    or item.module_stderr | default('', true) | string | trim | length > 0
    or item.status | default(0) | int >= 400
    or (
      item.msg is defined
      and item.msg | string | trim is search('(?i)(failed|forbidden|unauthorized|invalid|denied|cannot|unable|error)')
    )
  no_log: true

# Purpose: Create or update the OpenShift Secret with approved certificate data.
- name: "OpenShift - Fail if secret apply failed"
  ansible.builtin.fail:
    msg: |-
      OpenShift secret delivery failed for {{ qmgr_name | upper }}.

      Secret: {{ _ocp_secret_name }}
      Namespace: {{ namespace }}
      Certificate type: {{ cert_type }}

      Failed region(s):
      {% for failure in _ocp_secret_apply_failures %}
          - {{ failure.region }}
            {% if failure.status | string != 'unknown' %}Status: {{ failure.status }}{% endif %}
            {% if failure.reason | string != 'unknown' %}Reason: {{ failure.reason }}{% endif %}
            Detail: {{ failure.message }}
      {% endfor %}

      No certificate registry update was made. Temporary certificate files will be cleaned up.
          Please ask the OpenShift administrator to verify that namespace
          {{ namespace }} exists and that the configured OpenShift credential can
          get, create, update, and patch Secrets there for the failed region(s).
  when: _ocp_secret_apply_failures | length > 0

# Purpose: Record that {{ cert_type }} was applied to OpenShift Secrets.
- name: "OpenShift - Secret applied for {{ cert_type }}"
  ansible.builtin.debug:
    msg: >-
      Secret {{ _ocp_secret_name }} applied in namespace {{ namespace }}
      for regions {{ openshift_targets | map(attribute='region') | join(', ') }}.
