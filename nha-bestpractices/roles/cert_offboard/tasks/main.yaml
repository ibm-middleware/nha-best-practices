---
# Certificate offboarding for resolved NativeHA queue manager targets.

# Purpose: Require explicit confirmation before deleting or revoking certificates.
- name: "Offboard - Safety gate"
  ansible.builtin.fail:
    msg: >-
      SAFETY GATE: Set confirm=yes to proceed. This will delete certificate
      material from the selected backend and revoke/disable certificates in
      Venafi for the selected queue manager(s).
  when: confirm | default('') | lower != 'yes'

# Purpose: Resolve the offboard scope into exact queue manager targets.
- name: "Offboard - Resolve queue manager targets"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/resolve_targets.yaml"

# Purpose: Remove certificate backends for each resolved queue manager target.
- name: "Offboard - Process resolved targets"
  ansible.builtin.include_tasks: process_target.yaml
  loop: "{{ cert_targets }}"
  loop_control:
    loop_var: cert_target
    label: "{{ cert_target.qmgr_name }}"
