---
# Public trust certificates supplied by client/application teams are stored in
# one deterministic Kubernetes Secret per queue manager. Direct OpenShift mode
# writes that Secret, while Vault mode writes the app shared Vault path for VSO
# sync. GitOps stores only QueueManager trust references; it must never store
# PEM material.
# Optional temporary namespace override:
# custom_openshift_namespace.
cert_client_trust_add_secret_suffix: "{{ mq_client_trust_secret_suffix | default('client-certs') }}"
cert_client_trust_add_secret_type: "Opaque"
cert_client_trust_add_patch_file: "qm-client-trust-patch.yaml"
