---
# Purpose: Force-renew certificates through the CSR/PEM flow.
- name: "NativeHA Certificate Renew"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../../../nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml
    - ../../../nativeha_templates/global_vars/certs_control_vars.yaml

  vars:
    cert_force_renew: true

  tasks:
    - name: "Initialize NativeHA run context"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/init_run_context.yaml"

    - name: "Run certificate renew workflow"
      block:
        - name: "Certificate renew - Execute"
          ansible.builtin.include_role:
            name: cert_onboard

        - name: "Certificate renew - Mark success"
          ansible.builtin.set_fact:
            nativeha_playbook_status: "success"

      rescue:
        - name: "Certificate renew - Capture failure"
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/capture_failure.yaml"

      always:
        - name: "Certificate renew - Send final report"
          ansible.builtin.include_role:
            name: final_report
          vars:
            final_report_title: "Certificate Renew"
            final_report_status: "{{ nativeha_playbook_status | default('failed') }}"
            final_report_error: "{{ nativeha_playbook_error | default('') }}"
            final_report_summary: >-
              Force-renew NativeHA certificates through the CSR/PEM flow,
              deliver the new material, and refresh the registry metadata.

        - name: "Certificate renew - Re-raise failure"
          ansible.builtin.fail:
            msg: "{{ nativeha_playbook_error | default('Certificate renew failed.') }}"
          when: nativeha_playbook_status | default('failed') != 'success'
