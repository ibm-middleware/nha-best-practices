---
# Purpose: Request certificates for a queue manager and deliver to configured backend.
- name: "NativeHA Certificate Onboard"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../../../nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml
    - ../../../nativeha_templates/global_vars/certs_control_vars.yaml

  vars:
    cert_force_renew: false

  tasks:
    - name: "Initialize NativeHA run context"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/init_run_context.yaml"

    - name: "Run certificate onboard workflow"
      block:
        - name: "Certificate onboard - Execute"
          ansible.builtin.include_role:
            name: cert_onboard

        - name: "Certificate onboard - Mark success"
          ansible.builtin.set_fact:
            nativeha_playbook_status: "success"

      rescue:
        - name: "Certificate onboard - Capture failure"
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/capture_failure.yaml"

      always:
        - name: "Certificate onboard - Send final report"
          ansible.builtin.include_role:
            name: final_report
          vars:
            final_report_title: "Certificate Onboard"
            final_report_status: "{{ nativeha_playbook_status | default('failed') }}"
            final_report_error: "{{ nativeha_playbook_error | default('') }}"
            final_report_summary: >-
              Request NativeHA certificates, deliver them to the configured
              backend, and update the Git-backed certificate registry.

        - name: "Certificate onboard - Re-raise failure"
          ansible.builtin.fail:
            msg: "{{ nativeha_playbook_error | default('Certificate onboard failed.') }}"
          when: nativeha_playbook_status | default('failed') != 'success'
