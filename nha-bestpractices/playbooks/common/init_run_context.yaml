---
# Capture stable execution metadata before the workflow starts doing work.

# Purpose: Record the job start time used in console and email reports.
- name: "Run context - Capture job start timestamp"
  ansible.builtin.set_fact:
    nativeha_job_started_at: "{{ nativeha_job_started_at | default(now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ'), true) }}"

# Purpose: Set shared timeout and retry defaults for all external API calls
#          (Venafi, Vault, Bitbucket, OpenShift). Individual tasks can override
#          these values. Environment variables allow tuning without code changes.
- name: "Run context - Set API safety defaults"
  ansible.builtin.set_fact:
    nativeha_api_timeout: "{{ lookup('ansible.builtin.env', 'NATIVEHA_API_TIMEOUT', default='45') | int }}"
    nativeha_api_retries: "{{ lookup('ansible.builtin.env', 'NATIVEHA_API_RETRIES', default='3') | int }}"
    nativeha_api_delay: "{{ lookup('ansible.builtin.env', 'NATIVEHA_API_DELAY', default='10') | int }}"
    nativeha_transient_http_statuses:
      - 408
      - 409
      - 425
      - 429
      - 500
      - 502
      - 503
      - 504
