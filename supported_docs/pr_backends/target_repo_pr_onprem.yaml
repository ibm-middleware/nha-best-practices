---
# ============================================================
# target_repo_pr.yaml — git-provider On-Prem (Data Center/Server)
# ============================================================
# Creates or updates a pull request on an on-prem git-provider
# Data Center / Server instance. This is the production default.
# If you need git-provider Cloud instead, copy the cloud variant:
# REQUIRED VARIABLES (set by the calling pillar before include):
# CREDENTIALS (AAP environment variables):
# Input variables from caller:
# Optional input variables:
# Derived facts created here:
# OUTPUT:
# ============================================================

# ── 1. Validate Inputs ──────────────────────────────────────
# Purpose: Fails early with a clear message when required git-provider Server pull-request backend inputs or
#   configuration are missing or inconsistent.
- name: "PR — Validate inputs"
  ansible.builtin.assert:
    that:
      - git_work_dir is defined and git_work_dir | length > 0
      - git_repo_url is defined and git_repo_url | length > 0
      - target_branch is defined and target_branch | length > 0
      - env_upper is defined and env_upper | length > 0
      - target_repo_pr_action_slug is defined
      - target_repo_pr_action_label is defined
      - target_repo_pr_repo_path is defined
      - target_repo_pr_summary is defined
      - target_repo_pr_validation is defined
    fail_msg: "Missing required target repo PR input facts."

# ── 2. Resolve Identity ─────────────────────────────────────
# Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task output
#   for later git-provider Server pull-request backend steps.
- name: "PR — Resolve branch identity"
  ansible.builtin.set_fact:
    # Prefer an explicit branch subject for bulk Day-2 actions when supplied.
    # Otherwise use qmgr_name_normalized from Day-2 roles; onboarding uses qmgr_name.
    _pr_qmgr: "{{ (target_repo_pr_branch_subject | default(qmgr_name_normalized | default(qmgr_name), true)) | lower }}"
    # app_prefix exists in onboarding; Day-2 roles can derive it from qmgr_name.
    _pr_app: >-
      {{
        app_prefix | default(app_sys_id, true)
        | default(((qmgr_name_normalized | default(qmgr_name)) | lower)[0:3], true)
        | lower
      }}

# Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task output
#   for later git-provider Server pull-request backend steps.
#   target_repo_pr_title_subject
- name: "PR — Resolve display identity"
  ansible.builtin.set_fact:
    _pr_qmgr_label: >-
      {{
        target_repo_pr_qmgr_label
        | default((_pr_qmgr | upper), true)
      }}
    _pr_title_subject: >-
      {{
        target_repo_pr_title_subject
        | default(target_repo_pr_qmgr_label | default((_pr_qmgr | upper), true), true)
      }}

# Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task output
#   for later git-provider Server pull-request backend steps.
#   target_repo_pr_repo_path
- name: "PR — Build branch prefix"
  ansible.builtin.set_fact:
    # All action types for one queue manager share the same feature branch/PR.
    _pr_qmgr_branch_prefix: "feature/{{ _pr_app }}/{{ _pr_qmgr }}-"
    # Changelog is per queue manager unless caller overrides target_repo_pr_changelog_path.
    _pr_changelog_rel: >-
      {{
        target_repo_pr_changelog_path | default(
          (target_repo_pr_repo_path | regex_replace('/+$', '')) ~ '/CHANGELOG.md',
          true
        )
      }}

# ── 3. Check Pending Changes ────────────────────────────────
# Purpose: Inspects existing state so the git-provider Server pull-request backend flow can decide whether to
- name: "PR — Check pending changes"  # noqa command-instead-of-module
  ansible.builtin.command:
    cmd: git status --porcelain
  args:
    chdir: "{{ git_work_dir }}"
  register: _pr_status
  changed_when: false
  check_mode: false

# Purpose: Builds, updates, or records pull-request state for the target repository change.
- name: "PR — No changes detected"
  ansible.builtin.set_fact:
    target_repo_pr_result:
      changed: false
      reason: "No target repo changes detected."
  when: _pr_status.stdout | length == 0

# ── 4–12. Main Block (only when changes exist) ──────────────
# Purpose: Groups related git-provider Server pull-request backend steps so shared rescue, cleanup, or
#   conditional logic can be applied consistently.
- name: "PR — Create or update automation PR"
  when: _pr_status.stdout | length > 0
  block:

    # ── 4. Parse repo URL into project/slug ──────────────────
    # Purpose: Reads existing state and converts it into facts without intentionally changing downstream
    #   systems.
    - name: "PR — Parse repo URL"
      ansible.builtin.set_fact:
        _pr_url_path: >-
          {{
            (git_repo_url | regex_replace('\.git$', '') | regex_replace('^git@[^:]+:', ''))
            if git_repo_url is match('^git@')
            else (git_repo_url | regex_replace('\.git$', '') | regex_replace('^https?://[^/]+/', ''))
          }}

    # Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task
    #   output for later git-provider Server pull-request backend steps.
    - name: "PR — Resolve project key and repo slug"
      ansible.builtin.set_fact:
        _pr_parts: "{{ _pr_url_path.split('/') | reject('equalto', '') | list }}"

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Set API identity"
      ansible.builtin.set_fact:
        _pr_project: >-
          {{
            git-provider_project_key | default('', true)
            or (_pr_parts[_pr_parts.index('projects') + 1] if 'projects' in _pr_parts else '')
            or (_pr_parts[1] if (_pr_parts | length >= 3 and _pr_parts[0] == 'scm') else '')
            or _pr_parts[-2]
          }}
        _pr_repo: "{{ git-provider_repo_slug | default('', true) or _pr_parts[-1] }}"
        _pr_api: >-
          {{
            (git-provider_internal_api_url | default('', true) | regex_replace('/$', ''))
            if (git-provider_internal_api_url | default('') | length > 0)
            else ((git_repo_url | regex_replace('^(https?://[^/]+).*$', '\1')) ~ '/rest/api/latest')
          }}

    # ── 5. Read Credentials ──────────────────────────────────
    # Purpose: Reads existing state and converts it into facts without intentionally changing downstream
    #   systems.
    - name: "PR — Read credentials"
      ansible.builtin.set_fact:
        _pr_token: >-
          {{
            lookup('ansible.builtin.env', 'git-provider_INTERNAL_TOKEN')
            | default(lookup('ansible.builtin.env', 'git-provider_TOKEN'), true)
          }}
        _pr_user: "{{ lookup('ansible.builtin.env', 'git-provider_USERNAME') }}"
        _pr_pass: "{{ lookup('ansible.builtin.env', 'git-provider_PASSWORD') }}"

    # Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task
    #   output for later git-provider Server pull-request backend steps.
    - name: "PR — Build auth header"
      ansible.builtin.set_fact:
        _pr_auth:
          Authorization: >-
            {{ 'Bearer ' ~ _pr_token if _pr_token | length > 0
               else 'Basic ' ~ ((_pr_user ~ ':' ~ _pr_pass) | b64encode) }}

    # Purpose: Fails early with a clear message when required git-provider Server pull-request backend inputs
    #   or configuration are missing or inconsistent.
    - name: "PR — Validate credentials"
      ansible.builtin.assert:
        that:
          - _pr_token | length > 0 or (_pr_user | length > 0 and _pr_pass | length > 0)
        fail_msg: "Set git-provider_INTERNAL_TOKEN or git-provider_USERNAME + git-provider_PASSWORD in AAP."

    # ── 6. Find Existing PR ──────────────────────────────────
    # Purpose: Inspects existing state so the git-provider Server pull-request backend flow can decide whether
    - name: "PR — List open pull requests"
      ansible.builtin.uri:
        url: "{{ _pr_api }}/projects/{{ _pr_project | urlencode }}/repos/{{ _pr_repo | urlencode }}/pull-requests?state=OPEN&limit=100"
        method: GET
        headers: "{{ _pr_auth }}"
        return_content: true
        validate_certs: "{{ git-provider_validate_certs | default(true) }}"
      register: _pr_list

    # Purpose: Initializes or updates Ansible facts that later tasks in the git-provider Server pull-request
    #   backend flow consume.
    - name: "PR — Initialize PR tracking"
      ansible.builtin.set_fact:
        _pr_existing_id: ""
        _pr_existing_branch: ""
        _pr_existing_version: ""
        _pr_existing_url: ""

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Match existing automation PR"
      ansible.builtin.set_fact:
        _pr_existing_id: "{{ item.id | string }}"
        _pr_existing_branch: "{{ item.fromRef.displayId | default(item.fromRef.id | regex_replace('^refs/heads/', '')) }}"
        _pr_existing_version: "{{ item.version | default('') }}"
        _pr_existing_url: "{{ (item.links.self[0].href) if (item.links.self | default([]) | length > 0) else '' }}"
      loop: "{{ _pr_list.json['values'] | default([]) }}"
      when:
        - _pr_existing_id | length == 0
        - (item.toRef.displayId | default(item.toRef.id | regex_replace('^refs/heads/', ''))) == target_branch
        - (item.fromRef.displayId | default(item.fromRef.id | regex_replace('^refs/heads/', ''))) is match('^' ~ _pr_qmgr_branch_prefix)

    # Purpose: Stops the workflow deliberately when a guard condition detects unsafe or unsupported state.
    - name: "PR — Stop create from reusing an existing queue manager PR"
      ansible.builtin.fail:
        msg: >-
          Create resolved {{ _pr_qmgr_label }}, but open PR
          {{ _pr_existing_id }} already uses automation branch
          {{ _pr_existing_branch }}. Pending create branches must reserve
          their sequence before a new queue manager is generated. Rerun the
          job so discovery selects the next free sequence, or delete the
          stale automation branch if that pending request was abandoned.
      when:
        - target_repo_pr_action_slug == 'qm-create'
        - _pr_existing_branch | length > 0

    # ── 7. Resolve Branch ────────────────────────────────────
    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Set branch"
      ansible.builtin.set_fact:
        _pr_branch: "{{ _pr_existing_branch if _pr_existing_branch | length > 0 else _pr_qmgr_branch_prefix ~ 'qmgr' }}"
        _pr_is_update: "{{ _pr_existing_branch | length > 0 }}"

    # ── 8. Fetch Existing Branch ─────────────────────────────
    # Purpose: Manipulates the local Git working copy used by the git-provider Server pull-request backend
    #   flow.
    - name: "PR — Fetch existing branch"
      ansible.builtin.command:
        argv: ["git", "fetch", "origin", "refs/heads/{{ _pr_branch }}:refs/remotes/origin/{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      failed_when: false
      when: _pr_is_update | bool
      check_mode: false

    # Purpose: Manipulates the local Git working copy used by the git-provider Server pull-request backend
    #   flow.
    - name: "PR — Stash generated changes before branch reuse"
      ansible.builtin.command:
        argv: ["git", "stash", "push", "--include-untracked", "-m", "mq-nativeha-pr-update-{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _pr_stash
      changed_when: "'No local changes' not in (_pr_stash.stdout | default(''))"
      when: _pr_is_update | bool
      check_mode: false

    # Purpose: Inspects existing state so the git-provider Server pull-request backend flow can decide whether
    - name: "PR — Checkout existing automation branch"
      ansible.builtin.command:
        argv: ["git", "checkout", "-B", "{{ _pr_branch }}", "refs/remotes/origin/{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      when: _pr_is_update | bool
      check_mode: false

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Reapply generated changes"
      ansible.builtin.command:
        argv: ["git", "stash", "pop"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      when:
        - _pr_is_update | bool
        - "'No local changes' not in (_pr_stash.stdout | default(''))"
      check_mode: false

    # Purpose: Inspects existing state so the git-provider Server pull-request backend flow can decide whether
    - name: "PR — Checkout new automation branch"
      ansible.builtin.command:
        argv: ["git", "checkout", "-B", "{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      when: not _pr_is_update | bool
      check_mode: false

    # Purpose: Manipulates the local Git working copy used by the git-provider Server pull-request backend
    #   flow.
    - name: "PR — Fetch base branch for root changelog restore"
      ansible.builtin.command:
        argv: ["git", "fetch", "origin", "refs/heads/{{ target_branch }}:refs/remotes/origin/{{ target_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      failed_when: false
      check_mode: false

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Restore root CHANGELOG.md from base branch"
      ansible.builtin.command:
        argv: ["git", "checkout", "refs/remotes/origin/{{ target_branch }}", "--", "CHANGELOG.md"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      failed_when: false
      check_mode: false

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Ensure queue manager changelog directory exists"
      ansible.builtin.file:
        path: "{{ git_work_dir }}/{{ _pr_changelog_rel | dirname }}"
        state: directory
        mode: "0755"

    # Purpose: Reads existing state and converts it into facts without intentionally changing downstream
    #   systems.
    - name: "PR — Read current queue manager CHANGELOG.md"
      ansible.builtin.slurp:
        src: "{{ git_work_dir }}/{{ _pr_changelog_rel }}"
      register: _pr_cl_raw_current
      failed_when: false
      changed_when: false

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Prepare current changelog text"
      ansible.builtin.set_fact:
        _pr_cl_text: >-
          {{ _pr_cl_raw_current.content | default('') | b64decode }}

    # Purpose: Reads existing state and converts it into facts without intentionally changing downstream
    #   systems.
    - name: "PR — Parse current queue manager changelog version"
      ansible.builtin.set_fact:
        _pr_cl_heading: >-
          {{
            (_pr_cl_text.splitlines() | select('match', '^## ') | first)
            | default('')
          }}

    # Purpose: Converts caller input into canonical runtime facts used by later git-provider Server pull-
    #   request backend tasks.
    - name: "PR — Normalize current queue manager changelog version"
      ansible.builtin.set_fact:
        _pr_cl_latest_version: >-
          {{
            (_pr_cl_heading | regex_search('[0-9]+[.][0-9]+[.][0-9]+') | default('', true))
            if _pr_cl_heading | length > 0 else ''
          }}

    # Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task
    #   output for later git-provider Server pull-request backend steps.
    - name: "PR — Compute queue manager changelog version"
      ansible.builtin.set_fact:
        _pr_ver: >-
          {{
            '1.0.1'
            if _pr_cl_version_parts | length != 3
            else _pr_cl_version_parts[0] ~ '.' ~ _pr_cl_version_parts[1]
                 ~ '.' ~ ((_pr_cl_version_parts[2] | int) + 1)
          }}
      vars:
        _pr_cl_version_parts: "{{ _pr_cl_latest_version.split('.') }}"

    # Purpose: Converts caller input into canonical runtime facts used by later git-provider Server pull-
    #   request backend tasks.
    - name: "PR — Normalize optional manager metadata"
      ansible.builtin.set_fact:
        _pr_namespace: "{{ vars.get('namespace', '') }}"
        _pr_instance_type: "{{ vars.get('instance_type', '') }}"
        _pr_size_tier: "{{ vars.get('selected_size_tier', '') }}"
        _pr_qmgr_size: >-
          {{
            vars.get('qmgr_size', {})
            if vars.get('qmgr_size', {}) is mapping
            else {}
          }}

    # ── 9. Write queue manager CHANGELOG.md ─────────────────
    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Write queue manager CHANGELOG.md"
      ansible.builtin.copy:
        dest: "{{ git_work_dir }}/{{ _pr_changelog_rel }}"
        mode: "0644"
        content: |
          {% set entry %}
          ## [{{ _pr_ver }}] - {{ now(utc=false, fmt='%Y-%m-%d') }}

          - Action: {{ target_repo_pr_action_label }}
          - Environment: {{ env_upper }}
          - Queue manager: {{ _pr_qmgr_label }}
          {% if _pr_namespace | string | length > 0 %}
          - Namespace: {{ _pr_namespace }}
          {% endif %}
          {% if _pr_instance_type | string | length > 0 %}
          - Instance type: {{ _pr_instance_type }}
          {% endif %}
          {% if _pr_size_tier | string | length > 0 %}
          - Size tier: {{ _pr_size_tier }}
          {% endif %}
          {% if _pr_qmgr_size | length > 0 %}
          - Runtime requests: {{ _pr_qmgr_size.request_cpu | default('n/a') }}/{{ _pr_qmgr_size.request_memory | default('n/a') }}
          - Runtime limits: {{ _pr_qmgr_size.limits_cpu | default('n/a') }}/{{ _pr_qmgr_size.limits_memory | default('n/a') }}
          - Storage: queue manager {{ _pr_qmgr_size.qmgr_storage | default('n/a') }}, logs {{ _pr_qmgr_size.log_storage | default('n/a') }}
          {% endif %}
          {% if _upgrade_version is defined %}
          - Requested MQ version: {{ _upgrade_version }}
          {% endif %}
          {% if _upgrade_image is defined %}
          - Requested image: {{ _upgrade_image }}
          {% endif %}
          {% if _upgrade_license_id is defined %}
          - License ID: {{ _upgrade_license_id }}
          {% endif %}
          {% if total_volume_24h is defined and avg_msg_size is defined %}
          - Sizing input: {{ total_volume_24h }} messages/day at {{ avg_msg_size }} average message size
          {% endif %}
          {% if _target_regions is defined %}
          - Regions: {{ _target_regions | join(', ') }}
          {% endif %}
          - Target path: {{ target_repo_pr_repo_path }}
          - Branch: {{ _pr_branch }} -> {{ target_branch }}
          - Pull request handling: {{ 'Updated existing open PR for this queue manager' if _pr_is_update | bool else 'Created new automation PR' }}
          - Summary: {{ target_repo_pr_summary }}
          - Validation: {{ target_repo_pr_validation }}
          - Merge: Manual approval required; automation does not merge PRs.

          {% endset %}
          {% if _pr_cl_text | trim | length == 0 %}
          # Changelog

          All notable MQ NativeHA target repository changes are recorded here.

          {{ entry }}
          {% elif _pr_cl_text is match('^# Changelog') %}
          # Changelog

          {{ entry }}
          {{ _pr_cl_text | regex_replace('^# Changelog', '') | trim }}
          {% else %}
          # Changelog

          {{ entry }}
          {{ _pr_cl_text }}
          {% endif %}

    # ── 10. Git Commit & Push ────────────────────────────────
    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Prepare title"
      ansible.builtin.set_fact:
        _pr_title: "[{{ env_upper }}] {{ target_repo_pr_action_label }} {{ _pr_title_subject }}"

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Prepare manager description"
      ansible.builtin.set_fact:
        _pr_description: |
          ## Manager Review Summary

          | Field | Value |
          | --- | --- |
          | Action | {{ target_repo_pr_action_label }} |
          | Environment | {{ env_upper }} |
          | Queue manager | {{ _pr_qmgr_label }} |
          {% if _pr_namespace | string | length > 0 %}
          | Namespace | {{ _pr_namespace }} |
          {% endif %}
          {% if _pr_instance_type | string | length > 0 %}
          | Instance type | {{ _pr_instance_type }} |
          {% endif %}
          {% if _pr_size_tier | string | length > 0 %}
          | Size tier | {{ _pr_size_tier }} |
          {% endif %}
          {% if _pr_qmgr_size | length > 0 %}
          | Runtime requests | {{ _pr_qmgr_size.request_cpu | default('n/a') }}/{{ _pr_qmgr_size.request_memory | default('n/a') }} |
          | Runtime limits | {{ _pr_qmgr_size.limits_cpu | default('n/a') }}/{{ _pr_qmgr_size.limits_memory | default('n/a') }} |
          | Storage | queue manager {{ _pr_qmgr_size.qmgr_storage | default('n/a') }}, logs {{ _pr_qmgr_size.log_storage | default('n/a') }} |
          {% endif %}
          {% if _upgrade_version is defined %}
          | Requested MQ version | {{ _upgrade_version }} |
          {% endif %}
          {% if _upgrade_image is defined %}
          | Requested image | {{ _upgrade_image }} |
          {% endif %}
          {% if _upgrade_license_id is defined %}
          | License ID | {{ _upgrade_license_id }} |
          {% endif %}
          {% if total_volume_24h is defined and avg_msg_size is defined %}
          | Sizing input | {{ total_volume_24h }} messages/day at {{ avg_msg_size }} average message size |
          {% endif %}
          {% if _target_regions is defined %}
          | Regions | {{ _target_regions | join(', ') }} |
          {% endif %}
          | Target path | {{ target_repo_pr_repo_path }} |
          | Base branch | {{ target_branch }} |
          | Automation branch | {{ _pr_branch }} |
          | Queue manager changelog version | {{ _pr_ver }} |
          | PR handling | {{ 'Updated existing open PR for this queue manager' if _pr_is_update | bool else 'Created new automation PR' }} |

          ## Change Summary

          {{ target_repo_pr_summary }}

          ## Validation

          {{ target_repo_pr_validation }}

          ## Approval Note

          Manual approval is required. Automation creates or updates this pull request but does not merge it.

    # Purpose: Publishes validated generated changes back to the target Git repository.
    - name: "PR — Stage all changes"
      ansible.builtin.command:
        argv: ["git", "add", "-A"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      check_mode: false

    # Purpose: Publishes validated generated changes back to the target Git repository.
    - name: "PR — Commit"
      ansible.builtin.command:
        argv: ["git", "commit", "-m", "{{ _pr_title }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      check_mode: false

    # Purpose: Manipulates the local Git working copy used by the git-provider Server pull-request backend
    #   flow.
    - name: "PR — Rebase existing branch before push"
      ansible.builtin.command:
        argv: ["git", "pull", "--rebase", "origin", "{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      when: _pr_is_update | bool
      check_mode: false

    # Purpose: Publishes validated generated changes back to the target Git repository.
    - name: "PR — Push"
      ansible.builtin.command:
        argv: ["git", "push", "origin", "HEAD:refs/heads/{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _pr_push
      changed_when: true
      failed_when: false
      check_mode: false

    # Purpose: Stops the workflow deliberately when a guard condition detects unsafe or unsupported state.
    - name: "PR — Fail on push rejection"
      ansible.builtin.fail:
        msg: >-
          Could not push automation branch {{ _pr_branch }}. Another job may
          have updated or reserved this queue manager branch at the same time.
          Rerun the job after the other run finishes. Git output:
          {{ (_pr_push.stderr | default('') ~ ' ' ~ _pr_push.stdout | default('')) | trim }}
      when: _pr_push.rc != 0

    # Purpose: Inspects existing state so the git-provider Server pull-request backend flow can decide whether
    - name: "PR — Recheck open pull requests before create"
      ansible.builtin.uri:
        url: "{{ _pr_api }}/projects/{{ _pr_project | urlencode }}/repos/{{ _pr_repo | urlencode }}/pull-requests?state=OPEN&limit=100"
        method: GET
        headers: "{{ _pr_auth }}"
        return_content: true
        validate_certs: "{{ git-provider_validate_certs | default(true) }}"
      register: _pr_late_list
      when: not _pr_is_update | bool

    # Purpose: Initializes or updates Ansible facts that later tasks in the git-provider Server pull-request
    #   backend flow consume.
    - name: "PR — Initialize late duplicate tracking"
      ansible.builtin.set_fact:
        _pr_late_existing_id: ""
        _pr_late_existing_branch: ""
      when: not _pr_is_update | bool

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Detect same queue manager PR created during this run"
      ansible.builtin.set_fact:
        _pr_late_existing_id: "{{ item.id | string }}"
        _pr_late_existing_branch: "{{ item.fromRef.displayId | default(item.fromRef.id | regex_replace('^refs/heads/', '')) }}"
      loop: "{{ _pr_late_list.json['values'] | default([]) }}"
      when:
        - not _pr_is_update | bool
        - _pr_late_existing_id | length == 0
        - (item.toRef.displayId | default(item.toRef.id | regex_replace('^refs/heads/', ''))) == target_branch
        - (item.fromRef.displayId | default(item.fromRef.id | regex_replace('^refs/heads/', ''))) is match('^' ~ _pr_qmgr_branch_prefix)

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Remove duplicate branch created by this run"
      ansible.builtin.command:
        argv: ["git", "push", "origin", ":refs/heads/{{ _pr_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      failed_when: false
      when:
        - not _pr_is_update | bool
        - _pr_late_existing_branch | length > 0
        - _pr_late_existing_branch != _pr_branch
      check_mode: false

    # Purpose: Stops the workflow deliberately when a guard condition detects unsafe or unsupported state.
    - name: "PR — Stop duplicate queue manager PR creation"
      ansible.builtin.fail:
        msg: >-
          Another open PR for {{ _pr_qmgr_label }} appeared while this job
          was running: {{ _pr_late_existing_branch }}. Automation keeps one open
          PR per queue manager. Rerun this job so it updates that PR instead of
          creating a competing PR. If this run pushed a separate duplicate branch,
          automation attempted to remove it.
      when:
        - not _pr_is_update | bool
        - _pr_late_existing_branch | length > 0

    # ── 11. Create/Update Pull Request ───────────────────────
    # Purpose: Derives runtime facts from AAP inputs, global variables, registry data, or earlier task
    #   output for later git-provider Server pull-request backend steps.
    - name: "PR — Build request body"
      ansible.builtin.set_fact:
        _pr_body:
          title: "{{ _pr_title }}"
          description: "{{ _pr_description }}"
          fromRef:
            id: "refs/heads/{{ _pr_branch }}"
            repository:
              slug: "{{ _pr_repo }}"
              project:
                key: "{{ _pr_project }}"
          toRef:
            id: "refs/heads/{{ target_branch }}"
            repository:
              slug: "{{ _pr_repo }}"
              project:
                key: "{{ _pr_project }}"

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Add existing pull request version"
      ansible.builtin.set_fact:
        _pr_body: "{{ _pr_body | combine({'version': _pr_existing_version | int}) }}"
      when: _pr_existing_id | length > 0

    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Create or update pull request"
      ansible.builtin.uri:
        url: >-
          {{
            _pr_api ~ '/projects/' ~ (_pr_project | urlencode)
            ~ '/repos/' ~ (_pr_repo | urlencode)
            ~ '/pull-requests'
            ~ ('/' ~ _pr_existing_id if _pr_existing_id | length > 0 else '')
          }}
        method: "{{ 'PUT' if _pr_existing_id | length > 0 else 'POST' }}"
        headers: "{{ _pr_auth }}"
        body_format: json
        body: "{{ _pr_body }}"
        return_content: true
        status_code: [200, 201]
        validate_certs: "{{ git-provider_validate_certs | default(true) }}"
      register: _pr_resp

    # ── 12. Store Result ─────────────────────────────────────
    # Purpose: Builds, updates, or records pull-request state for the target repository change.
    - name: "PR — Store result"
      ansible.builtin.set_fact:
        target_repo_pr_result:
          changed: true
          action: "{{ 'updated' if _pr_is_update | bool else 'created' }}"
          mode: "pull_request"
          version: "{{ _pr_ver }}"
          branch: "{{ _pr_branch }}"
          base_branch: "{{ target_branch }}"
          pull_request_id: "{{ _pr_resp.json.id | default(_pr_existing_id) }}"
          pull_request_url: >-
            {{
              (_pr_resp.json.links.self[0].href)
              if (_pr_resp.json.links is defined and (_pr_resp.json.links.self | default([]) | length > 0))
              else _pr_existing_url
            }}

# ── Display ─────────────────────────────────────────────────
# Purpose: Builds, updates, or records pull-request state for the target repository change.
- name: "PR — No changes"
  ansible.builtin.debug:
    msg: "{{ target_repo_pr_result.reason }}"
  when: not target_repo_pr_result.changed | bool

# Purpose: Builds, updates, or records pull-request state for the target repository change.
- name: "PR — Done"  # noqa no-handler
  ansible.builtin.debug:
    msg:
      - "PR {{ target_repo_pr_result.action }} — v{{ target_repo_pr_result.version }}"
      - "Branch : {{ target_repo_pr_result.branch }}"
      - "Base   : {{ target_repo_pr_result.base_branch }}"
      - "PR URL : {{ target_repo_pr_result.pull_request_url | default('n/a') }}"
  when: target_repo_pr_result.changed | bool
