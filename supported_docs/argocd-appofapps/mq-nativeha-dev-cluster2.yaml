---
# ============================================================
# ArgoCD App of Apps — MQ NativeHA DEV / US-West
# ============================================================
#
# PURPOSE:
#   This is a "parent" ArgoCD Application that watches the
#   argocd_mq_applications/cluster2/ directory in the DEV manifest repo.
#   Any child Application YAML pushed to that directory by Ansible
#   is automatically discovered, synced, and deployed.
#
# CREATED BY:  ArgoCD admin (one-time setup)
# MANAGED BY:  ArgoCD (self-healing)
# DO NOT:      Let Ansible generate or overwrite this file.
#
# NOTE:
#   DEV environment typically uses NHA (single-region) only, so this
#   directory may remain empty. This app is created proactively so
#   that if a DEV NHACRR queue manager is ever needed, it works
#   immediately without admin intervention.
#
# To apply:
#   oc apply -f setup/argocd-appofapps/mq-nativeha-dev-cluster2.yaml
#
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mq-nativeha-dev-cluster2
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: mq-nativeha
    app.kubernetes.io/component: app-of-apps
    mq.ibm.com/environment: DEV
    mq.ibm.com/region: cluster2
  annotations:
    argocd.argoproj.io/description: >-
      Parent app that auto-discovers and deploys all MQ queue manager
      ArgoCD Applications for the DEV environment in the US-West region.
spec:
  project: default
  source:
    repoURL: git@bitbucket.org:example/mq-nativeha-dev.git
    targetRevision: develop
    path: argocd_mq_applications/cluster2
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
