---
# ============================================================
# ArgoCD App of Apps — MQ NativeHA DEV / US-East
# ============================================================
#
# PURPOSE:
#   This is a "parent" ArgoCD Application that watches the
#   argocd_mq_applications/cluster1/ directory in the DEV manifest repo.
#   Any child Application YAML pushed to that directory by Ansible
#   is automatically discovered, synced, and deployed.
#
# CREATED BY:  ArgoCD admin (one-time setup)
# MANAGED BY:  ArgoCD (self-healing)
# DO NOT:      Let Ansible generate or overwrite this file.
#
# To apply:
#   oc apply -f setup/argocd-appofapps/mq-nativeha-dev-cluster1.yaml
#
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mq-nativeha-dev-cluster1
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: mq-nativeha
    app.kubernetes.io/component: app-of-apps
    mq.ibm.com/environment: DEV
    mq.ibm.com/region: cluster1
  annotations:
    argocd.argoproj.io/description: >-
      Parent app that auto-discovers and deploys all MQ queue manager
      ArgoCD Applications for the DEV environment in the US-East region.
spec:
  project: default
  source:
    repoURL: git@bitbucket.org:example/mq-nativeha-dev.git
    targetRevision: develop
    path: argocd_mq_applications/cluster1
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
