---
# =============================================================
#  _check_one_qmgr_iter.yaml — Internal iterator for check_all
# =============================================================
#
#  Called by check_all_qmgrs.yaml in a loop. For each queue manager
#  entry from the registry, iterates its cert types and runs
#  verify_cert_health.yaml.
#
#  INPUT (loop_var from parent):
#    _qmgr_item.key   — qmgr_name (e.g. "qmmdev001")
#    _qmgr_item.value  — registry entry dict
#
# =============================================================

- name: "Monitor All — Resolve cert types for {{ _qmgr_item.key | upper }}"  # noqa name[template]
  ansible.builtin.set_fact:
    _iter_cert_types: "{{ instance_cert_map[_qmgr_item.value.instance_type | default('nha')] }}"
    _registry_refresh: {}

- name: "Monitor All — Checking {{ _qmgr_item.key | upper }}"  # noqa name[template]
  ansible.builtin.debug:
    msg: "Queue Manager: {{ _qmgr_item.key | upper }}, Environment: {{ _qmgr_item.value.environment | default('?') }}"

# Verify each cert type for this queue manager
- name: "Monitor All — Verify certs for {{ _qmgr_item.key | upper }}"  # noqa name[template]
  ansible.builtin.include_tasks: verify_cert_health.yaml
  loop: "{{ _iter_cert_types }}"
  loop_control:
    loop_var: _monitor_cert_type
    label: "{{ _monitor_cert_type }}"
  vars:
    _monitor_qmgr_name: "{{ _qmgr_item.key }}"
    _monitor_qmgr_name_upper: "{{ _qmgr_item.key | upper }}"
    _monitor_app_prefix: "{{ _qmgr_item.value.app_prefix | default(_qmgr_item.key[0:3] | upper) }}"
    _monitor_namespace: "{{ _qmgr_item.value.namespace }}"
    _monitor_environment: "{{ _qmgr_item.value.environment | default('DEV') }}"
    _monitor_cert_data: "{{ _qmgr_item.value.certs[_monitor_cert_type] | default({}) }}"
    _monitor_tmp_dir: "{{ _monitor_tmp.path }}"

# Collect registry update for this qmgr
- name: "Monitor All — Queue registry update for {{ _qmgr_item.key | upper }}"  # noqa name[template]
  ansible.builtin.set_fact:
    _all_registries_to_update: >-
      {{ _all_registries_to_update | default([]) + [{
           'qmgr_name': _qmgr_item.key,
           'data': {
             'app_prefix': _qmgr_item.value.app_prefix | default(''),
             'environment': _qmgr_item.value.environment | default(''),
             'sequence_number': _qmgr_item.value.sequence_number | default(''),
             'instance_type': _qmgr_item.value.instance_type | default('nha'),
             'namespace': _qmgr_item.value.namespace,
             'last_updated': now(utc=true) | string,
             'certs': _registry_refresh
           }
         }] }}
  when: _registry_refresh | length > 0
