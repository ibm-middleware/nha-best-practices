---
# =============================================================
#  verify_cert_health.yaml — Live Certificate Health Check
# =============================================================
#
#  PURPOSE:
#    Verifies the health of a single certificate by reading from
#    Vault and optionally cross-checking with Venafi.
#
#  CALLED WITH:
#    qmgr_name     — Queue manager name
#    cert_type     — app | nativeha | crr
#    namespace     — Kubernetes namespace
#    mq_environment — DEV | QA1 | QA2 | STG | PROD
#
#  OUTPUTS:
#    cert_health_status — healthy | expiring_soon | expired | missing | corrupt | desync
#    cert_days_remaining — Days until expiry (or negative if expired)
#
#  HEALTH STATUSES:
#    ✅ healthy       — Cert valid, > threshold days remaining
#    ⚠️  expiring_soon — Cert valid, ≤ threshold days remaining
#    🔴 expired       — Cert past not_after date
#    ❌ missing       — Cert not found in Vault
#    ❌ corrupt       — Cert in Vault but PEM is unreadable
#    🔶 desync        — Valid in Vault but missing from Venafi
#
# =============================================================

# Normalize the variable names passed by the calling monitor task.
# This keeps the reusable verifier focused on cert logic rather than
# on how each parent task names its loop variables.
- name: Resolve monitor context for certificate health verification
  ansible.builtin.set_fact:
    qmgr_name: "{{ _monitor_qmgr_name | default(qmgr_name) }}"
    qmgr_name_upper: "{{ _monitor_qmgr_name_upper | default((_monitor_qmgr_name | default(qmgr_name)) | upper) }}"
    app_prefix: "{{ _monitor_app_prefix | default(app_prefix) }}"
    app_prefix_normalized: "{{ (_monitor_app_prefix | default(app_prefix)) | lower }}"
    namespace: "{{ _monitor_namespace | default(namespace) }}"
    mq_environment: "{{ _monitor_environment | default(mq_environment) }}"
    cert_type: "{{ _monitor_cert_type | default(cert_type) }}"
    _monitor_tmp_dir_resolved: "{{ _monitor_tmp_dir | default('/tmp') }}"

- name: Resolve Venafi object name for certificate health verification
  ansible.builtin.set_fact:
    _venafi_cert_dn: "{{ venafi_policy_dn ~ '\\\\' ~ qmgr_name ~ '_' ~ cert_type_csr_suffix[cert_type] }}"

- name: Resolve Vault security zone for certificate health verification
  ansible.builtin.set_fact:
    _zone: "{{ 'hra' if app_prefix_normalized in vault_security_zones.hra.apps else 'sra' }}"

- name: Resolve Vault namespace and mount for certificate health verification
  ansible.builtin.set_fact:
    vault_namespace: "{{ vault_security_zones[_zone].label | default('') }}"
    vault_cert_mount_point: "{{ vault_security_zones[_zone].mount }}"

# ── Reset state ──────────────────────────────────────────────
- name: Reset health check state for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    cert_health_status: "unknown"
    cert_days_remaining: null
    cert_not_before: ""
    cert_not_after: ""
    cert_common_name: ""
    cert_thumbprint: ""
    _cert_in_vault: false
    _cert_in_venafi: false
    _vault_read: {}

# ── Resolve Vault path ───────────────────────────────────────
- name: Resolve Vault path for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    _vault_cert_path: "{{ vault_cert_base_path }}/{{ cert_type_vault_subpath[cert_type] }}"

# ── Read from Vault ──────────────────────────────────────────
- name: "Dynamically include Vault read operations"
  ansible.builtin.include_tasks: vault_read.yaml
  when: not (skip_vault_operations | default(false) | bool)

- name: Set cert_in_vault flag for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    _cert_in_vault: >-
      {{ _vault_read is not failed and
         _vault_read.data is defined and
         _vault_read.data.data is defined and
         _vault_read.data.data['tls.crt'] is defined }}

# ── Parse certificate if found ───────────────────────────────
- name: Parse certificate expiry for {{ qmgr_name }}/{{ cert_type }}
  when: _cert_in_vault | bool
  block:
    - name: Write PEM to temp file for {{ qmgr_name }}/{{ cert_type }}
      ansible.builtin.copy:
        content: "{{ _vault_read.data.data['tls.crt'] }}"
        dest: "{{ _monitor_tmp_dir_resolved }}/{{ qmgr_name }}_{{ cert_type }}_check.crt"
        mode: "0600"

    - name: Extract certificate info for {{ qmgr_name }}/{{ cert_type }}
      community.crypto.x509_certificate_info:
        path: "{{ _monitor_tmp_dir_resolved }}/{{ qmgr_name }}_{{ cert_type }}_check.crt"
      register: _cert_info

    - name: Calculate days remaining for {{ qmgr_name }}/{{ cert_type }}
      ansible.builtin.set_fact:
        cert_days_remaining: >-
          {{ ((_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) - (now(utc=true))).days | int }}
        cert_not_before: "{{ _cert_info.not_before }}"
        cert_not_after: "{{ _cert_info.not_after }}"
        cert_common_name: "{{ _cert_info.subject.commonName | default(qmgr_name ~ '.example.lab') }}"
        cert_thumbprint: "{{ _cert_info.fingerprints.sha256 | default('') }}"

    - name: Remove temp cert file for {{ qmgr_name }}/{{ cert_type }}
      ansible.builtin.file:
        path: "{{ _monitor_tmp_dir_resolved }}/{{ qmgr_name }}_{{ cert_type }}_check.crt"
        state: absent

  rescue:
    - name: Mark as corrupt for {{ qmgr_name }}/{{ cert_type }}
      ansible.builtin.set_fact:
        cert_health_status: "corrupt"
        cert_days_remaining: null

# ── Determine health status ──────────────────────────────────
- name: Set health status - missing
  ansible.builtin.set_fact:
    cert_health_status: "missing"
  when: not (_cert_in_vault | bool)

- name: Set health status - expired
  ansible.builtin.set_fact:
    cert_health_status: "expired"
  when:
    - _cert_in_vault | bool
    - cert_days_remaining is not none
    - cert_days_remaining | int <= 0

- name: Set health status - expiring_soon
  ansible.builtin.set_fact:
    cert_health_status: "expiring_soon"
  when:
    - _cert_in_vault | bool
    - cert_days_remaining is not none
    - cert_days_remaining | int > 0
    - cert_days_remaining | int <= cert_renewal_threshold_days | int

- name: Set health status - healthy
  ansible.builtin.set_fact:
    cert_health_status: "healthy"
  when:
    - _cert_in_vault | bool
    - cert_days_remaining is not none
    - cert_days_remaining | int > cert_renewal_threshold_days | int

- name: Cross-check Venafi for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.uri:
    url: "{{ venafi_url }}{{ venafi_cert_search }}?ObjectDN={{ _venafi_cert_dn | urlencode }}"
    method: GET
    headers:
      accept: "application/json"
      Authorization: "Bearer {{ venafi_token }}"
    validate_certs: "{{ venafi_validate_certs }}"
    status_code: [200, 400, 404]
  register: _venafi_check
  failed_when: false
  when:
    - _cert_in_vault | bool
    - cert_health_status in ['healthy', 'expiring_soon']

- name: Set Venafi presence flag for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    _cert_in_venafi: >-
      {{ _venafi_check is defined and
         _venafi_check.status | default(0) == 200 and
         _venafi_check.json.Certificates | default([]) | length > 0 }}
  when:
    - _cert_in_vault | bool
    - cert_health_status in ['healthy', 'expiring_soon']

- name: Set health status - desync
  ansible.builtin.set_fact:
    cert_health_status: "desync"
  when:
    - _cert_in_vault | bool
    - cert_health_status in ['healthy', 'expiring_soon']
    - not (_cert_in_venafi | bool)

# ── Send SMTP alert if needed ────────────────────────────────
- name: Send SMTP alert for certificate issues
  community.general.mail:
    host: "{{ smtp_host }}"
    port: "{{ smtp_port }}"
    from: "{{ smtp_from }}"
    to: "{{ smtp_to }}"
    subject: "{{ smtp_subject_prefix }} {{ qmgr_name | upper }} - {{ cert_type | upper }} - {{ cert_health_status | upper }}"
    body: |
      MQ Certificate Health Alert
      ===========================
      
      Queue Manager: {{ qmgr_name | upper }}
      Environment: {{ mq_environment | upper }}
      Namespace: {{ namespace }}
      Certificate Type: {{ cert_type | upper }}
      
      Status: {{ cert_health_status | upper }}
      Days Remaining: {{ cert_days_remaining | default('N/A') }}
      Expiry Date: {{ cert_not_after | default('N/A') }}
      
      Vault Path: {{ _vault_cert_path }}
      Venafi DN: {{ _venafi_cert_dn }}
      
      Action Required:
      {% if cert_health_status == 'expired' %}
      ⚠️  IMMEDIATE - Certificate has expired!
      Run renewal playbook immediately:
        ansible-playbook NativeHA_Cert_Management.yaml \
          -e cert_action=renew \
          -e app_prefix={{ qmgr_name[:3] | upper }} \
          -e mq_environment={{ mq_environment | upper }} \
          -e sequence_number={{ qmgr_name[-3:] }}
      {% elif cert_health_status == 'expiring_soon' %}
      ⚠️  Renew certificate within {{ cert_renewal_threshold_days }} days
      {% elif cert_health_status == 'missing' %}
      ❌ Certificate not found in Vault - provision required
      {% elif cert_health_status == 'corrupt' %}
      ❌ Certificate in Vault is corrupt - re-provision required
      {% else %}
      🔶 Investigate and resolve certificate issue
      {% endif %}
      
      Timestamp: {{ now(utc=true) }}
      
      ---
      This is an automated alert from MQ Certificate Automation
  when:
    - smtp_enabled | default(false) | bool
    - cert_health_status in alert_on_statuses
  delegate_to: localhost
  failed_when: false

# ── Display result ───────────────────────────────────────────
- name: Health check result for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.debug:
    msg: "{{ qmgr_name_upper }}/{{ cert_type | upper }}: {{ cert_health_status | upper }} ({{ cert_days_remaining | default('N/A') }} days, vault={{ _cert_in_vault }}, venafi={{ _cert_in_venafi }})"

- name: Add health report row for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    _health_report: >-
      {{ _health_report + [{
           'qmgr': qmgr_name_upper,
           'cert_type': cert_type,
           'status': cert_health_status,
           'status_icon': _status_icons[cert_health_status] | default('UNKNOWN'),
           'days_remaining': cert_days_remaining | default('N/A'),
           'in_vault': _cert_in_vault,
           'in_venafi': _cert_in_venafi
         }] }}
  vars:
    _status_icons:
      healthy: "HEALTHY"
      expiring_soon: "EXPIRING"
      expired: "EXPIRED"
      missing: "MISSING"
      corrupt: "CORRUPT"
      desync: "DESYNC"

- name: Refresh registry entry for {{ qmgr_name }}/{{ cert_type }}
  ansible.builtin.set_fact:
    _registry_refresh: >-
      {{ _registry_refresh | combine({
           cert_type: {
             'status': cert_health_status,
             'common_name': cert_common_name | default(_monitor_cert_data.common_name | default(qmgr_name ~ '.example.lab')),
             'thumbprint': cert_thumbprint | default(_monitor_cert_data.thumbprint | default('')),
             'not_before': cert_not_before | default(_monitor_cert_data.not_before | default('')),
             'not_after': cert_not_after | default(_monitor_cert_data.not_after | default('')),
             'days_remaining': cert_days_remaining | default(_monitor_cert_data.days_remaining | default('')),
             'venafi_dn': _monitor_cert_data.venafi_dn | default(_venafi_cert_dn),
             'venafi_guid': _monitor_cert_data.venafi_guid | default(''),
             'vault_path': _vault_cert_path,
             'last_action': _monitor_cert_data.last_action | default('monitor'),
             'last_action_date': _monitor_cert_data.last_action_date | default(now(utc=true) | string)
           }
         }) }}

