---
# =============================================================
#  check_existing_cert.yaml — Vault & Venafi Pre-Validation
# =============================================================
#
#  PURPOSE:
#    Before requesting a new certificate from Venafi, check if
#    a valid one already exists in Vault (and optionally Venafi).
#    This prevents unnecessary certificate churn and ensures
#    idempotent behavior.
#
#  CALLED WITH:
#    cert_type  — loop var: app | nativeha | crr
#
#  DECISION TREE:
#    ┌─ Vault read FAILS (404/missing)
#    │  └─► cert_action = "request_new"
#    │
#    ├─ Vault read OK but PEM parse FAILS
#    │  └─► cert_action = "request_new"
#    │
#    ├─ Cert EXPIRED
#    │  └─► cert_action = "renew"
#    │
#    ├─ Cert expires within threshold (≤ N days)
#    │  └─► cert_action = "renew"
#    │
#    └─ Cert valid beyond threshold
#       ├─ Venafi says cert missing/revoked
#       │  └─► cert_action = "request_new"
#       └─ Venafi confirms valid
#          └─► cert_action = "skip"
#
#  OUTPUT:
#    Updates the 'cert_actions' dict with:
#      cert_actions[cert_type] = { action, reason }
#
# =============================================================

# ── Reset per-iteration state ────────────────────────────────
# Ansible set_fact is play-scoped, so values from previous loop
# iterations would leak. We must explicitly reset them.
- name: Reset iteration state for {{ cert_type }}
  ansible.builtin.set_fact:
    _cert_in_vault: false
    _cert_days_remaining: null
    _cert_not_after: ""
    _cert_subject_cn: ""
    cert_action: ""
    cert_action_reason: ""
    _vault_read: {}

# ── Resolve Vault path ───────────────────────────────────────
- name: Resolve Vault path for {{ cert_type }}
  ansible.builtin.set_fact:
    _vault_cert_path: "{{ vault_cert_base_path }}/{{ cert_type_vault_subpath[cert_type] }}"

- name: Display validation target for {{ cert_type }}
  ansible.builtin.debug:
    msg: "Reading Vault KV: {{ vault_cert_mount_point }}/data/{{ _vault_cert_path }}"

# ══════════════════════════════════════════════════════════════
# PHASE 1: Read cert from Vault
# ══════════════════════════════════════════════════════════════
- name: "Dynamically include Vault read operations"
  ansible.builtin.include_tasks: vault_read.yaml
  when: not (skip_vault_operations | default(false) | bool)

- name: Set cert_in_vault flag for {{ cert_type }}
  ansible.builtin.set_fact:
    _cert_in_vault: >-
      {{ _vault_read is not failed and
         _vault_read.data is defined and
         _vault_read.data.data is defined and
         _vault_read.data.data['tls.crt'] is defined }}

# ══════════════════════════════════════════════════════════════
# PHASE 2: Parse certificate expiry (only if found in Vault)
# ══════════════════════════════════════════════════════════════
- name: Parse cert expiry for {{ cert_type }}
  when: _cert_in_vault | bool
  block:
    - name: Write PEM to temp file for {{ cert_type }}
      ansible.builtin.copy:
        content: "{{ _vault_read.data.data['tls.crt'] }}"
        dest: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
        mode: "0600"

    - name: Extract certificate info for {{ cert_type }}
      community.crypto.x509_certificate_info:
        path: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
      register: _cert_info

    - name: Calculate days remaining for {{ cert_type }}
      ansible.builtin.set_fact:
        _cert_days_remaining: >-
          {{ ((_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) - (now(utc=true))).days | int }}
        _cert_not_after: "{{ _cert_info.not_after }}"
        _cert_subject_cn: "{{ _cert_info.subject.commonName | default('unknown') }}"

    - name: Display existing cert for {{ cert_type }}
      ansible.builtin.debug:
        msg: "Found in Vault: CN={{ _cert_subject_cn }}, expires={{ _cert_not_after }}, {{ _cert_days_remaining }} days remaining"

    - name: Remove temp cert file for {{ cert_type }}
      ansible.builtin.file:
        path: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
        state: absent

  rescue:
    # If parsing fails, treat as needing a new cert
    - name: PEM parse failed for {{ cert_type }}
      ansible.builtin.set_fact:
        _cert_days_remaining: null

# ══════════════════════════════════════════════════════════════
# PHASE 3: Decide Action
# ══════════════════════════════════════════════════════════════

# CASE A: Not in Vault → request new
- name: "DECISION: REQUEST_NEW — not in Vault — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "request_new"
    cert_action_reason: "Certificate not found in Vault"
  when: not (_cert_in_vault | bool)

# CASE B: In Vault but parse failed → request new
- name: "DECISION: REQUEST_NEW — parse failed — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "request_new"
    cert_action_reason: "Certificate in Vault but PEM is corrupt/unreadable"
  when:
    - _cert_in_vault | bool
    - _cert_days_remaining is none or _cert_days_remaining == ''

# CASE C: Expired → renew
- name: "DECISION: RENEW — expired — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Expired {{ (_cert_days_remaining | int | abs) }} days ago ({{ _cert_not_after }})"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int <= 0

# CASE D: Expiring within threshold → renew
- name: "DECISION: RENEW — within threshold — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Expires in {{ _cert_days_remaining }} days (threshold={{ cert_renewal_threshold_days }}d, {{ _cert_not_after }})"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > 0
    - _cert_days_remaining | int <= cert_renewal_threshold_days | int

# CASE E: Valid beyond threshold → skip (pending Venafi cross-check)
- name: "DECISION: SKIP — valid — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "skip"
    cert_action_reason: "Valid — {{ _cert_days_remaining }} days remaining (threshold={{ cert_renewal_threshold_days }}d)"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > cert_renewal_threshold_days | int
    - not (cert_force_renew | default(false) | bool)

# CASE E2: Valid beyond threshold but force-renew requested → renew
- name: "DECISION: RENEW — force renew — {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Force-renewed ({{ _cert_days_remaining }} days remaining, user requested renew)"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > cert_renewal_threshold_days | int
    - cert_force_renew | default(false) | bool

# ══════════════════════════════════════════════════════════════
# PHASE 4: Venafi Cross-Check (only if we would skip)
# ══════════════════════════════════════════════════════════════
# If cert is valid in Vault but missing/revoked in Venafi,
# override to request_new so both systems stay in sync.
- name: Venafi cross-check for {{ cert_type }}
  when: cert_action == 'skip'
  block:
    - name: Query Venafi for cert status — {{ cert_type }}
      ansible.builtin.uri:
        url: >-
          {{ venafi_url }}{{ venafi_cert_search }}?ObjectDN={{
            (venafi_policy_dn ~ '\\' ~ qmgr_name ~ '_' ~ cert_type_csr_suffix[cert_type])
            | urlencode }}
        method: GET
        headers:
          accept: "application/json"
          Authorization: "Bearer {{ venafi_token }}"
        validate_certs: "{{ venafi_validate_certs }}"
        status_code: [200, 400, 404]
      register: _venafi_check
      failed_when: false

    - name: "Override to REQUEST_NEW — not in Venafi — {{ cert_type }}"
      ansible.builtin.set_fact:
        cert_action: "request_new"
        cert_action_reason: "Valid in Vault but missing/revoked in Venafi — re-requesting for sync"
      when: >-
        _venafi_check is failed or
        _venafi_check.status | default(0) != 200 or
        _venafi_check.json.Certificates | default([]) | length == 0

# ══════════════════════════════════════════════════════════════
# PHASE 5: Record Decision
# ══════════════════════════════════════════════════════════════
- name: "Decision result for {{ cert_type }}"
  ansible.builtin.debug:
    msg: "[{{ cert_type }}] {{ cert_action | upper }} — {{ cert_action_reason }}"

- name: Record decision in cert_actions for {{ cert_type }}
  ansible.builtin.set_fact:
    cert_actions: >-
      {{ cert_actions | combine({
           cert_type: {
             'action': cert_action,
             'reason': cert_action_reason
           }
         })
      }}
