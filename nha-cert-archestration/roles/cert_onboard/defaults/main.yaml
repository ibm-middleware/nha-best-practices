---
# Role defaults — overridden by survey variables / extra_vars
# These serve as documentation of expected inputs.

# Survey variables (provided by AAP survey or --extra-vars)
# app_prefix:       Application prefix, e.g. "QMM"
# mq_environment:   "DEV", "QA1", "QA2", "STG", or "PROD"
# sequence_number:  e.g. "001"
# instance_type:    "single", "nha", or "nhacrr"

# Force-renew flag — set to true via 'renew' cert_action
# When true, overrides the "skip if valid" check to force renewal
# of all cert types regardless of remaining validity.
cert_force_renew: false  # noqa var-naming[no-role-prefix]
