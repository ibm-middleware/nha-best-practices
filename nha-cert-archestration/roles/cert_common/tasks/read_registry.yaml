---
# =============================================================
#  read_registry.yaml — Read Certificate Registry from Git
# =============================================================
#
#  PURPOSE:
#    Clones the repo and reads the cert_inventory.yaml into
#    an Ansible fact for use by cert_monitor.
#
#  OUTPUT:
#    cert_registry  — dict of all managed queue managers + certs
#
# =============================================================

# ── 1. Clone repo ───────────────────────────────────────────
- name: "Registry Read — Clean working directory"
  ansible.builtin.file:
    path: "{{ cert_git_work_dir }}"
    state: absent

- name: "Registry Read — Clone repo ({{ cert_git_branch }} branch)"  # noqa name[template]
  ansible.builtin.git:
    repo: "{{ cert_git_base_url }}"
    dest: "{{ cert_git_work_dir }}"
    version: "{{ cert_git_branch }}"
    force: true
    accept_hostkey: true

# ── 2. Read registry ────────────────────────────────────────
- name: "Registry Read — Check if inventory file exists"
  ansible.builtin.stat:
    path: "{{ cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_file

- name: "Registry Read — Fail if registry does not exist"
  ansible.builtin.fail:
    msg: >-
      Certificate registry not found at {{ cert_registry_path }}.
      Run an onboard action first to initialize the registry.
  when: not _registry_file.stat.exists

- name: "Registry Read — Read inventory file"
  ansible.builtin.slurp:
    src: "{{ cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_raw

- name: "Registry Read — Parse inventory"
  ansible.builtin.set_fact:
    cert_registry: >-
      {{ (_registry_raw.content | b64decode | from_yaml).certificates | default({}) }}

- name: "Registry Read — Loaded {{ cert_registry | length }} queue manager(s)"  # noqa name[template]
  ansible.builtin.debug:
    msg: "Registry contains {{ cert_registry | length }} queue manager(s): {{ cert_registry.keys() | list | join(', ') | default('none') }}"
