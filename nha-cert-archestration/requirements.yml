---
# ============================================================
# Collection Requirements — MQ Certificate Management
# ============================================================
# This file is part of the promoted payload.
# Install via: ansible-galaxy collection install -r requirements.yml
#
# Required for:
#   - Venafi TPP certificate operations (venafi.machine_identity.venafi_certificate)
#   - X.509 certificate parsing & validation (community.crypto)
#   - Vault KV read/write/delete operations (community.hashi_vault)
#   - SMTP alerting (community.general.mail)
# ============================================================

collections:
  - name: venafi.machine_identity
    version: ">=1.4.0"
    source: https://galaxy.ansible.com

  - name: community.general
    version: ">=8.0.0"
    source: https://galaxy.ansible.com

  - name: community.crypto
    version: ">=2.0.0"
    source: https://galaxy.ansible.com

  - name: community.hashi_vault
    version: ">=6.0.0"
    source: https://galaxy.ansible.com
