---
# ============================================================
# Update sizing only for an existing queue manager
# ============================================================
#
# Update runs are intentionally narrow. They do not regenerate base
# resources, overlays, static files, secrets, monitoring, or ArgoCD apps.
# The only allowed target-repo change before CHANGELOG.md is:
#   <qmgr_rel_path>/base/qmgr.yaml
#
# ============================================================

- name: "Sizing update — Check base QueueManager manifest"
  ansible.builtin.stat:
    path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/base/qmgr.yaml"
  register: _qmgr_base_manifest

- name: "Sizing update — Fail if base QueueManager manifest is missing"
  ansible.builtin.fail:
    msg: >-
      Missing {{ qmgr_rel_path }}/base/qmgr.yaml. Sizing update requires an
      existing Base + Overlays queue manager layout.
  when: not _qmgr_base_manifest.stat.exists

- name: "Sizing update — Update pod resource requests and limits"
  ansible.builtin.replace:
    path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/base/qmgr.yaml"
    regexp: "{{ _qmgr_sizing_resources_regexp }}"
    replace: >-
      \1"{{ qmgr_size.request_cpu }}"\2"{{ qmgr_size.request_memory }}"\3"{{ qmgr_size.limits_cpu }}"\4"{{ qmgr_size.limits_memory }}"
  vars:
    _qmgr_sizing_resources_regexp: >-
      {{ [
           '(^          resources:\n            requests:\n              cpu: ).*',
           '(\n              memory: ).*',
           '(\n            limits:\n              cpu: ).*',
           '(\n              memory: ).*$'
         ] | join('') }}

- name: "Sizing update — Update log file pages"
  ansible.builtin.replace:
    path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/base/qmgr.yaml"
    regexp: '(^      recoveryLogs:\n        logFilePages: ).*$'
    replace: '\g<1>{{ qmgr_size.log_file_pages | default(32768) }}'

- name: "Sizing update — Update persistent storage sizes"
  ansible.builtin.replace:
    path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/base/qmgr.yaml"
    regexp: "{{ _qmgr_sizing_storage_regexp }}"
    replace: >-
      \1{{ storage_class_name }}\2"{{ qmgr_size.qmgr_storage }}"\3{{ storage_class_name }}\4"{{ qmgr_size.log_storage }}"
  vars:
    _qmgr_sizing_storage_regexp: >-
      {{ [
           '(^      storage:\n        queueManager:\n          type: persistent-claim\n          class: ).*',
           '(\n          size: ).*',
           '(\n        recoveryLogs:\n          type: persistent-claim\n          enabled: true\n          class: ).*',
           '(\n          size: ).*$'
         ] | join('') }}

- name: "Sizing update — Read updated QueueManager manifest"
  ansible.builtin.slurp:
    src: "{{ git_work_dir }}/{{ qmgr_rel_path }}/base/qmgr.yaml"
  register: _qmgr_base_manifest_raw

- name: "Sizing update — Parse updated QueueManager manifest"
  ansible.builtin.set_fact:
    _qmgr_base_manifest_doc: "{{ _qmgr_base_manifest_raw.content | b64decode | from_yaml }}"

- name: "Sizing update — Validate sizing fields"
  ansible.builtin.assert:
    that:
      - _qmgr_base_manifest_doc.spec.template.pod.containers[0].resources.requests.cpu == qmgr_size.request_cpu
      - _qmgr_base_manifest_doc.spec.template.pod.containers[0].resources.requests.memory == qmgr_size.request_memory
      - _qmgr_base_manifest_doc.spec.template.pod.containers[0].resources.limits.cpu == qmgr_size.limits_cpu
      - _qmgr_base_manifest_doc.spec.template.pod.containers[0].resources.limits.memory == qmgr_size.limits_memory
      - _qmgr_base_manifest_doc.spec.queueManager.recoveryLogs.logFilePages | int == qmgr_size.log_file_pages | default(32768) | int
      - _qmgr_base_manifest_doc.spec.queueManager.storage.queueManager['class'] == storage_class_name
      - _qmgr_base_manifest_doc.spec.queueManager.storage.queueManager.size == qmgr_size.qmgr_storage
      - _qmgr_base_manifest_doc.spec.queueManager.storage.recoveryLogs['class'] == storage_class_name
      - _qmgr_base_manifest_doc.spec.queueManager.storage.recoveryLogs.size == qmgr_size.log_storage
    fail_msg: >-
      Sizing update did not produce the requested values in
      {{ qmgr_rel_path }}/base/qmgr.yaml.

- name: "Sizing update — Check pending changes"  # noqa command-instead-of-module
  ansible.builtin.command:
    cmd: git status --porcelain
  args:
    chdir: "{{ git_work_dir }}"
  register: _sizing_git_status
  changed_when: false
  check_mode: false

- name: "Sizing update — Classify pending change paths"
  ansible.builtin.set_fact:
    _sizing_expected_paths:
      - "{{ qmgr_rel_path }}/base/qmgr.yaml"
    _sizing_changed_paths: >-
      {{ _sizing_git_status.stdout_lines
         | map('regex_replace', '^..\s+', '')
         | list }}

- name: "Sizing update — Fail if unexpected files changed"
  ansible.builtin.assert:
    that:
      - _sizing_changed_paths | difference(_sizing_expected_paths) | length == 0
    fail_msg: >-
      Sizing update changed unexpected files:
      {{ _sizing_changed_paths | difference(_sizing_expected_paths) }}.
      Expected only {{ _sizing_expected_paths }}.
