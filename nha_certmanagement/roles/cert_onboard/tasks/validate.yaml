---
# =============================================================
#  validate.yaml — Pre-Flight Variable Validation
# =============================================================
#
#  PURPOSE:
#    Validates ALL required variables before any API/crypto work.
#    Designed to fail fast with clear, actionable error messages
#    so operators can fix survey inputs immediately.
#
#  GROUPS:
#    1. AAP Survey Inputs
#    2. Derived Identity
#    3. Certificate Configuration
#    4. DummyCertManager Connection
#    5. Vault Connection
#
# =============================================================

# ── 1. AAP Survey Inputs ─────────────────────────────────────
- name: "Validate — AAP survey inputs"
  ansible.builtin.assert:
    that:
      - app_prefix is defined and app_prefix | lower is match('^[a-z0-9]{3}$')
      - mq_environment is defined and mq_environment | upper in ['DEV', 'QA1', 'QA2', 'QA3', 'PROD']
      - sequence_number is defined and sequence_number is match('^[0-9]{3}$')
      - instance_type is defined and instance_type in ['single', 'nha', 'nhacrr']
      - mq_environment | upper in env_qmgr_abbr
      - mq_environment | upper in env_namespace_abbr
    fail_msg: >-
      AAP survey inputs are invalid or incomplete.
      Required: app_prefix (3 lowercase/uppercase alphanumeric characters),
      mq_environment (DEV|QA1|QA2|QA3|PROD), sequence_number (3 digits),
      instance_type (single|nha|nhacrr).
      Got: app_prefix={{ app_prefix | default('UNDEFINED') }},
      mq_environment={{ mq_environment | default('UNDEFINED') }},
      sequence_number={{ sequence_number | default('UNDEFINED') }},
      instance_type={{ instance_type | default('UNDEFINED') }}
    quiet: true

# ── 2. Derived Identity ──────────────────────────────────────
- name: "Validate — Derived identity"
  ansible.builtin.assert:
    that:
      - qmgr_name is defined and qmgr_name | length > 0
      - qmgr_name_upper is defined and qmgr_name_upper | length > 0
      - namespace is defined and namespace | length > 0
      - instance_type in instance_cert_map
      - instance_cert_map[instance_type] | length > 0
    fail_msg: >-
      Derived identity failed. qmgr_name={{ qmgr_name | default('UNDEFINED') }},
      qmgr_name_upper={{ qmgr_name_upper | default('UNDEFINED') }},
      namespace={{ namespace | default('UNDEFINED') }}.
      Check app_prefix + mq_environment + sequence_number and instance_cert_map.
    quiet: true

# ── 3. Certificate & SAN Configuration ───────────────────────
- name: "Validate — Certificate and SAN configuration"
  ansible.builtin.assert:
    that:
      - cert_common_name is defined and cert_common_name | length > 0
      - cert_country_name is defined and cert_country_name | length > 0
      - cert_organization_name is defined and cert_organization_name | length > 0
      - cert_key_size is defined and cert_key_size | int > 0
      - cert_key_type is defined and cert_key_type in ['RSA', 'ECC']
      - cluster_domains is defined and cluster_domains | length > 0
      - cert_renewal_threshold_days is defined and cert_renewal_threshold_days | int > 0
    fail_msg: >-
      Certificate/SAN configuration is incomplete in certs_control_vars.yaml.
      Verify cluster_domains and cert_renewal_threshold_days.
    quiet: true

# ── 4. DummyCertManager Connection ─────────────────────────────────────
- name: "Validate — DummyCertManager connection"
  ansible.builtin.assert:
    that:
      - dummycertmanager_url is defined and dummycertmanager_url | length > 0
      - dummycertmanager_username is defined and dummycertmanager_username | length > 0
      - dummycertmanager_password is defined and dummycertmanager_password | length > 0
      - dummycertmanager_client_id is defined and dummycertmanager_client_id | length > 0
      - dummycertmanager_scope is defined and dummycertmanager_scope | length > 0
      - dummycertmanager_policy_dn is defined and dummycertmanager_policy_dn | length > 0
      - dummycertmanager_oauth is defined and dummycertmanager_oauth | length > 0
      - dummycertmanager_token_revoke is defined and dummycertmanager_token_revoke | length > 0
    fail_msg: >-
      DummyCertManager connection configuration is incomplete.
      Verify dummycertmanager_url, dummycertmanager_username, dummycertmanager_password (env vars),
      dummycertmanager_policy_dn, and API endpoint paths.
    quiet: true

# ── 5. Vault Connection ──────────────────────────────────────
- name: "Validate — Vault connection"
  ansible.builtin.assert:
    that:
      - vault_url is defined and vault_url | length > 0
      - vault_cert_token is defined and vault_cert_token | length > 0
      - vault_cert_mount_point is defined and vault_cert_mount_point | length > 0
      - vault_cert_base_path is defined and vault_cert_base_path | length > 0
    fail_msg: >-
      Vault connection is incomplete. Verify vault_url, vault_cert_token
      (supported sources: vault_token / hashi_vault_token vars, or VAULT_TOKEN /
      vault_token env vars), vault_cert_mount_point, and vault_cert_base_path.
    quiet: true
  when: not (skip_vault_operations | default(false) | bool)

# ── Summary ───────────────────────────────────────────────────
- name: "Validate — ✅ All pre-flight checks passed"
  ansible.builtin.debug:
    msg:
      - "Queue Manager  : {{ qmgr_name }}"
      - "Namespace      : {{ namespace }}"
      - "Instance Type  : {{ instance_type }}"
      - "Cert Types     : {{ instance_cert_map[instance_type] | join(', ') }}"
      - "DummyCertManager URL     : {{ dummycertmanager_url }}"
      - "Vault URL      : {{ vault_url }}"
      - "Vault Path     : {{ vault_cert_base_path }}/"
      - "Renewal Window : {{ cert_renewal_threshold_days }} days"
