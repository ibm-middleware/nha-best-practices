---
# Role defaults — overridden by survey variables / extra_vars

# Survey variables (provided by AAP survey or --extra-vars)
# app_prefix:       Application prefix, e.g. "QMM"
# mq_environment:   "DEV", "QA1", "QA2", "QA3", or "PROD"
# sequence_number:  e.g. "001"
# instance_type:    "single", "nha", or "nhacrr"

# Monitor scope — controls single vs all mode
# single: Check certs for one queue manager (requires above survey vars)
# all:    Check certs for ALL queue managers in the registry
monitor_scope: "single"  # noqa var-naming[no-role-prefix]
