---
# Shared Vault KV read helper.
#
# Caller must set:
#   _vault_cert_path       - KV path below vault_cert_mount_point
#   vault_url              - Vault server URL from nativeha_qmgr_control_vars.yaml
#   vault_cert_token       - token from AAP var/env lookup
#   vault_cert_mount_point - KV v2 mount derived from vault_security_zones
#   vault_namespace        - optional Vault Enterprise namespace
#
# Output:
#   _vault_read - raw community.hashi_vault.vault_kv2_get result
- name: "Vault - Read certificate KV secret"
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_url }}"
    auth_method: token
    token: "{{ vault_cert_token }}"  # pragma: allowlist secret
    engine_mount_point: "{{ vault_cert_mount_point }}"
    namespace: "{{ vault_namespace if (vault_namespace | default('') | length > 0) else omit }}"
    path: "{{ _vault_cert_path }}"
  register: _vault_read
  failed_when: false
