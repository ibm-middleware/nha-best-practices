# ============================================================
# Collection Requirements — MQ Certificate Management (AAP)
# ============================================================
# AAP Project sync looks for collections/requirements.yml when
# the SCM project points at NativeHA_Cert_Management/.
#
# Manual install:
#   ansible-galaxy collection install -r collections/requirements.yml
# ============================================================

collections:
  - name: community.general
    version: ">=8.0.0"
    source: https://galaxy.ansible.com

  - name: community.crypto
    version: ">=2.0.0"
    source: https://galaxy.ansible.com

  - name: community.hashi_vault
    version: ">=6.0.0"
    source: https://galaxy.ansible.com
