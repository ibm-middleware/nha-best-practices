---
# ============================================================
# git_operations.yaml — Shared Git clone and configure tasks
# ============================================================
# Included by the onboarding workflow to keep git setup separate from
# queue manager identity, sizing, and manifest generation logic.
#
# Delegates to the shared git_clone_and_configure.yaml task file
# in nativeha_templates/shared_tasks/.
#
# Required variables (must be set before including):
#   git_repo_url    - Target repo SSH URL, from env_repo_map[env_upper]
#   target_branch   - Base branch to clone, from env_branch_map[env_upper]
#   git_work_dir    - Unique local checkout path created by workflow.yaml
#   git_user_name   - Git commit author name from global vars
#   git_user_email  - Git commit author email from global vars
#
# Outputs:
#   Working directory ready at {{ git_work_dir }} on the base branch
# ============================================================

- name: "Git — Clone and configure target repo"
  ansible.builtin.include_tasks:
    file: "../../../../nativeha_templates/shared_tasks/git_clone_and_configure.yaml"
