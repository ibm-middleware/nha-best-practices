---
# ============================================================
# Main Onboarding Orchestrator
# ============================================================
#
# PURPOSE OF THIS FILE:
#   This is the role entry point (tasks/main.yaml).
#   It is intentionally a thin wrapper with three responsibilities:
#
#     1. Step 0  — Validate all survey inputs before any work begins.
#     2. block   — Delegate all real work to workflow.yaml via include_tasks.
#     3. rescue  — Log a clear failure summary if workflow.yaml fails.
#     4. always  — Unconditionally delete the git working directory,
#                  even when a mid-run task fails. This prevents stale
#                  /tmp/mqnativeha_automation directories from accumulating on
#                  the AAP execution node.
#
# DO NOT add onboarding logic here.
# All queue manager derivation, directory creation, manifest
# generation, and target repo publish preparation lives in workflow.yaml.
# The final publish implementation is delegated again to
# nativeha_templates/shared_tasks/target_repo_publish.yaml.
#
# ============================================================

# ── Step 0: Pre-flight validation ─────────────────────────────
- name: "Step 0 — Normalize qm_action"
  ansible.builtin.set_fact:
    # Converts common lower-case survey input into the canonical values
    # used by the rest of the role: Create or Update.
    qm_action_effective: "{{ {'create': 'Create', 'update': 'Update'}.get(qm_action | string | lower, qm_action) }}"
  when: qm_action is defined

- name: "Step 0 — Validate survey inputs"
  ansible.builtin.assert:
    that:
      # qm_action_effective comes from the previous set_fact.
      - qm_action_effective is defined and qm_action_effective in ['Create', 'Update']
      # mq_environment is a survey value and must match global var map keys.
      - mq_environment is defined and mq_environment | upper in ['DEV', 'QA1', 'QA2', 'QA3', 'PROD']
      # Update requires qmgr_name because it targets an existing folder.
      - qm_action_effective != 'Update' or (qmgr_name is defined and qmgr_name | length > 0)
      - qm_action_effective != 'Update' or (qmgr_name | lower is match('^[a-z0-9]{3}' ~ (env_qmgr_abbr[mq_environment | upper] | lower) ~ '[0-9]{3}$'))
      # Create requires app_sys_id because qmgr_name is generated by discovery.
      - qm_action_effective != 'Create' or (app_sys_id is defined and app_sys_id | lower is match('^[a-z0-9]{3}$'))
      # Sizing input is used by workflow.yaml to choose selected_size_tier/qmgr_size.
      - total_volume_24h is defined and total_volume_24h | length > 0
      - avg_msg_size is defined and avg_msg_size | length > 0
    fail_msg: >-
      Survey inputs invalid. Required:
      Create: qm_action, 3-character app_sys_id, mq_environment, total_volume_24h, avg_msg_size.
      Update: qm_action, mq_environment, qmgr_name matching that environment, total_volume_24h, avg_msg_size.
    quiet: true

# ── Steps 1–14: Workflow with guaranteed workspace cleanup ─────
- name: "Onboarding — Execute with guaranteed workspace cleanup"
  block:

    - name: "Onboarding — Run workflow (workflow.yaml)"
      ansible.builtin.include_tasks: workflow.yaml

  rescue:

    - name: "Rescue — Log onboarding failure"
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════"
          - "  ❌ ONBOARDING FAILED"
          - "  Action      : {{ qm_action_effective | default(qm_action) | upper }}"
          - "  QMgr        : {{ qmgr_name | default('not yet derived') | upper }}"
          - "  Environment : {{ mq_environment | upper }}"
          - "  Branch      : {{ target_branch | default('not yet set') }}"
          - "  See the task output above for the root cause."
          - "═══════════════════════════════════════════════"

    - name: "Rescue — Re-raise to mark the job as failed in AAP"
      ansible.builtin.fail:
        msg: "QMgr onboarding failed — review the rescue log above."

  always:

    - name: "Always — Remove git working directory"
      ansible.builtin.file:
        path: "{{ git_work_dir }}"
        state: absent
      when:
        - git_work_dir is defined
        - git_work_dir_base is defined
        - git_work_dir != git_work_dir_base
      check_mode: false
