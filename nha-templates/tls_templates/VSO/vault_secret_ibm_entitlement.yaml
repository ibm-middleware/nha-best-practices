---
# vaultstaticsecret_ibm_entitlement.yaml — VSO VaultStaticSecret for IBM Entitlement Key
# Syncs from Vault KV v2: {{ vault_mount }}/data/ibm-mq/shared/ibm-entitlement-key
# Creates K8s secret: ibm-entitlement-key (imagePullSecret for cp.icr.io)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ibm-entitlement-key
  namespace: {{ namespace }}
  labels:
    app.kubernetes.io/name: {{ qmgr_name }}
    app.kubernetes.io/managed-by: ansible-automation
spec:
  vaultAuthRef: {{ vso_vault_auth_name }}
{% if vault_namespace %}
  namespace: {{ vault_namespace }}
{% endif %}
  mount: {{ vault_mount }}
  type: kv-v2
  path: {{ entitlement_key_path }}
  refreshAfter: {{ vso_refresh_after }}
  destination:
    name: ibm-entitlement-key
    create: true
    type: kubernetes.io/dockerconfigjson
