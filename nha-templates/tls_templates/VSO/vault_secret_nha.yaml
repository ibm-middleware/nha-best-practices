---
# vaultstaticsecret_nativeha_tls.yaml — VSO VaultStaticSecret for NativeHA inter-pod TLS
# Syncs from Vault KV v2: {{ vault_mount }}/data/ibm-mq/{{ mq_environment | upper }}/{{ qmgr_name | lower }}/nativeha
# Creates K8s secret: {{ qmgr_name }}-nha-tls
# Rolling update: Pod restart triggered on cert change
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ qmgr_name }}-nha-tls
  namespace: {{ namespace }}
  labels:
    app.kubernetes.io/name: {{ qmgr_name }}
    app.kubernetes.io/managed-by: ansible-automation
    mq.ibm.com/cert-type: nativeha-tls
spec:
  vaultAuthRef: {{ vso_vault_auth_name }}
{% if vault_namespace %}
  namespace: {{ vault_namespace }}
{% endif %}
  mount: {{ vault_mount }}
  type: kv-v2
  path: {{ app_prefix }}/ibm-mq/{{ mq_environment | upper }}/{{ namespace | upper }}/{{ qmgr_name_upper }}/nha
  refreshAfter: {{ vso_refresh_after }}
  destination:
    name: {{ qmgr_name }}-nha-tls
    create: true
    type: kubernetes.io/tls
  rolloutRestartTargets:
    - kind: StatefulSet
      name: {{ qmgr_name }}
