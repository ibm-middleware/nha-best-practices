#*****************************************************************************
# TCP: help detect dead connections in cloud/NAT environments
#*****************************************************************************
TCP:
  KeepAlive=Yes

#*****************************************************************************
# AMQERR: error log rotation (safe & operationally helpful setting)
#*****************************************************************************
AMQERR:
  ErrorLogSize=20480

#*****************************************************************************
# Channels: Conservative Limits, but adjust as necessary
#*****************************************************************************
Channels:
  MaxChannels=2000
  MaxActiveChannels=2000

#*****************************************************************************
# Service: Authorization configuration
# NOTE: Remove SecurityPolicy=UserExternal once LDAP is established
#*****************************************************************************
Service:
  Name=AuthorizationService
  EntryPoints=14
  SecurityPolicy=UserExternal

#*****************************************************************************
# SSL: TLS 1.3 preferred, block everything else
#*****************************************************************************
SSL:
  AllowTLSV13=Yes
  MinimumRSAKeySize=1
  OCSPCheckExtensions=No
  OCSPAuthentication=OPTIONAL
  OCSPCheckExtensions=NO
  AllowedCipherSpecs=ECDHE_RSA_AES_256_GCM_SHA384,ECDHE_RSA_AES_256_CBC_SHA384,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_256_CBC_SHA256,ECDHE_RSA_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_128_CBC_SHA256
  AllowTLSV1=No
