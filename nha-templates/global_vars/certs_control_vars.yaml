---
# MQ NativeHA - Certificate Lifecycle Configuration
# Loaded together with nativeha_qmgr_control_vars.yaml.
# Secrets (Venafi password, Vault token) injected via AAP credentials.

# ═══════════════════════════════════════════════════════════════════
# Multi-Cert Profile: instance_type → cert types
# ═══════════════════════════════════════════════════════════════════

instance_cert_map:
  single:
    - app
  nha:
    - app
    - nha
  nhacrr:
    - app
    - nha
    - nhacrr

# CSR filename suffix per cert type
cert_type_csr_suffix:
  app: "app"
  nha: "nha"
  nhacrr: "nhacrr"

# Vault sub-path per cert type
cert_type_vault_subpath:
  app: "app-pki"
  nha: "nha-tls"
  nhacrr: "nhacrr-tls"

# Extra SANs appended to certificates
qmgr_extra_sans: []
qmgr_extra_sans_by_type:
  app: []
  nha: []
  nhacrr: []

# ═══════════════════════════════════════════════════════════════════
# Venafi Connection
# ═══════════════════════════════════════════════════════════════════

venafi_url: "https://pki.example.com"
venafi_oauth: "/VEDAuth/Authorize/oauth"
venafi_cert_request: "/vedsdk/certificates/Request"
venafi_cert_renew: "/vedsdk/certificates/Renew"
venafi_revoke: "/vedsdk/certificates/Revoke"
venafi_cert_search: "/vedsdk/certificates"
venafi_cert_retrieve: "/vedsdk/certificates/Retrieve"
venafi_token_revoke: "/VEDAuth/Revoke/token"

# AAP credential: Network type → injects ANSIBLE_NET_USERNAME / ANSIBLE_NET_PASSWORD
venafi_username: >-
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_USERNAME')
    | default(lookup('ansible.builtin.env', 'VENAFI_USERNAME'), true)
  }}
venafi_password: >-  # pragma: allowlist secret
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_PASSWORD')
    | default(lookup('ansible.builtin.env', 'VENAFI_PASSWORD'), true)
  }}

venafi_client_id: "MQAutomation"
venafi_scope: "certificate:approve,delete,discover,manage,revoke;configuration:manage"
venafi_policy_dn: "\\VED\\Policy\\Certificates\\DMQ Automated Certificates"
venafi_validate_certs: true
venafi_poll_retries: 30
venafi_poll_delay: 20

# Revocation settings (offboard)
venafi_revoke_reason: 0
venafi_revoke_disable: true
venafi_revoke_comments: "Decommissioned via Ansible AAP NativeHA Offboard - {{ qmgr_name }}"

# ═══════════════════════════════════════════════════════════════════
# Certificate Key & CSR
# ═══════════════════════════════════════════════════════════════════

cert_key_size: 4096
cert_key_type: "RSA"
cert_common_name: "{{ qmgr_name }}.{{ custom_client_dns_domain | default('example.com') }}"
cert_country_name: "US"
cert_state_or_province: "NY"
cert_locality_name: "New York"
cert_organization_name: "Example Corp"
cert_organizational_unit: "IT"
cert_renewal_threshold_days: 30

# ═══════════════════════════════════════════════════════════════════
# Certificate Registry (dedicated orphan branch to avoid PR noise)
# ═══════════════════════════════════════════════════════════════════

cert_registry_enabled: true
cert_git_base_url: "git@bitbucket.example.com:MQPROJECT/mq-native-ha-v1.git"
cert_registry_git_branch: "state/cert-registry"
cert_git_work_dir: "/tmp/mq-cert-registry"
cert_git_user_name: "MQ Cert Automation"
cert_git_user_email: "mq-cert-automation@example.com"
cert_registry_path: "nativeha_state/cert_registry/cert_inventory.yaml"

# ═══════════════════════════════════════════════════════════════════
# OpenShift Secret Backend
# ═══════════════════════════════════════════════════════════════════

cert_openshift_secret_type: "kubernetes.io/tls"

# ═══════════════════════════════════════════════════════════════════
# Vault KV Configuration
# ═══════════════════════════════════════════════════════════════════

# Auth method: token | approle
vault_cert_auth_method: >-
  {{
    vault_auth_method
    | default(lookup('ansible.builtin.env', 'VAULT_AUTH_METHOD', default='token'), true)
  }}
vault_validate_certs: "{{ not (lookup('ansible.builtin.env', 'VAULT_SKIP_VERIFY', default='false') | bool) }}"

# AAP injects via credential type (env: VAULT_TOKEN or extra var: vault_token)
vault_cert_token: >-
  {{
    vault_token
    | default(hashi_vault_token, true)
    | default(lookup('ansible.builtin.env', 'VAULT_TOKEN', default=''), true)
  }}
vault_cert_role_id: >-
  {{
    vault_role_id
    | default(lookup('ansible.builtin.env', 'VAULT_ROLE_ID', default=''), true)
  }}
vault_cert_secret_id: >-
  {{
    vault_secret_id
    | default(lookup('ansible.builtin.env', 'VAULT_SECRET_ID', default=''), true)
  }}

# ═══════════════════════════════════════════════════════════════════
# Certificate Monitor Alert Thresholds
# ═══════════════════════════════════════════════════════════════════

# Alert thresholds
alert_on_statuses:
  - "expiring_soon"
  - "expired"
  - "missing"
  - "corrupt"
  - "revoked"
  - "desync"
