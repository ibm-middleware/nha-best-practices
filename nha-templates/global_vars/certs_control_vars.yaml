---
# ============================================================
# MQ NativeHA — Certificate Lifecycle Configuration
# ============================================================
# Dedicated control file for Venafi ↔ Vault certificate
# provisioning and revocation.
#
# This file is SELF-CONTAINED — cert playbooks only need
# this file (no dependency on constant_vars or control_vars).
#
# Loaded by: NativeHA_Cert_Management.yaml
# ============================================================

# ────────────────────────────────────────────────────
# Shared Constants (duplicated here for self-containment)
# ────────────────────────────────────────────────────
vault_url: "https://vault.example.lab:8200"
# ============================================================

# ────────────────────────────────────────────────────
# Multi-Cert Profile: Instance Type → Cert Types
# ────────────────────────────────────────────────────
# Defines which certificates to generate based on instance_type.
#   single → 1 cert  (app)
#   nha    → 2 certs (app + nativeha)
#   nhacrr → 3 certs (app + nativeha + crr)
instance_cert_map:
  single:
    - app
  nha:
    - app
    - nativeha
  nhacrr:
    - app
    - nativeha
    - crr

# CSR filename suffix per cert type
# Each generates: <qmgr_name>_<suffix>.csr
cert_type_csr_suffix:
  app: "app"
  nativeha: "nativeha"
  crr: "crr"

# Vault sub-path per cert type (maps exactly to VSO templates)
# Full Vault path:
#   {app_prefix}/ibm-mq/{ENV}/{NAMESPACE}/{QMGR_NAME}/{subpath}
# Must match what VSO VaultStaticSecrets read from.
cert_type_vault_subpath:
  app: "app-pki"
  nativeha: "nha"
  crr: "nhacrr"

# ────────────────────────────────────────────────────
# Cluster Domains — OCP Wildcard Domains for SAN Generation
# ────────────────────────────────────────────────────
# ALL domains listed here are added to the SANs for every
# route-based cert type (app + crr).
# For CRR, the cert must be valid on both clusters — so both
# domains are included regardless of which is "live".
#
# Must match the regions config in nativeha_qmgr_control_vars.yml.
cluster_domains:
  - "apps.ocp-use-001.example.lab"
  - "apps.ocp-usw-001.example.lab"

# NativeHA StatefulSet replica count (controls per-replica SAN entries)
qmgr_ha_replicas: 3

# ────────────────────────────────────────────────────
# MQ Operator Naming Convention (verified from live cluster)
# ────────────────────────────────────────────────────
# The MQ Operator creates these Kubernetes resources:
#
# Services:
#   {qmgr}-ibm-mq                 → ClusterIP (ports 1414, 9415, 9443)
#   {qmgr}-ibm-mq-replica-{N}    → ClusterIP per pod (port 9414, NativeHA replication)
#   {qmgr}-ibm-mq-metrics        → ClusterIP (port 9157, Prometheus)
#
# Routes (hostname = {route_name}-{namespace}.{cluster_domain}):
#   {qmgr}-ibm-mq-qm             → client connections (port 1414)
#   {qmgr}-ibm-mq-web            → web console (port 9443)
#   {qmgr}-ibm-mq-nhacrr         → CRR replication (port 9415)
#
# Example for qmmdev001 in namespace qmm-mq-dev-001:
#   Service: qmmdev001-ibm-mq
#   Route:   qmmdev001-ibm-mq-qm-qmm-mq-dev-001.apps.ocp-use-001.example.lab
#   Replica: qmmdev001-ibm-mq-replica-0

# Main ClusterIP service suffix
mq_service_suffix: "ibm-mq"

# Per-replica ClusterIP service prefix (for NativeHA replication, port 9414)
# Pattern: {qmgr_name}-{nha_replica_prefix}-{N}
nha_replica_prefix: "ibm-mq-replica"

# Route suffixes — used to build OCP route hostnames for SAN generation
# Route hostname pattern: {qmgr_name}-{suffix}-{namespace}.{cluster_domain}
app_route_suffixes:
  - "ibm-mq-qm"      # client connections (port 1414)
  - "ibm-mq-web"      # web console (port 9443)

crr_route_suffixes:
  - "ibm-mq-nhacrr"  # CRR replication (port 9415)

# Extra SANs — appended to ALL cert types (leave empty for none)
qmgr_extra_sans: []

# ────────────────────────────────────────────────────
# Venafi Connection & Authentication
# ────────────────────────────────────────────────────
venafi_url: "https://venafi.example.lab"
venafi_sdk_url: "{{ venafi_url }}/vedsdk"
venafi_oauth: "/VEDAuth/Authorize/oauth"
venafi_revoke: "/vedsdk/certificates/Revoke"
venafi_cert_details: "/vedsdk/certificates"
venafi_cert_search: "/vedsdk/certificates"
venafi_token_revoke: "/VEDAuth/Revoke/token"

venafi_username: "{{ lookup('ansible.builtin.env', 'ANSIBLE_NET_USERNAME') }}"
venafi_password: "{{ lookup('ansible.builtin.env', 'ANSIBLE_NET_PASSWORD') }}"
venafi_client_id: "MQAutomation"
venafi_scope: "certificate:approve,delete,discover,manage,revoke;configuration:manage"
venafi_policy_dn: "\\VED\\Policy\\Certificates\\Example MQ Automated Certificates"
venafi_validate_certs: true
venafi_trust_bundle: ""

# The issuing CA template and retry behavior are typically enforced
# by the Venafi TPP policy referenced by venafi_policy_dn.

# ────────────────────────────────────────────────────
# Venafi Environment Type Mapping
# ────────────────────────────────────────────────────
env_to_venafi_env_type:
  dev: "QA"
  qa1: "QA"
  qa2: "QA"
  stg: "Production"
  prod: "Production"
  pr: "Production"

# ────────────────────────────────────────────────────
# Venafi Mandatory Custom Fields
# ────────────────────────────────────────────────────
venafi_custom_fields:
  - Name: "AD Distribution Group"
    Values:
      - "AD+corp.example.lab:mq-support"
  - Name: "Environment Type"
    Values:
      - "{{ env_to_venafi_env_type[mq_environment | lower] }}"
  - Name: "SYS ID"
    Values:
      - "MQM"
  - Name: "Escalation Executive Director LAN ID"
    Values:
      - "AD+corp.example.lab:mq-automation-owner"

# ────────────────────────────────────────────────────
# Certificate Key & CSR Configuration
# ────────────────────────────────────────────────────
cert_key_size: 4096
cert_key_type: "RSA"

cert_common_name: "{{ qmgr_name }}.example.lab"
cert_country_name: "US"
cert_state_or_province: "NY"
cert_locality_name: "New York"
cert_organization_name: "Example Lab"
cert_organizational_unit: "IT"

# Certificate retrieval options (from Venafi)
cert_retrieve_format: "Base64"
cert_include_chain: true
cert_root_first_order: true

# ────────────────────────────────────────────────────
# Pre-Request Validation & Renewal Threshold
# ────────────────────────────────────────────────────
# Before requesting a new cert from Venafi, the automation
# checks Vault and Venafi for existing valid certs.
# If a cert exists and has MORE than this many days until
# expiry, it is SKIPPED (no new request).
# If it has FEWER days remaining, it is RENEWED.
cert_renewal_threshold_days: 30

# ────────────────────────────────────────────────────
# Venafi Revocation Settings (Offboard)
# ────────────────────────────────────────────────────
venafi_revoke_reason: 0
venafi_revoke_disable: true
venafi_revoke_comments: "Decommissioned via Ansible AAP NativeHA Offboard — {{ qmgr_name }}"

# ────────────────────────────────────────────────────
# Vault KV Configuration
# ────────────────────────────────────────────────────
# Skips Vault interactions for testing Venafi in isolation
# WARNING: Set to true ONLY for isolated Venafi testing.
#          PROD must always use Vault (false).
skip_vault_operations: false

# Vault KV token — injected via AAP Credential or env var
# vault_url is defined at the top of this file
vault_cert_token: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN', default='') }}"
# Runtime-derived from nativeha_qmgr_control_vars.yaml → vault_security_zones
# so cert lifecycle and VSO always use the same Vault mount.
vault_cert_mount_point: ""
# Shared path helpers so cert lifecycle and generated VSO manifests
# point at the exact same Vault location.
vault_path_prefix: "{{ app_prefix_normalized | default(app_prefix | lower) }}"
vault_cert_namespace_path: "{{ namespace | upper }}"
vault_cert_qmgr_path: "{{ qmgr_name_upper | default(qmgr_name | upper) }}"

# Full Vault KV path:
#   {mount}/data/{vault_path_prefix}/ibm-mq/{ENV}/{NAMESPACE}/{QMGR_NAME}/{cert-type}
# Aligns with nativeha_templates/tls_templates/VSO/*.yaml
vault_cert_base_path: "{{ vault_path_prefix }}/ibm-mq/{{ mq_environment | upper }}/{{ vault_cert_namespace_path }}/{{ vault_cert_qmgr_path }}"

# ────────────────────────────────────────────────────
# Git Configuration (for Certificate Registry)
# ────────────────────────────────────────────────────
# The cert registry (cert_inventory.yaml) is committed to the
# repo after every cert action (onboard/offboard/renew/monitor).
# These vars are intentionally duplicated from nativeha_qmgr_control_vars.yml
# to keep this file self-contained.
cert_git_base_url: "git@github.com:example/mq-native-ha-reference.git"
cert_git_branch: "main"
cert_git_work_dir: "/tmp/mq-cert-registry"
cert_git_user_name: "MQ Cert Automation"
cert_git_user_email: "mq-cert-automation@example.lab"

# ────────────────────────────────────────────────────
# Certificate Registry
# ────────────────────────────────────────────────────
# Path (relative to repo root) to the auto-managed inventory file.
# Updated by every cert action; read by monitor for "all" scope.
cert_registry_path: "nativeha_templates/cert_registry/cert_inventory.yaml"

# ────────────────────────────────────────────────────
# SMTP Alerting Configuration
# ────────────────────────────────────────────────────
# Enable SMTP alerts for certificate health issues
smtp_enabled: true
smtp_host: "smtp.example.lab"
smtp_port: 25
smtp_from: "mq-cert-automation@example.lab"
smtp_to:
  - "mq-support@example.lab"
  - "middleware-ops@example.lab"
smtp_subject_prefix: "[MQ Certificate Alert]"

# Alert thresholds - send alerts for these statuses
alert_on_statuses:
  - "expiring_soon"
  - "expired"
  - "missing"
  - "corrupt"
  - "desync"
