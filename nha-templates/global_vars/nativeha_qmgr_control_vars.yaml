---
# ============================================================
# MQ NativeHA Automation — Central Configuration
# ============================================================
# ALL configurable values live here. Nothing is hardcoded in
# playbooks, roles, or templates. Update this file to switch
# between reference and target environments.
# ============================================================

# --- IBM MQ Operator Version & Licensing ---
mq_versions:
  NONPROD: "9.4.5.0-r1"
  PROD: "9.4.5.0-r1"

license_ids:
  NONPROD: "L-QWBN-T3PKLE"
  PROD: "L-SJZL-NMUUCT"

# --- Node Scheduling ---
# All MQ pods use taint/toleration: mqha=true:NoSchedule
node_selector_key: "mqha"
node_selector_value: "true"

# --- Git Configuration ---
# Single repo with branches (reference setup / mimicking separate repos)
git_base_url: "git@github.com:example/mq-native-ha-reference.git"
git_main_branch: "main"

# Branch-per-environment mapping (mimics dedicated repos)
env_branch_map:
  DEV:  "feature/mq-native-ha-dev"
  QA1:  "feature/mq-native-ha-qa1"
  QA2:  "feature/mq-native-ha-qa2"
  STG:  "feature/mq-native-ha-stg"
  PROD: "feature/mq-native-ha-prod"
  PR:   "feature/mq-native-ha-prod"

# --- When separate repos are ready, switch to repo-per-env ---
# env_repo_map:
#   DEV:  "git@github.com:example/mq-native-ha-dev.git"
#   QA1:  "git@github.com:example/mq-native-ha-qa1.git"
#   QA2:  "git@github.com:example/mq-native-ha-qa2.git"
#   STG:  "git@github.com:example/mq-native-ha-stg.git"
#   PROD: "git@github.com:example/mq-native-ha-prod.git"

# Git commit identity (used for automation commits)
git_user_name: "MQ Automation"
git_user_email: "mq-automation@example.lab"

# --- Temp working directory for git clone operations ---
git_work_dir: "/tmp/mq-automation"



# --- MQ Operator / Image ---
# Image is managed by the operator; set only if an explicit override is needed.
# mq_image: "icr.io/ibm-messaging/mq:9.4.1.0-r1"

# --- Regions ---
# Each key is a short region code used in directory names and ArgoCD apps.
# cluster_domain: the wildcard apps domain for that OCP cluster.
regions:
  use:
    cluster_domain: "apps.ocp-use-001.example.lab"
    # Reference example:
    # cluster_domain: "apps.cluster-name.region.env.cloud.example.com"
  usw:
    cluster_domain: "apps.ocp-usw-001.example.lab"
    # Reference example:
    # cluster_domain: "apps.cluster-name.region.env.cloud.example.com"

# Default deploy region when the reference environment has only one cluster
default_deploy_region: "use"


# --- Environment Abbreviation Maps ---
# Used by the automation to build namespace and qmgr names.
# Namespace uses 3-char codes; Queue Manager uses 2-char codes.
# Pattern: namespace = <PREFIXID>-MQ-<3-CHAR-ENV>-<SEQ>
#          qmgr     = <PREFIXID><2-CHAR-ENV><SEQ>
env_namespace_abbr:
  DEV:  "DEV"
  QA1:  "QA1"
  QA2:  "QA2"
  STG:  "STG"
  PROD: "PROD"
  PR:   "PROD"

env_qmgr_abbr:
  DEV:  "DV"
  QA1:  "QF"
  QA2:  "QP"
  STG:  "PS"
  PROD: "PR"
  PR:   "PR"

# --- Sizing tier order (smallest → largest) for auto-match ---
# When auto-computing sizing, iterate these in order and pick
# the first tier whose qmgr_storage >= computed requirement.
sizing_order:
  - small
  - medium
  - large
  - xlarge

# --- ArgoCD ---
argocd_namespace: "openshift-gitops"
argocd_project: "default"

# --- Certificate Management ---
# Vault Secrets Operator (VSO) handles all mTLS and TLS certificates
# by syncing pre-provisioned material from Vault KV v2 into K8s Secrets.
# VSO triggers rolling restarts when certs change in Vault.

# --- MQ Web Console Configuration ---
# Matches client template: web.console.authentication/authorization/enabled/manualConfig
web_enabled: true
web_authentication: "manual"
web_authorization: "manual"
web_configmap: "webconsole-config"    # ConfigMap name suffix: {{ qmgr_name }}-webconsole-config

# --- MQ Operator Built-in Metrics ---
# Enables the operator's native Prometheus endpoint (metrics.tls.provider: openshift)
enable_metrics: true

# --- CRR TLS Cipher ---
# Used in nativeHAGroups.local.tls.cipherSpec for CRR queue managers
crr_cipher: "ANY_TLS12_OR_HIGHER"



# --- Vault Secrets Operator (VSO) ---
# Replaces ESO — uses VaultStaticSecret CRDs for static cert sync
vso_vault_connection_name: "{{ app_prefix }}-vault-connection"
vso_vault_auth_name: "{{ app_prefix }}-vault-auth"
vso_vault_role: "{{ vault_security_zones[_zone].vso_role }}"
vso_service_account: "{{ vault_security_zones[_zone].vso_sa }}"
vso_vault_skip_tls: true
vso_vault_ca_secret: ""             # Set to a K8s secret name if Vault uses a private CA
vso_refresh_after: "60s"             # How often VSO re-checks Vault for cert changes

# Vault URL (used by VaultConnection CR)
vault_url: "https://vault.example.lab:8200"

# --- Vault Security Zones ---
# Logic: If app_sys_id is in 'hra.apps', use hra settings. Otherwise, default to sra.
# NOTE: 'label' corresponds to Vault Namespace (Enterprise only). Leave as "" for Community Edition.
vault_security_zones:
  hra:
    mount: "hra/kv"
    label: ""                        # Example for Enterprise: "hra"
    vso_role: "{{ app_prefix }}-hra-vso-role"
    vso_sa: "{{ app_prefix }}-hra-vso-sa"
    apps: ["dmq", "amq", "mqp"]
    entitlement_key_path: "dmq/shared/ibm-entitlement-key"
  sra:
    mount: "sra/kv"
    label: ""                        # Example for Enterprise: "sra"
    vso_role: "{{ app_prefix }}-sra-vso-role"
    vso_sa: "{{ app_prefix }}-sra-vso-sa"
    entitlement_key_path: "smq/shared/ibm-entitlement-key"

# Vault role will be derived dynamically in the playbook based on the zone:
# vso_vault_role: "{{ vault_security_zones[_zone].vso_role }}"

# --- Sizing Matrix ---
# sizing[ENVIRONMENT][SIZE] → {request_cpu, limits_cpu, request_memory, limits_memory, qmgr_storage, log_storage, log_file_pages, storage_class}
# request = normal operating resources; limits = burst ceiling
sizing:
  DEV:
    small:   { request_cpu: "250m",  limits_cpu: "500m",  request_memory: "512Mi", limits_memory: "1Gi",   qmgr_storage: "500Mi",  log_storage: "500Mi",  log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "1Gi",    log_storage: "1Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "2Gi",    log_storage: "2Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
  QA1:
    small:   { request_cpu: "250m",  limits_cpu: "500m",  request_memory: "512Mi", limits_memory: "1Gi",   qmgr_storage: "500Mi",  log_storage: "500Mi",  log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "1Gi",    log_storage: "1Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "2Gi",    log_storage: "2Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
  QA2:
    small:   { request_cpu: "300m",  limits_cpu: "500m",  request_memory: "512Mi", limits_memory: "1Gi",   qmgr_storage: "1Gi",    log_storage: "1Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "10Gi",   log_storage: "20Gi",   log_file_pages: 32768, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "20Gi",   log_storage: "40Gi",   log_file_pages: 65536, storage_class: "lvms-vg1" }
  STG:
    small:   { request_cpu: "300m",  limits_cpu: "500m",  request_memory: "512Mi", limits_memory: "1Gi",   qmgr_storage: "1Gi",    log_storage: "1Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "10Gi",   log_storage: "20Gi",   log_file_pages: 32768, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "20Gi",   log_storage: "40Gi",   log_file_pages: 65536, storage_class: "lvms-vg1" }
  PROD:
    small:   { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "10Gi",   log_storage: "20Gi",   log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "20Gi",   log_storage: "40Gi",   log_file_pages: 65536, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "4",     limits_cpu: "8",     request_memory: "8Gi",   limits_memory: "16Gi",  qmgr_storage: "50Gi",   log_storage: "100Gi",  log_file_pages: 65536, storage_class: "lvms-vg1" }
  PR:
    small:   { request_cpu: "500m",  limits_cpu: "1",     request_memory: "1Gi",   limits_memory: "2Gi",   qmgr_storage: "5Gi",    log_storage: "5Gi",    log_file_pages: 32768, storage_class: "lvms-vg1" }
    medium:  { request_cpu: "1",     limits_cpu: "2",     request_memory: "2Gi",   limits_memory: "4Gi",   qmgr_storage: "10Gi",   log_storage: "20Gi",   log_file_pages: 32768, storage_class: "lvms-vg1" }
    large:   { request_cpu: "2",     limits_cpu: "4",     request_memory: "4Gi",   limits_memory: "8Gi",   qmgr_storage: "20Gi",   log_storage: "40Gi",   log_file_pages: 65536, storage_class: "lvms-vg1" }
    xlarge:  { request_cpu: "4",     limits_cpu: "8",     request_memory: "8Gi",   limits_memory: "16Gi",  qmgr_storage: "50Gi",   log_storage: "100Gi",  log_file_pages: 65536, storage_class: "lvms-vg1" }


# --- Prometheus MQ Exporter ---
# Toggle to include Prometheus exporter Deployment + ConfigMap per QM
enable_prometheus_monitor: true

# Exporter image — from ibm-messaging/mq-metric-samples (must be built and pushed)
prometheus_exporter_image: "registry.example.lab/mq-tools/mq-metric-prometheus:5.7.1"

# SVRCONN channel used by the exporter (must exist in MQSC)
prometheus_monitor_channel: "MONITOR.SVRCONN"

# MQ listener port (default inside the container)
prometheus_mq_port: 1414

# Exporter metrics port (IANA-registered 9157 for MQ Prometheus)
prometheus_metrics_port: 9157

# Exporter config options (matching mq-metric-samples config.common.yaml)
prometheus_poll_interval: "30s"
prometheus_rediscover_interval: "1h"
prometheus_log_level: "INFO"
prometheus_keep_running: true

# Exporter resource limits
prometheus_resources:
  requests: { cpu: "100m",  memory: "128Mi" }
  limits:   { cpu: "500m",  memory: "512Mi" }

# Objects to monitor (glob patterns, matching mq-metric-samples objects section)
prometheus_monitored_queues:
  - "*"
  - "!SYSTEM.*"
  - "!AMQ.*"
prometheus_monitored_channels:
  - "*"
prometheus_monitored_topics:
  - "!*"
prometheus_monitored_subscriptions:
  - "!$SYS*"

# Filters
prometheus_show_inactive_channels: true
prometheus_queue_subscription_selector:
  - PUT
  - GET
  - GENERAL

# --- Utility Scripts ConfigMap ---
# Toggle to include operational scripts (apply-mqsc, depth, showerrors)
enable_scripts_configmap: true

# Maps survey instance_type value to the QueueManager CR template file
instance_type_to_template:
  single: "sgl_qmgr.yaml"
  nha:    "nha_qmgr.yaml"
  nhacrr: "crr_qmgr.yaml"
