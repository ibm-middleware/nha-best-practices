---
# ============================================================
# Generate overlay manifests for a single region
# Called by main.yaml with loop_var: current_region
# ============================================================

- name: "{{ current_region }} — Set CRR role"
  ansible.builtin.set_fact:
    crr_role: >-
      {% if instance_type == 'nhacrr' %}{% if current_region == live_region_lower %}Live{% else %}Recovery{% endif %}{% else %}{% endif %}

- name: "{{ current_region }} — Set empty CRR role for non-CRR"
  ansible.builtin.set_fact:
    crr_role: ""
  when: instance_type != 'nhacrr'

- name: "{{ current_region }} — Set overlay directory"
  ansible.builtin.set_fact:
    overlay_dir: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/overlays/{{ current_region }}"

# ── Generate QueueManager CR ────────────────────────────────
- name: "{{ current_region }} — Generate QueueManager CR"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../nativeha_templates/qmgr_templates/{{ instance_type_to_template[instance_type] }}"
    dest: "{{ overlay_dir }}/qmgr.yaml"
    mode: "0644"

# ── Kustomization (overlay entry point) ─────────────────────
- name: "{{ current_region }} — Generate Kustomization"
  ansible.builtin.template:
    src: kustomization.yaml.j2
    dest: "{{ overlay_dir }}/kustomization.yaml"
    mode: "0644"

