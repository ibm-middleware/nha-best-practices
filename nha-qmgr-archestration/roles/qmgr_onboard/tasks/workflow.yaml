---
# ============================================================
# Queue Manager Onboarding Workflow
# ============================================================
#
# This file holds the mutable "do the work" part of onboarding.
# It is included from tasks/main.yaml inside a block/rescue/always
# wrapper so git workspace cleanup happens even when a later task
# fails.
#
# Variable origins:
# - Survey / AAP inputs: qm_action, qmgr_name, app_sys_id,
#   mq_environment, total_volume_24h, avg_msg_size
# - Shared config: nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml
# - Derived here: target_branch, qmgr_name, namespace, sizing, vault zone
#
# Action contract:
# - Create:
#   treat a provided qmgr_name only as a preferred sequence hint.
#   If that queue manager already exists, increment to the next free
#   sequence and continue creating a new queue manager.
# - Update:
#   require the exact existing qmgr_name. Parse prefixid, env, and
#   sequence from that name and regenerate that specific target.
#
# ============================================================

# ── Step 1: Preliminary Derivations & Git Setup ───────────────
- name: "Step 1 — Compute target branch early"
  ansible.builtin.set_fact:
    env_upper_tmp: "{{ mq_environment | default('DEV') | upper }}"

- name: "Step 1 — Set target branch"
  ansible.builtin.set_fact:
    target_branch: "{{ env_branch_map[env_upper_tmp] }}"

- name: "Step 1 — Clean working directory"
  ansible.builtin.file:
    path: "{{ git_work_dir }}"
    state: absent

- name: "Step 1 — Clone target branch: {{ target_branch }}"
  ansible.builtin.git:
    repo: "{{ git_base_url }}"
    dest: "{{ git_work_dir }}"
    version: "{{ target_branch }}"
    force: true
    accept_hostkey: true

- name: "Step 1 — Configure git identity"
  ansible.builtin.shell: |
    cd {{ git_work_dir }}
    git config user.name "{{ git_user_name }}"
    git config user.email "{{ git_user_email }}"
    git config core.sshCommand "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  changed_when: false

# ── Step 2: Resolve Identity ──────────────────────────────────
- name: "Step 2 — Parse QMgr name for Update"
  when: qm_action == 'Update'
  block:
    - name: "Update — Extract parts from {{ qmgr_name }}"
      ansible.builtin.set_fact:
        app_sys_id: "{{ qmgr_name[0:3] | lower }}"
        seq_number: "{{ qmgr_name | lower | regex_replace('^.{5}(\\d{3})$', '\\1') }}"

    - name: "Update — Re-verify target branch"
      ansible.builtin.set_fact:
        target_branch: "{{ env_branch_map[mq_environment | upper] }}"

    - name: "Update — Re-clone if branch changed"
      ansible.builtin.git:
        repo: "{{ git_base_url }}"
        dest: "{{ git_work_dir }}"
        version: "{{ target_branch }}"
        force: true
      when: target_branch != (env_branch_map[env_upper_tmp])

- name: "Step 2 — Handle sequence for Create"
  when: qm_action == 'Create'
  block:
    - name: "Create — Set base identity"
      ansible.builtin.set_fact:
        app_prefix: "{{ app_sys_id | lower }}"
        env_code: "{{ env_qmgr_abbr[mq_environment | upper] | lower }}"

    - name: "Create — Discover existing sequences"
      ansible.builtin.include_tasks: discover_sequence.yaml

    - name: "Create — Parse requested sequence hint"
      ansible.builtin.set_fact:
        requested_seq_number: "{{ qmgr_name | lower | regex_replace('^.{5}(\\d{3})$', '\\1') }}"
      when:
        - qmgr_name is defined
        - qmgr_name | length == 8
        - qmgr_name | lower is match('^' ~ app_prefix ~ env_code ~ '\\d{3}$')

    - name: "Create — Use requested sequence when free"
      ansible.builtin.set_fact:
        seq_number: "{{ requested_seq_number }}"
      when:
        - requested_seq_number is defined
        - (requested_seq_number | int) not in (_existing_seqs | default([]))

    - name: "Create — Explain automatic sequence increment"
      ansible.builtin.debug:
        msg: >-
          Requested queue manager {{ qmgr_name | lower }} already exists, so
          create will continue with the next free sequence {{ seq_number }}.
      when:
        - requested_seq_number is defined
        - (requested_seq_number | int) in (_existing_seqs | default([]))

# ── Step 3: Compute remaining derived variables ───────────────
- name: "Step 3 — Compute derived identity"
  ansible.builtin.set_fact:
    app_prefix: "{{ app_sys_id | lower }}"
    env_upper: "{{ mq_environment | upper }}"
    env_lower: "{{ mq_environment | lower }}"
    env_code: "{{ env_qmgr_abbr[mq_environment | upper] | lower }}"
    env_ns_code: "{{ env_namespace_abbr[mq_environment | upper] }}"
    instance_type: "{{ 'nhacrr' if mq_environment | upper in ['QA2', 'PROD', 'PR'] else 'nha' }}"
    sequence_number: "{{ seq_number | default('001') }}"

- name: "Step 3 — Derive security zone from app_sys_id"
  ansible.builtin.set_fact:
    _zone: "{{ 'hra' if app_sys_id | lower in vault_security_zones.hra.apps else 'sra' }}"

- name: "Step 3 — Compute Vault namespace, mount, and entitlement path"
  ansible.builtin.set_fact:
    vault_namespace: "{{ vault_security_zones[_zone].label }}"
    vault_mount: "{{ vault_security_zones[_zone].mount }}"
    entitlement_key_path: "{{ vault_security_zones[_zone].entitlement_key_path }}"

- name: "Step 3 — Compute storage requirement"
  ansible.builtin.set_fact:
    _parsed_volume: "{{ (total_volume_24h | human_to_bytes) | int }}"
    _parsed_size: "{{ (avg_msg_size | human_to_bytes) | int }}"

- name: "Step 3 — Compute base storage with 20 percent buffer"
  ansible.builtin.set_fact:
    _base_storage: "{{ ((_parsed_volume | int) * (_parsed_size | int) * 1.20) | int }}"

- name: "Step 3 — Apply CRR multiplier"
  ansible.builtin.set_fact:
    computed_storage_bytes: >-
      {{ ((_base_storage | int) * 2) | int if instance_type == 'nhacrr'
         else (_base_storage | int) }}

- name: "Step 3 — Resolve ordered tier list"
  ansible.builtin.set_fact:
    _tier_order: "{{ sizing_order | default(['small', 'medium', 'large', 'xlarge']) }}"

- name: "Step 3 — Select best-matching size tier"
  ansible.builtin.set_fact:
    _matched_tier: "{{ sizing[env_upper] | get_best_mq_tier(computed_storage_bytes, _tier_order, env_upper) }}"

- name: "Step 3 — Expand selected tier properties"
  ansible.builtin.set_fact:
    selected_size_tier: "{{ _matched_tier.name }}"
    qmgr_size: "{{ _matched_tier.specs }}"

- name: "Step 3 — Compute final names and deploy settings"
  ansible.builtin.set_fact:
    qmgr_name: "{{ app_prefix }}{{ env_code }}{{ sequence_number }}"
    namespace: "{{ (app_sys_id ~ '-mq-' ~ env_ns_code ~ '-' ~ sequence_number) | lower }}"
    target_branch: "{{ env_branch_map[env_upper] }}"
    mq_version: "{{ mq_versions.PROD if env_upper in ['PROD', 'PR'] else mq_versions.NONPROD }}"
    license_id: "{{ license_ids.PROD if env_upper in ['PROD', 'PR'] else license_ids.NONPROD }}"
    license_use: "{{ 'Production' if env_upper in ['PROD', 'PR'] else 'NonProduction' }}"
    storage_class_name: "{{ qmgr_size.storage_class | default('lvms-vg1') }}"
    qmgr_name_upper: "{{ (app_prefix + env_code + sequence_number) | upper }}"
    live_region_lower: "{{ default_deploy_region | default('use') }}"

# ── Step 4: Display computed config ───────────────────────────
- name: "Step 4 — Computed configuration summary"
  ansible.builtin.debug:
    msg:
      - "═══════════════════════════════════════════════"
      - "  Queue Manager : {{ qmgr_name | upper }}"
      - "  Namespace     : {{ namespace }}"
      - "  Environment   : {{ env_upper }}"
      - "  Instance Type : {{ instance_type }}"
      - "  Vault Zone    : {{ _zone | upper }}"
      - "  Size Tier     : {{ selected_size_tier | default('unknown') }}"
      - "  Regions       : {{ regions.keys() | list if instance_type == 'nhacrr' else [default_deploy_region | default('use')] }}"
      - "  Vault NS      : {{ vault_namespace | default('root') }}"
      - "  Target Branch : {{ target_branch }}"
      - "  Computed Storage: {{ computed_storage_bytes | int | human_readable }}"
      - "  QM Storage    : {{ qmgr_size.qmgr_storage }}"
      - "  Log Storage   : {{ qmgr_size.log_storage }}"
      - "═══════════════════════════════════════════════"

# ── Step 5: Validate action / idempotency ─────────────────────
- name: "Step 5 — Check if QM directory exists"
  ansible.builtin.stat:
    path: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}"
  register: _qmgr_dir

- name: "Step 5 — Validate Update (directory MUST exist)"
  ansible.builtin.fail:
    msg: >-
      QM directory queue_managers/{{ qmgr_name }}/ does NOT exist in {{ target_branch }}.
      Use qm_action=Create to onboard a new queue manager.
  when:
    - qm_action == 'Update'
    - not _qmgr_dir.stat.exists

- name: "Step 5 — Recompute create target if candidate already exists"
  block:
    - name: "Create — Existing candidate detected, discover next free sequence"
      ansible.builtin.include_tasks: discover_sequence.yaml

    - name: "Create — Recompute final names after sequence increment"
      ansible.builtin.set_fact:
        sequence_number: "{{ seq_number }}"
        qmgr_name: "{{ app_prefix }}{{ env_code }}{{ seq_number }}"
        namespace: "{{ (app_sys_id ~ '-mq-' ~ env_ns_code ~ '-' ~ seq_number) | lower }}"
        qmgr_name_upper: "{{ (app_prefix + env_code + seq_number) | upper }}"

    - name: "Create — Log sequence bump"
      ansible.builtin.debug:
        msg: >-
          Candidate queue manager already existed, so create advanced to
          {{ qmgr_name | upper }}.
  when:
    - qm_action == 'Create'
    - _qmgr_dir.stat.exists

# ── Step 6: Clean stale overlays on Update ────────────────────
- name: "Step 6 — Remove stale directory for Update"
  ansible.builtin.file:
    path: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}"
    state: absent
  when: qm_action == 'Update'

# ── Step 7: Create directory structure ────────────────────────
- name: "Step 7 — Compute target regions"
  ansible.builtin.set_fact:
    _target_regions: "{{ regions.keys() | list if instance_type == 'nhacrr' else [default_deploy_region | default('use')] }}"

- name: "Step 7 — Create base functional directories"
  ansible.builtin.file:
    path: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "argocd"
    - "certs"
    - "monitoring"
    - "objects/ini"
    - "objects/mqsc"
    - "objects/utility_scripts"
    - "objects/web"
    - "overlays"

- name: "Step 7 — Create overlay directories per region"
  ansible.builtin.file:
    path: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/overlays/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ _target_regions }}"

# ── Step 8: Populate common objects ──────────────────────────
- name: "Step 8 — Discover source files"
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../nativeha_templates/objects/{{ item }}"
    patterns: "*"
    file_type: file
  register: _src_objects
  loop:
    - "mqsc"
    - "utility_scripts"

- name: "Step 8 — Set source file lists"
  ansible.builtin.set_fact:
    mqsc_files: "{{ _src_objects.results | selectattr('item', 'equalto', 'mqsc') | map(attribute='files') | first | map(attribute='path') | map('basename') | list }}"
    script_files: "{{ _src_objects.results | selectattr('item', 'equalto', 'utility_scripts') | map(attribute='files') | first | map(attribute='path') | map('basename') | list }}"

- name: "Step 8 — Copy common files"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../nativeha_templates/objects/{{ item }}/"
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/objects/{{ item }}/"
    mode: preserve
  loop:
    - "mqsc"
    - "ini"
    - "web"
    - "utility_scripts"

- name: "Step 8 — Generate objects/kustomization.yaml"
  ansible.builtin.template:
    src: objects_kustomization.yaml.j2
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/objects/kustomization.yaml"
    mode: "0644"

# ── Step 9: Populate common certs ─────────────────────────────
- name: "Step 9 — Generate certs manifests"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../nativeha_templates/tls_templates/VSO/{{ item.src }}"
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/certs/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "serviceaccount.yaml", dest: "serviceaccount.yaml" }
    - { src: "vault_connection.yaml", dest: "vault_connection.yaml" }
    - { src: "vault_auth.yaml", dest: "vault_auth.yaml" }
    - { src: "vault_secret_app_pki.yaml", dest: "vault_secret_app_pki.yaml" }
    - { src: "vault_secret_ibm_entitlement.yaml", dest: "vault_secret_ibm_entitlement.yaml" }
    - { src: "vault_secret_nha.yaml", dest: "vault_secret_nha.yaml", condition: "{{ instance_type in ['nha', 'nhacrr'] }}" }
    - { src: "vault_secret_nhacrr.yaml", dest: "vault_secret_nhacrr.yaml", condition: "{{ instance_type == 'nhacrr' }}" }
  when: item.condition | default(true) | bool

- name: "Step 9 — Generate certs/kustomization.yaml"
  ansible.builtin.template:
    src: certs_kustomization.yaml.j2
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/certs/kustomization.yaml"
    mode: "0644"

# ── Step 10: Populate common monitoring ───────────────────────
- name: "Step 10 — Generate monitoring manifests"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/monitoring/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "prometheus_config.yaml.j2", dest: "prometheus_config.yaml" }
    - { src: "prometheus_deployment.yaml.j2", dest: "prometheus_deployment.yaml" }
    - { src: "prometheus_service.yaml.j2", dest: "prometheus_service.yaml" }
  when: enable_prometheus_monitor | default(true) | bool

- name: "Step 10 — Generate monitoring/kustomization.yaml"
  ansible.builtin.template:
    src: monitoring_kustomization.yaml.j2
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/monitoring/kustomization.yaml"
    mode: "0644"
  when: enable_prometheus_monitor | default(true) | bool

# ── Step 11: Generate regional overlays ───────────────────────
- name: "Step 11 — Generate manifests per region"
  ansible.builtin.include_tasks: generate_overlay.yaml
  loop: "{{ _target_regions }}"
  loop_control:
    loop_var: current_region

# ── Step 12: Generate ArgoCD Application CRs ──────────────────
- name: "Step 12 — Generate ArgoCD Application per region"
  ansible.builtin.template:
    src: argocd_app.yaml.j2
    dest: "{{ git_work_dir }}/queue_managers/{{ qmgr_name }}/{{ instance_type }}/argocd/{{ qmgr_name }}_{{ current_region }}_app.yaml"
    mode: "0644"
  loop: "{{ _target_regions }}"
  loop_control:
    loop_var: current_region

# ── Step 13: Git commit + push ────────────────────────────────
- name: "Step 13 — Stage, commit and push"
  ansible.builtin.shell: |
    cd {{ git_work_dir }}
    git add -A
    git diff --cached --quiet || git commit -m "{{ qm_action }} QM {{ qmgr_name }} ({{ instance_type }}, {{ selected_size_tier }})"
    git push origin {{ target_branch }}
  register: _git_push
  changed_when: _git_push.rc == 0

- name: "Step 13 — Onboarding complete"
  ansible.builtin.debug:
    msg:
      - "═══════════════════════════════════════════════"
      - "  ✅ {{ qm_action | upper }} COMPLETE"
      - "  Queue Manager : {{ qmgr_name | upper }}"
      - "  Namespace     : {{ namespace }}"
      - "  Branch        : {{ target_branch }}"
      - "  ArgoCD Apps   : {{ _target_regions | map('regex_replace', '^(.*)$', qmgr_name ~ '-\\1-app.yaml') | list }}"
      - "═══════════════════════════════════════════════"
