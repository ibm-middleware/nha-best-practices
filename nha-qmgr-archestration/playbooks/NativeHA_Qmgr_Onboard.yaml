---
# ============================================================
# Onboard MQ Queue Manager — NativeHA Automation
# ============================================================
# This playbook is designed for Ansible Automation Platform.
# Survey variables are passed as extra_vars.
#
# Survey variables:
#   Create:
#     qm_action:        Create
#     app_sys_id:       Application System ID / prefix (e.g. DMQ)
#     mq_environment:   DEV | QA1 | QA2 | STG | PROD
#     total_volume_24h: Expected 24h message volume (e.g. 1m, 500k, 1k)
#     avg_msg_size:     Average message size (e.g. 4k, 10m, 100m)
#   Update:
#     qm_action:        Update
#     mq_environment:   DEV | QA1 | QA2 | STG | PROD
#     qmgr_name:        Full Queue Manager Name (e.g. DMQDV001)
#     total_volume_24h: Expected 24h message volume (e.g. 1m, 500k, 1k)
#     avg_msg_size:     Average message size (e.g. 4k, 10m, 100m)
#
# Auto-derived (NEVER add as survey variables):
#   seq_number     — auto-discovered from Git repo (001, 002, ...)
#   instance_type  — nha (DEV/QA1/STG) or nhacrr (QA2/PROD)
#   size           — best-match from sizing matrix (log_storage included)
#   deploy_regions — use (single) or use+usw (CRR)
#   namespace      — <PREFIXID>-MQ-<3-CHAR-ENV>-<SEQ>
#   qmgr_name      — <prefixid><2-char-env><seq>
#   vault_namespace— derived from app_sys_id via vault_security_zones
# ============================================================
- name: Onboard MQ Queue Manager
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: "Pre-flight — Load global variables"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml"

  roles:
    - role: ../roles/qmgr_onboard
