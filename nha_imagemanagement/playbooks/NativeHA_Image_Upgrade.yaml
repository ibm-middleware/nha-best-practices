---
# =============================================================
# NativeHA_Image_Upgrade.yaml - MQ Version/Image Upgrade Playbook
# =============================================================
#
# Purpose:
#   Updates only the qm-image-patch.yaml files in each regional
#   overlay. The base qmgr.yaml remains unchanged.
#
# AAP survey variables:
#   app_sys_id      - Application system ID, for example app1
#   mq_environment  - DEV | QA1 | QA2 | QA3 | PROD
#   qmgr_name       - Queue manager selector:
#                     single name, comma-separated names, or all
#   new_mq_version  - New MQ version, for example 9.4.5.0-r2
#   new_license_id  - Optional. Defaults from environment mapping.
#
# Variables loaded from nativeha_qmgr_control_vars.yaml:
#   env_repo_map / env_branch_map - choose target Git repo and branch
#   env_qmgr_abbr                 - validates queue managers belong to app/env
#   qmgr_env_subdir_map           - locates environment-specific repo subdirs
#   license_ids                   - fallback license ID when new_license_id is empty
#   target_repo_change_mode       - direct commit or pull_request publication
#
# Variables derived inside the role:
#   env_upper             - normalized environment, for example QA2
#   app_prefix            - lowercase app_sys_id, for example app1
#   qmgr_target_names     - resolved queue managers selected from Git
#   qmgr_root_rel         - target repo root, for example queue_managers/QA2
#   _upgrade_image        - full image value written to qm-image-patch.yaml
# =============================================================

- name: "NativeHA MQ Upgrade - {{ qmgr_name | default('UNDEFINED') | upper }}"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../../nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml

  roles:
    - role: nativeha_image_upgrade
