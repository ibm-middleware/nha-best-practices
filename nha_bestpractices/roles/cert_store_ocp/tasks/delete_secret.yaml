---
# Delete MQ TLS secrets from every target cluster.

# Purpose: Delete the OpenShift Secret for the selected certificate backend.
- name: "OpenShift - Delete queue manager TLS secret"
  kubernetes.core.k8s:
    host: "{{ ocp_target.api_url }}"
    api_key: "{{ ocp_target.api_key }}"
    validate_certs: "{{ ocp_target.validate_certs | default(true) }}"
    ca_cert: "{{ ocp_target.ca_cert if (ocp_target.ca_cert | default('') | length > 0) else omit }}"
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ namespace }}"
    name: "{{ qmgr_name }}-{{ cert_type_samplecertrepo_subpath[item.0] }}"
  loop: "{{ active_cert_types | product(openshift_targets) | list }}"
  loop_control:
    label: "{{ item.0 }} / {{ item.1.region }}"
  vars:
    cert_type_item: "{{ item.0 }}"
    ocp_target: "{{ item.1 }}"
  register: _ocp_secret_delete
  failed_when: false
  no_log: true

# Purpose: Delete the OpenShift Secret for the selected certificate backend.
- name: "OpenShift - Initialize secret delete failures"
  ansible.builtin.set_fact:
    _ocp_secret_delete_failures: []

# Purpose: Delete the OpenShift Secret for the selected certificate backend.
- name: "OpenShift - Collect secret delete failures"
  ansible.builtin.set_fact:
    _ocp_secret_delete_failures: >-
      {{
        _ocp_secret_delete_failures + [
          {
            'cert_type': item.item.0 | default('unknown'),
            'region': item.item.1.region | default('unknown'),
            'secret': qmgr_name ~ '-' ~ cert_type_samplecertrepo_subpath[item.item.0 | default('app')],
            'message': (
              item.msg
              | default(item.stderr | default('OpenShift Secret delete failed without a module message.', true), true)
              | string
              | regex_replace('\n+', ' ')
              | regex_replace('\s+', ' ')
              | regex_replace('(?i)(api[_-]?key|token|password)[:=][^\s,;}]+', '\1=[redacted]')
              | regex_replace('.*namespaces \\\\"([^\\"]+)\\\\" not found.*', 'OpenShift namespace \1 was not found.')
              | regex_replace('.*namespaces "([^"]+)" not found.*', 'OpenShift namespace \1 was not found.')
              | regex_replace(
                  '.*User \\\\"([^\\"]+)\\\\" cannot ([a-z]+) resource \\\\"([^\\"]+)\\\\".* namespace \\\\"([^\\"]+)\\\\".*',
                  'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                )
              | regex_replace(
                  '.*User "([^"]+)" cannot ([a-z]+) resource "([^"]+)".* namespace "([^"]+)".*',
                  'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                )
              | trim
            )
          }
        ]
      }}
  loop: "{{ _ocp_secret_delete.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0 | default('unknown') }} / {{ item.item.1.region | default('unknown') }}"
  when: >-
    item.failed | default(false) | bool
    or item.rc | default(0) | int != 0
    or item.exception is defined
    or item.module_stderr | default('', true) | string | trim | length > 0
    or item.status | default(0) | int >= 400
    or (
      item.msg is defined
      and item.msg | string | trim is search('(?i)(failed|forbidden|unauthorized|invalid|denied|cannot|unable|error)')
    )
  no_log: true

# Purpose: Delete the OpenShift Secret for the selected certificate backend.
- name: "OpenShift - Fail if secret delete failed"
  ansible.builtin.fail:
    msg: |-
      OpenShift Secret deletion failed for {{ qmgr_name | upper }}.

      Namespace: {{ namespace }}

      Failed delete operation(s):
      {% for failure in _ocp_secret_delete_failures %}
      - {{ failure.region }} {{ failure.cert_type }} Secret {{ failure.secret }}
        Detail: {{ failure.message }}
      {% endfor %}

      Certificate offboarding stopped before the registry was updated. Please verify OpenShift access and rerun.
  when: _ocp_secret_delete_failures | length > 0

# Purpose: Delete the OpenShift Secret for the selected certificate backend.
- name: "OpenShift - Secret delete attempted"
  ansible.builtin.debug:
    msg: >-
      Delete attempted for {{ active_cert_types | join(', ') }} secrets in
      regions {{ openshift_targets | map(attribute='region') | join(', ') }}.
