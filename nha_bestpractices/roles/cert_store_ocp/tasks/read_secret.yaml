---
# Read the TLS secret for the current cert_type from every target cluster.
# The cert is considered reusable only when every target cluster has complete,
# identical tls.crt/tls.key/ca.crt material. Partial delivery can be repaired
# from a complete region; inconsistent or unreadable state is failed before
# samplecertca is contacted.

# Purpose: Build the OpenShift Secret name for {{ cert_type }}.
- name: "OpenShift - Resolve secret name for {{ cert_type }}"
  ansible.builtin.set_fact:
    _ocp_secret_name: "{{ qmgr_name }}-{{ cert_type_samplecertrepo_subpath[cert_type] }}"
    _ocp_secret_materials: []
    _ocp_secret_missing_regions: []
    _ocp_secret_incomplete_regions: []
    _ocp_secret_api_failure_regions: []
    _ocp_secret_read: {}

# Purpose: Read {{ ocp_secret_name }} from each target OpenShift cluster.
- name: "OpenShift - Read secret from target clusters {{ _ocp_secret_name }}"
  kubernetes.core.k8s_info:
    host: "{{ item.api_url }}"
    api_key: "{{ item.api_key }}"
    validate_certs: "{{ item.validate_certs | default(true) }}"
    ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
    api_version: v1
    kind: Secret
    namespace: "{{ namespace }}"
    name: "{{ _ocp_secret_name }}"
  loop: "{{ openshift_targets }}"
  loop_control:
    label: "{{ item.region }}"
  register: _ocp_secret_read
  failed_when: false
  no_log: true

# Purpose: Collect Secret read state from every target region.
- name: "OpenShift - Collect secret read state for {{ cert_type }}"
  ansible.builtin.set_fact:
    _ocp_secret_materials: >-
      {{
        _ocp_secret_materials + [
          {
            'region': item.item.region,
            'tls_crt': _ocp_tls_crt,
            'tls_key': _ocp_tls_key,
            'ca_crt': _ocp_ca_crt,
            'fingerprint': (_ocp_tls_crt ~ '\n' ~ _ocp_tls_key ~ '\n' ~ _ocp_ca_crt) | hash('sha256')
          }
        ]
        if _ocp_secret_complete
        else _ocp_secret_materials
      }}
    _ocp_secret_missing_regions: >-
      {{
        _ocp_secret_missing_regions + [item.item.region]
        if (
          not (_ocp_secret_read_failed | bool)
          and (item.resources is not defined or item.resources | length == 0)
        )
        else _ocp_secret_missing_regions
      }}
    _ocp_secret_incomplete_regions: >-
      {{
        _ocp_secret_incomplete_regions + [item.item.region]
        if (
          not (_ocp_secret_read_failed | bool)
          and item.resources is defined
          and item.resources | length > 0
          and not (_ocp_secret_complete | bool)
        )
        else _ocp_secret_incomplete_regions
      }}
    _ocp_secret_api_failure_regions: >-
      {{
        _ocp_secret_api_failure_regions + [item.item.region]
        if _ocp_secret_read_failed | bool
        else _ocp_secret_api_failure_regions
      }}
  loop: "{{ _ocp_secret_read.results | default([]) }}"
  loop_control:
    label: "{{ item.item.region }}"
  vars:
    _ocp_secret_read_failed: >-
      {{
        item.failed | default(false) | bool
        or item.status | default(0) | int >= 400
        or item.exception is defined
        or item.module_stderr | default('', true) | string | trim | length > 0
      }}
    _ocp_secret_data: "{{ (item.resources[0].data | default({})) if (item.resources is defined and item.resources | length > 0) else {} }}"
    _ocp_secret_complete: >-
      {{
        not (_ocp_secret_read_failed | bool)
        and _ocp_secret_data['tls.crt'] is defined
        and _ocp_secret_data['tls.key'] is defined
        and _ocp_secret_data['ca.crt'] is defined
        and (_ocp_secret_data['tls.crt'] | string | length > 0)
        and (_ocp_secret_data['tls.key'] | string | length > 0)
        and (_ocp_secret_data['ca.crt'] | string | length > 0)
      }}
    _ocp_tls_crt: "{{ (_ocp_secret_data['tls.crt'] | default('') | b64decode) if (_ocp_secret_complete | bool) else '' }}"
    _ocp_tls_key: "{{ (_ocp_secret_data['tls.key'] | default('') | b64decode) if (_ocp_secret_complete | bool) else '' }}"
    _ocp_ca_crt: "{{ (_ocp_secret_data['ca.crt'] | default('') | b64decode) if (_ocp_secret_complete | bool) else '' }}"
  no_log: true

# Purpose: Record whether {{ cert_type }} was found in OpenShift.
- name: "OpenShift - Record secret read result for {{ cert_type }}"
  ansible.builtin.set_fact:
    _backend_read:
      found: >-
        {{
          _ocp_secret_missing_regions | length == 0
          and _ocp_secret_incomplete_regions | length == 0
          and _ocp_secret_api_failure_regions | length == 0
          and _ocp_secret_materials | length == openshift_targets | length
          and _ocp_material_fingerprints | length == 1
        }}
      found_any: "{{ _ocp_secret_materials | length > 0 }}"
      repairable: >-
        {{
          _ocp_secret_materials | length > 0
          and _ocp_secret_api_failure_regions | length == 0
          and _ocp_material_fingerprints | length == 1
          and (
            _ocp_secret_missing_regions | length > 0
            or _ocp_secret_incomplete_regions | length > 0
          )
        }}
      source: "openshift_secret"
      secret_name: "{{ _ocp_secret_name }}"
      tls_crt: "{{ (_ocp_secret_materials | map(attribute='tls_crt') | first) if (_ocp_secret_materials | length > 0) else '' }}"
      tls_key: "{{ (_ocp_secret_materials | map(attribute='tls_key') | first) if (_ocp_secret_materials | length > 0) else '' }}"
      ca_crt: "{{ (_ocp_secret_materials | map(attribute='ca_crt') | first) if (_ocp_secret_materials | length > 0) else '' }}"
      missing_regions: "{{ _ocp_secret_missing_regions }}"
      incomplete_regions: "{{ _ocp_secret_incomplete_regions }}"
      api_failure_regions: "{{ _ocp_secret_api_failure_regions }}"
      inconsistent_regions: >-
        {{
          _ocp_secret_materials | map(attribute='region') | list
          if (_ocp_material_fingerprints | length > 1)
          else []
        }}
  vars:
    _ocp_material_fingerprints: "{{ _ocp_secret_materials | map(attribute='fingerprint') | unique | list }}"
  no_log: true

# Purpose: Print the OpenShift Secret read result for {{ cert_type }}.
- name: "OpenShift - Secret read summary for {{ cert_type }}"
  ansible.builtin.debug:
    msg: >-
      Secret {{ _ocp_secret_name }} reusable={{ _backend_read.found }}.
      missing_regions={{ _backend_read.missing_regions }};
      incomplete_regions={{ _backend_read.incomplete_regions }};
      api_failure_regions={{ _backend_read.api_failure_regions }};
      inconsistent_regions={{ _backend_read.inconsistent_regions }};
      repairable={{ _backend_read.repairable }}.
