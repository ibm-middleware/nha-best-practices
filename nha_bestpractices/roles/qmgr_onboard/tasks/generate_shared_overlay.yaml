---
# Generate overlays/_shared manifests
# This layer is included by each regional overlay. It holds queue-manager-wide
# mutable state that must be identical in every region:

# Purpose: Store the shared overlay directory path before writing shared patches.
- name: "Set shared overlay directory"
  ansible.builtin.set_fact:
    shared_overlay_dir: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared"

# Purpose: Write the shared MQ image patch used by Day 2 upgrades.
- name: "Generate shared image patch"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/qm_image_patch.yaml.j2"
    dest: "{{ shared_overlay_dir }}/patches/qm-image-patch.yaml"
    mode: "0644"

# Purpose: Write the shared sizing patch used by Day 2 sizing updates.
- name: "Generate shared sizing patch"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/qm_sizing_patch.yaml.j2"
    dest: "{{ shared_overlay_dir }}/patches/qm-sizing-patch.yaml"
    mode: "0644"

# Purpose: Write the shared trust patch that points MQ to the client CA Secret.
- name: "Generate shared client trust patch"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/qm_client_trust_patch.yaml.j2"
    dest: "{{ shared_overlay_dir }}/patches/qm-client-trust-patch.yaml"
    mode: "0644"

# Purpose: Shared kustomize name reference config.
- name: "Generate shared Kustomize name reference config"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/kustomizeconfig.yaml.j2"
    dest: "{{ shared_overlay_dir }}/kustomizeconfig.yaml"
    mode: "0644"

# Purpose: Shared app mqsc references patch.
- name: "Generate shared app MQSC references patch"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/mqsc_app_refs_patch.yaml.j2"
    dest: "{{ shared_overlay_dir }}/patches/mqsc-app-refs.yaml"
    mode: "0644"
  when:
    - app_mqsc_groups | default([]) | length > 0
    - (app_mqsc_apply_strategy | default('restart') | lower | trim) == 'restart'

# Purpose: Write the shared overlay kustomization that lists shared patches.
- name: "Generate shared overlay kustomization"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/shared_kustomization.yaml.j2"
    dest: "{{ shared_overlay_dir }}/kustomization.yaml"
    mode: "0644"
