---
# Process one QueueManager client/signer trust certificate add.

# Purpose: Load the selected queue manager facts for this target.
- name: "Client trust target - Set context"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/set_current_target.yaml"

# Purpose: Trim and standardize operator input before validation.
- name: "Client trust target - Normalize operator inputs"
  ansible.builtin.set_fact:
    _client_trust_alias_input: "{{ client_cert_alias | default('', true) | trim }}"
    _client_trust_input_pem: "{{ client_cert_pem | default('', true) | trim }}"
    _client_trust_secret_name: "{{ qmgr_name }}-{{ cert_client_trust_add_secret_suffix }}"
    _client_trust_source_name: "{{ mq_client_trust_source_name | default('clientcerts') }}"
    _client_trust_default_item: "{{ mq_client_trust_default_ca_item | default('example.lab-ca.crt') }}"
    _client_trust_backend: "{{ cert_delivery_backend_effective | default('openshift_secret') }}"
    _client_trust_samplecertrepo_path: >-
      {{
        samplecertrepo_client_trust_shared_path
        | default(mq_client_trust_samplecertrepo_shared_path | default(app_prefix ~ '/ibm-mq/shared'))
        | string
        | trim
        | regex_replace('^/+', '')
        | regex_replace('/+$', '')
      }}
  no_log: true

# Purpose: Name the storage location consistently in logs, reports, and errors.
- name: "Client trust target - Resolve storage description"
  ansible.builtin.set_fact:
    _client_trust_storage_location: >-
      {{
        'samplecertrepo path ' ~ _client_trust_samplecertrepo_path
        if _client_trust_backend == 'samplecertrepo'
        else 'OpenShift Secret ' ~ _client_trust_secret_name
      }}
    _client_trust_storage_model: >-
      {{
        'samplecertrepo shared path stores public PEM; VSO syncs the QueueManager Kubernetes Secret; GitOps stores only the trust item list.'
        if _client_trust_backend == 'samplecertrepo'
        else 'OpenShift Secret stores the supplied public PEM; GitOps stores only the QueueManager trust reference.'
      }}
  no_log: true

# Purpose: Convert the user alias into a safe Secret item name.
- name: "Client trust target - Derive safe Secret item alias"
  ansible.builtin.set_fact:
    _client_trust_alias: >-
      {{
        _client_trust_alias_input
        | lower
        | regex_replace('[^a-z0-9]+', '-')
        | regex_replace('^-+', '')
        | regex_replace('-+$', '')
        | regex_replace('-+', '-')
      }}
  no_log: true

# Purpose: Add the .crt suffix used as the Secret data key.
- name: "Client trust target - Derive Secret item key"
  ansible.builtin.set_fact:
    _client_trust_key: "{{ _client_trust_alias }}.crt"
  no_log: true

# Purpose: Start an empty list so all validation problems can be reported together.
- name: "Client trust target - Initialize input validation errors"
  ansible.builtin.set_fact:
    _client_trust_input_errors: []
  no_log: true

# Purpose: Add every alias, Secret-name, and trust-source naming problem to one error list.
- name: "Client trust target - Record naming validation errors"
  ansible.builtin.set_fact:
    _client_trust_input_errors: "{{ _client_trust_input_errors + [item.message] }}"
  loop:
    - failed: "{{ _client_trust_alias_input | length == 0 }}"
      message: "client_cert_alias is required."
    - failed: "{{ _client_trust_alias_input | length > 0 and _client_trust_alias | length == 0 }}"
      message: >-
        client_cert_alias="{{ _client_trust_alias_input }}" is invalid because
        it does not contain any letters or digits after normalization.
    - failed: "{{ _client_trust_alias | length > 63 }}"
      message: >-
        client_cert_alias="{{ _client_trust_alias_input }}" normalizes to
        "{{ _client_trust_alias }}", which is longer than 63 characters.
        Use a shorter alias.
    - failed: "{{ _client_trust_alias | length > 0 and (_client_trust_alias is not match('^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$')) }}"
      message: >-
        client_cert_alias="{{ _client_trust_alias_input }}" could not be
        normalized to a lowercase DNS-style Secret item name.
    - failed: "{{ _client_trust_source_name is not match('^[a-z0-9]+$') }}"
      message: >-
        mq_client_trust_source_name="{{ _client_trust_source_name }}" is invalid.
        Use lowercase letters and digits only, for example clientcerts.
    - failed: "{{ _client_trust_secret_name is not match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$') }}"
      message: >-
        Derived client trust Secret name "{{ _client_trust_secret_name }}" is
        invalid. Check qmgr_name and mq_client_trust_secret_suffix.
    - failed: "{{ _client_trust_default_item is not match('^[A-Za-z0-9._-]+$') }}"
      message: >-
        mq_client_trust_default_ca_item="{{ _client_trust_default_item }}" is
        invalid. Use a Secret item file name such as example.lab-ca.crt.
    - failed: "{{ _client_trust_backend not in ['openshift_secret', 'samplecertrepo'] }}"
      message: >-
        mq_cert_delivery_backend="{{ _client_trust_backend }}" is invalid.
        Use openshift_secret or samplecertrepo.
    - failed: "{{ _client_trust_backend == 'samplecertrepo' and (_client_trust_samplecertrepo_path | length == 0 or (_client_trust_samplecertrepo_path is search('//|\\.\\.'))) }}"
      message: >-
        mq_client_trust_samplecertrepo_shared_path="{{ _client_trust_samplecertrepo_path }}" is
        invalid. Use a relative KV path such as {{ app_prefix }}/ibm-mq/shared.
  loop_control:
    label: "{{ item.message }}"
  when: item.failed | bool
  no_log: true

# Purpose: Add every PEM content problem to one error list.
- name: "Client trust target - Record PEM validation errors"
  ansible.builtin.set_fact:
    _client_trust_input_errors: "{{ _client_trust_input_errors + [item.message] }}"
  loop:
    - failed: "{{ _client_trust_input_pem | length == 0 }}"
      message: "client_cert_pem is required and must contain one or more public PEM certificate blocks."
    - failed: "{{ (_client_trust_input_pem | regex_search('-----BEGIN [A-Z ]*PRIVATE KEY-----')) is not none }}"
      message: "client_cert_pem contains a private key. Only public certificate blocks are allowed."
    - failed: "{{ _client_trust_input_pem | length > 0 and ((_client_trust_input_pem | regex_search('-----BEGIN CERTIFICATE-----')) is none) }}"
      message: "client_cert_pem does not contain a PEM certificate block."
  loop_control:
    label: "{{ item.message }}"
  when: item.failed | bool
  no_log: true

# Purpose: Stop before any change and print the validation errors collected above.
- name: "Client trust target - Fail with input validation reasons"
  ansible.builtin.fail:
    msg: |-
      Client/signer trust certificate input validation failed for {{ qmgr_name | upper }}.

      {% for issue in _client_trust_input_errors %}
      - {{ issue }}
      {% endfor %}

      No backend trust or GitOps changes were made.
  when: _client_trust_input_errors | length > 0

# Purpose: Separate complete public certificate blocks from extra pasted text.
- name: "Client trust target - Extract certificate blocks"
  ansible.builtin.set_fact:
    _client_trust_cert_blocks: "{{ _client_trust_input_pem | regex_findall('(?s)-----BEGIN CERTIFICATE-----.*?-----END CERTIFICATE-----') }}"
    _client_trust_unparsed_text: "{{ _client_trust_input_pem | regex_replace('(?s)-----BEGIN CERTIFICATE-----.*?-----END CERTIFICATE-----', '') | trim }}"
  no_log: true

# Purpose: Reject pasted text that is not part of a complete PEM certificate block.
- name: "Client trust target - Validate PEM bundle shape"
  ansible.builtin.assert:
    that:
      - _client_trust_cert_blocks | length > 0
      - _client_trust_unparsed_text | length == 0
    fail_msg: >-
      client_cert_pem must contain one or more complete PEM certificate blocks
      and no extra text.
    quiet: true

# Purpose: Prepare certificate content exactly as it will be stored.
- name: "Client trust target - Build normalized PEM bundle"
  ansible.builtin.set_fact:
    _client_trust_bundle_pem: "{{ _client_trust_cert_blocks | join('\n') ~ '\n' }}"
  no_log: true

# Purpose: Read dates, subject, issuer, and serial from certificate content.
- name: "Client trust target - Parse supplied certificate blocks"
  community.crypto.x509_certificate_info:
    content: "{{ item }}"
    valid_at:
      now: "+0s"
  loop: "{{ _client_trust_cert_blocks }}"
  loop_control:
    label: "certificate {{ ansible_loop.index }}"
    extended: true
  register: _client_trust_cert_info
  no_log: true

# Purpose: Stop if the supplied public certificate is expired or not active yet.
- name: "Client trust target - Reject expired or not-yet-valid certificates"
  ansible.builtin.assert:
    that:
      - not item.expired | bool
      - item.valid_at.now | bool
    fail_msg: >-
      One or more supplied certificates are expired or not currently valid.
    quiet: true
  loop: "{{ _client_trust_cert_info.results }}"
  loop_control:
    label: "certificate {{ ansible_loop.index }}"
    extended: true
  no_log: true

# Purpose: Confirm namespace access before reading or writing OpenShift Secrets.
- name: "Client trust target - Validate OpenShift namespaces"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_store_ocp/tasks/validate_namespaces.yaml"
  when: _client_trust_backend == 'openshift_secret'

# Purpose: Confirm samplecertrepo access before reading or writing shared trust data.
- name: "Client trust target - Validate shared samplecertrepo trust path"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/samplecertrepo_preflight.yaml"
  vars:
    active_cert_types: []
    samplecertrepo_preflight_required_capabilities:
      - create
      - update
      - read
    samplecertrepo_preflight_extra_paths:
      - cert_type: "{{ _client_trust_source_name }}"
        kv_path: "{{ _client_trust_samplecertrepo_path }}"
  when: _client_trust_backend == 'samplecertrepo'

# Purpose: Group the work so failures are reported and the temporary Git workspace is removed.
- name: "Client trust target - Execute with Git workspace cleanup"
  block:
    # Purpose: Start tracking backend trust and GitOps changes made by this run.
    - name: "Client trust target - Initialize mutation tracking"
      ansible.builtin.set_fact:
        _client_trust_secret_apply_attempted: false
        _client_trust_samplecertrepo_write_attempted: false
        _client_trust_samplecertrepo_previous_data: {}
        _client_trust_secret_apply_failures: []
        _client_trust_secret_read_failures: []
        _client_trust_current_step: "initializing client/signer trust add"

    # Purpose: Resolve the target repository before backend mutation so direct mode can be serialized.
    - name: "Client trust target - Track target repo path step"
      ansible.builtin.set_fact:
        _client_trust_current_step: "resolving target GitOps repository path"

    # Purpose: Turn the requested queue manager scope into an exact target list.
    - name: "Client trust target - Resolve target repository paths"
      ansible.builtin.set_fact:
        git_repo_url: "{{ env_repo_map[env_upper] }}"
        target_branch: "{{ env_branch_map[env_upper] }}"
        qmgr_root_rel: >-
          {{
            ('queue_managers/' ~ qmgr_env_subdir_map[env_upper])
            if env_upper in (qmgr_env_subdir_map | default({}))
            else 'queue_managers'
          }}
        git_work_dir_base: "{{ git_work_dir }}"

    # Purpose: Build full local paths for the selected queue manager trust patch.
    - name: "Client trust target - Finalize target repository paths"
      ansible.builtin.set_fact:
        qmgr_rel_path: "{{ qmgr_root_rel }}/{{ qmgr_name }}"
        git_work_dir: "{{ git_work_dir_base }}/client_trust_{{ qmgr_name }}_{{ now(utc=false, fmt='%Y%m%d%H%M%S') }}_{{ 1000000 | random }}"

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track target repo clone step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          cloning target GitOps repo {{ git_repo_url }} branch {{ target_branch }}

    # Purpose: Ensure the temporary Git checkout parent directory exists.
    - name: "Client trust target - Ensure git work base exists"
      ansible.builtin.file:
        path: "{{ git_work_dir_base }}"
        state: directory
        mode: "0755"
      check_mode: false

    # Purpose: Clone the target repository and set the automation Git identity.
    - name: "Client trust target - Clone and configure target repo"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: git_clone_and_configure

    # Purpose: Serialize direct-mode trust updates before reading backend trust data.
    - name: "Client trust target - Acquire direct publish lock"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: direct_publish_lock_acquire
      vars:
        direct_publish_lock_sync_after_acquire: true

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track Secret read step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          reading seeded OpenShift Secret {{ _client_trust_secret_name }} in
          namespace {{ namespace }}
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track samplecertrepo read step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          reading seeded shared samplecertrepo path {{ _client_trust_samplecertrepo_path }}
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Read the existing OpenShift Secret before merge, delete, or diagnostics.
    - name: "Client trust target - Read existing trust Secrets"
      kubernetes.core.k8s_info:
        host: "{{ item.api_url }}"
        api_key: "{{ item.api_key }}"
        validate_certs: "{{ item.validate_certs | default(true) }}"
        ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
        api_version: v1
        kind: Secret
        namespace: "{{ namespace }}"
        name: "{{ _client_trust_secret_name }}"
      loop: "{{ openshift_targets }}"
      loop_control:
        label: "{{ item.region }}"
      register: _client_trust_secret_reads
      failed_when: false
      no_log: true
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Read existing shared samplecertrepo trust data before merging the new certificate.
    - name: "Client trust target - Read existing shared samplecertrepo trust data"
      community.hashi_samplecertrepo.samplecertrepo_kv2_get:
        url: "{{ samplecertrepo_url }}"
        auth_method: "{{ samplecertrepo_cert_auth_method }}"
        token: "{{ samplecertrepo_cert_token if samplecertrepo_cert_auth_method == 'token' else omit }}"
        role_id: "{{ samplecertrepo_cert_role_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        secret_id: "{{ samplecertrepo_cert_secret_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        validate_certs: "{{ samplecertrepo_validate_certs | default(true) }}"
        engine_mount_point: "{{ samplecertrepo_cert_mount_point }}"
        namespace: "{{ samplecertrepo_namespace if (samplecertrepo_namespace | default('') | length > 0) else omit }}"
        path: "{{ _client_trust_samplecertrepo_path }}"
        timeout: "{{ nativeha_api_timeout | default(45) | int }}"
      register: _client_trust_samplecertrepo_read
      failed_when: false
      no_log: true
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Start empty maps that will be filled from existing backend data.
    - name: "Client trust target - Initialize existing trust data"
      ansible.builtin.set_fact:
        _client_trust_existing_data: {}
        _client_trust_secret_string_data: {}
      no_log: true

    # Purpose: Decide whether a samplecertrepo read failure is only an unseeded path.
    - name: "Client trust target - Classify shared samplecertrepo read"
      ansible.builtin.set_fact:
        _client_trust_samplecertrepo_missing: >-
          {{
            (_client_trust_samplecertrepo_read.status | default(0) | int == 404)
            or (
              _client_trust_samplecertrepo_read.msg | default('', true) | string
              is search('(?i)(not found|does not exist|not exist|missing path|no secret|secret not found)')
            )
          }}
      no_log: true
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Stop if existing shared samplecertrepo trust data cannot be read safely.
    - name: "Client trust target - Fail if shared samplecertrepo trust read failed"
      ansible.builtin.fail:
        msg: |-
          Client/signer shared samplecertrepo trust path could not be read for {{ qmgr_name | upper }}.

          samplecertrepo URL: {{ samplecertrepo_url }}
          KV mount: {{ samplecertrepo_cert_mount_point }}
          samplecertrepo path: {{ _client_trust_samplecertrepo_path }}

          No samplecertrepo or GitOps changes were made.
      when:
        - _client_trust_backend == 'samplecertrepo'
        - _client_trust_samplecertrepo_read.failed | default(false) | bool
        - not (_client_trust_samplecertrepo_missing | default(false) | bool)

    # Purpose: Preserve existing shared samplecertrepo trust items before adding the new certificate.
    - name: "Client trust target - Collect existing shared samplecertrepo data"
      ansible.builtin.set_fact:
        _client_trust_existing_data: "{{ _client_trust_samplecertrepo_read.data.data | default({}) }}"
        _client_trust_secret_string_data: "{{ _client_trust_samplecertrepo_read.data.data | default({}) }}"
        _client_trust_samplecertrepo_previous_data: "{{ _client_trust_samplecertrepo_read.data.data | default({}) }}"
      no_log: true
      when:
        - _client_trust_backend == 'samplecertrepo'
        - not (_client_trust_samplecertrepo_missing | default(false) | bool)
        - _client_trust_samplecertrepo_read.data is defined
        - _client_trust_samplecertrepo_read.data.data is defined

    # Purpose: Convert failed module results into safe, readable failure messages.
    - name: "Client trust target - Collect trust Secret read failures"
      ansible.builtin.set_fact:
        _client_trust_secret_read_failures: >-
          {{
            _client_trust_secret_read_failures + [
              {
                'region': item.item.region | default('unknown'),
                'message': (
                  item.msg
                  | default(
                      item.stderr
                      | default(
                          item.module_stderr
                          | default(
                              item.exception
                              | default('OpenShift Secret read failed without a module message.', true),
                              true
                            ),
                          true
                        ),
                      true
                    )
                  | string
                  | regex_replace('\n+', ' ')
                  | regex_replace('\s+', ' ')
                  | regex_replace('-----BEGIN [^-]+-----.*-----END [^-]+-----', '[redacted certificate material]')
                  | regex_replace('(?i)(api[_-]?key|token|password|tls\\.key|tls\\.crt|ca\\.crt)[:=][^\\s,;}]+', '\\1=[redacted]')
                  | regex_replace('(?i)bearer\\s+[^\\s,;}]+', 'Bearer [redacted]')
                  | regex_replace('.*namespaces \\\\"([^\\"]+)\\\\" not found.*', 'OpenShift namespace \1 was not found.')
                  | regex_replace('.*namespaces "([^"]+)" not found.*', 'OpenShift namespace \1 was not found.')
                  | regex_replace(
                      '.*User \\\\"([^\\"]+)\\\\" cannot ([a-z]+) resource \\\\"([^\\"]+)\\\\".* namespace \\\\"([^\\"]+)\\\\".*',
                      'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                    )
                  | regex_replace(
                      '.*User "([^"]+)" cannot ([a-z]+) resource "([^"]+)".* namespace "([^"]+)".*',
                      'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                    )
                  | trim
                )
              }
            ]
          }}
      loop: "{{ _client_trust_secret_reads.results | default([]) }}"
      loop_control:
        label: "{{ item.item.region | default('unknown') }}"
      no_log: true
      when:
        - _client_trust_backend == 'openshift_secret'
        - >-
          item.failed | default(false) | bool
          or item.rc | default(0) | int != 0
          or item.exception is defined
          or item.module_stderr | default('', true) | string | trim | length > 0
          or item.status | default(0) | int >= 400
          or (
            item.msg is defined
            and item.msg | string | trim is search('(?i)(failed|forbidden|unauthorized|invalid|denied|cannot|unable|error)')
          )

    # Purpose: Stop when the seeded client trust Secret cannot be read.
    - name: "Client trust target - Fail if trust Secret read failed"
      ansible.builtin.fail:
        msg: |-
          Client/signer trust Secret read failed for {{ qmgr_name | upper }}.

          Secret: {{ _client_trust_secret_name }}
          Namespace: {{ namespace }}

          Failed region(s):
          {% for failure in _client_trust_secret_read_failures %}
          - {{ failure.region }}: {{ failure.message }}
          {% endfor %}

          No OpenShift Secret or GitOps changes were made.
      when:
        - _client_trust_backend == 'openshift_secret'
        - _client_trust_secret_read_failures | length > 0

    # Purpose: Keep existing Secret keys so adding one certificate does not remove others.
    - name: "Client trust target - Collect existing trust Secret data"
      ansible.builtin.set_fact:
        _client_trust_existing_data: >-
          {{
            _client_trust_existing_data
            | combine((item.resources | first).data | default({}))
          }}
      loop: "{{ _client_trust_secret_reads.results }}"
      loop_control:
        label: "{{ item.item.region }}"
      when:
        - _client_trust_backend == 'openshift_secret'
        - not (item.failed | default(false) | bool)
        - item.resources | default([]) | length > 0
      no_log: true

    # Purpose: Stop if Day 1 did not create the client trust storage first.
    - name: "Client trust target - Require seeded trust data"
      ansible.builtin.assert:
        that:
          - _client_trust_existing_data | length > 0
          - _client_trust_default_item in _client_trust_existing_data
        fail_msg: >-
          Expected seeded client/signer trust data in {{ _client_trust_storage_location }}
          with default item {{ _client_trust_default_item }}. Run certificate
          onboard first so the queue manager has the default company CA before
          adding Day-2 client/signer certificates.
        quiet: true

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track Secret merge step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          merging supplied public certificate item {{ _client_trust_key }} into
          seeded trust data at {{ _client_trust_storage_location }}

    # Purpose: Convert existing Secret data from base64 before merging the new certificate.
    - name: "Client trust target - Decode existing trust Secret data"
      ansible.builtin.set_fact:
        _client_trust_secret_string_data: >-
          {{
            _client_trust_secret_string_data
            | combine({item.key: (item.value | b64decode)})
          }}
      loop: "{{ _client_trust_existing_data | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Add the supplied public certificate to merged trust Secret data.
    - name: "Client trust target - Merge supplied trust certificate"
      ansible.builtin.set_fact:
        _client_trust_secret_string_data: >-
          {{
            _client_trust_secret_string_data
            | combine({_client_trust_key: _client_trust_bundle_pem})
          }}
        _client_trust_items: >-
          {{
            [_client_trust_default_item]
            + (
              (_client_trust_secret_string_data.keys() | list + [_client_trust_key])
              | unique
              | difference([_client_trust_default_item])
              | sort
            )
          }}
      no_log: true

    # Purpose: Confirm the selected queue manager exists in the GitOps checkout.
    - name: "Client trust target - Check queue manager target path"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared/kustomization.yaml"
      register: _client_trust_shared_kustomization

    # Purpose: Stop if the selected queue manager is not present in the GitOps repo.
    - name: "Client trust target - Require existing queue manager GitOps path"
      ansible.builtin.assert:
        that:
          - _client_trust_shared_kustomization.stat.exists
        fail_msg: >-
          Target repository path {{ qmgr_rel_path }}/overlays/_shared was not
          found in {{ git_repo_url }} branch {{ target_branch }}. Run queue
          manager onboarding first.
        quiet: true

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track GitOps patch step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          updating Day-2 GitOps trust item patch for {{ qmgr_rel_path }}

    # Purpose: Confirm Day 1 created the shared trust patch file.
    - name: "Client trust target - Check Day-1 trust patch path"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}"
      register: _client_trust_patch_file_stat

    # Purpose: Stop if the Day 1 shared trust patch file is missing.
    - name: "Client trust target - Require Day-1 trust patch path"
      ansible.builtin.assert:
        that:
          - _client_trust_patch_file_stat.stat.exists
        fail_msg: >-
          Target queue manager GitOps path is missing
          overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}.
          Queue manager onboarding must create this Day-2 client/signer trust
          patch before Client/Signer Trust Add can update it.
        quiet: true

    # Purpose: Read the shared overlay kustomization before checking the trust patch reference.
    - name: "Client trust target - Read shared overlay file"
      ansible.builtin.slurp:
        src: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared/kustomization.yaml"
      register: _client_trust_kustomization_raw

    # Purpose: Confirm the shared overlay kustomization references the trust patch.
    - name: "Client trust target - Validate Day-1 shared overlay trust patch reference"
      ansible.builtin.assert:
        that:
          - ('patches/' ~ cert_client_trust_add_patch_file) in (_client_trust_kustomization_raw.content | b64decode)
        fail_msg: >-
          Target queue manager GitOps path is missing the
          patches/{{ cert_client_trust_add_patch_file }} reference in
          overlays/_shared/kustomization.yaml. Queue manager onboarding must
          create this reference; Client/Signer Trust Add only updates the
          existing Day-2 trust patch file.
        quiet: true

    # Purpose: Write the GitOps patch or kustomization file for this queue manager change.
    - name: "Client trust target - Write QueueManager trust patch"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/qm_client_trust_patch.yaml.j2"
        dest: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}"
        mode: "0644"
      vars:
        client_trust_items: "{{ _client_trust_items }}"

    # Purpose: Read the rendered trust patch before checking its content.
    - name: "Client trust target - Read generated trust patch"
      ansible.builtin.slurp:
        src: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}"
      register: _client_trust_patch_raw

    # Purpose: Confirm the generated trust patch is valid YAML.
    - name: "Client trust target - Parse generated trust patch"
      ansible.builtin.set_fact:
        _client_trust_patch_doc: "{{ _client_trust_patch_raw.content | b64decode | from_yaml }}"

    # Purpose: Keep shared kustomization text so the trust patch reference can be checked.
    - name: "Client trust target - Capture shared overlay text"
      ansible.builtin.set_fact:
        _client_trust_shared_overlay_text: "{{ _client_trust_kustomization_raw.content | b64decode }}"

    # Purpose: Confirm the trust patch contains the requested trust item.
    - name: "Client trust target - Validate generated trust patch files"
      ansible.builtin.assert:
        that:
          - _client_trust_patch_doc is sequence
          - (_client_trust_patch_doc | selectattr('path', 'equalto', '/spec/pki/trust/0/secret/items') | list | length) == 1
          - (_client_trust_patch_doc | selectattr('path', 'equalto', '/spec/pki/keys/0/secret/items') | list | length) == 0
          - _client_trust_default_item in (_client_trust_patch_doc | to_json)
          - _client_trust_key in (_client_trust_patch_doc | to_json)
          - ('patches/' ~ cert_client_trust_add_patch_file) in _client_trust_shared_overlay_text
        fail_msg: >-
          Generated client/signer trust GitOps files are incomplete. Expected
          QueueManager patch {{ cert_client_trust_add_patch_file }} to update
          only /spec/pki/trust/0/secret/items with {{ _client_trust_default_item }}
          and {{ _client_trust_key }}, and to be listed in overlays/_shared/kustomization.yaml.
        quiet: true

    # Purpose: Prepare expected git change paths.
    - name: "Client trust target - Build expected Git change paths"
      ansible.builtin.set_fact:
        _client_trust_expected_publish_paths:
          - "{{ qmgr_rel_path }}/overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}"

    # Purpose: Read Git status paths so only expected files are allowed.
    - name: "Client trust target - Check pending Git changes"
      ansible.builtin.command:
        argv: ["git", "status", "--porcelain"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _client_trust_git_status
      changed_when: false
      check_mode: false

    # Purpose: Convert Git status output into paths checked against the allow-list.
    - name: "Client trust target - Classify pending Git changes"
      ansible.builtin.set_fact:
        _client_trust_unexpected_paths: >-
          {{
            (_client_trust_git_status.stdout_lines
             | map('regex_replace', '^.. +', '')
             | list)
            | difference(_client_trust_expected_publish_paths)
          }}

    # Purpose: Stop if client trust add changed files outside the allow-list.
    - name: "Client trust target - Fail if unexpected Git files changed"
      ansible.builtin.assert:
        that:
          - _client_trust_unexpected_paths | length == 0
        fail_msg: |-
          Client/signer trust add changed unexpected Git files.

          Unexpected path(s): {{ _client_trust_unexpected_paths }}
          Expected only: {{ _client_trust_expected_publish_paths }}
          No backend trust changes were made.
        quiet: true

    # Purpose: Store the rendered trust patch summary for the final report.
    - name: "Client trust target - Set GitOps validation summary"
      ansible.builtin.set_fact:
        _client_trust_gitops_validation_summary: >-
          Validated generated QueueManager trust patch YAML, shared
          overlay patch membership, and expected changed files. GitOps stores
          only the trust item list for source {{ _client_trust_source_name }}
          backed by {{ _client_trust_secret_name }}; the supplied public PEM is
          stored in {{ _client_trust_storage_location }}.

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track Secret apply step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          applying OpenShift Secret {{ _client_trust_secret_name }} with trust
          item {{ _client_trust_key }}
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Record that OpenShift Secret apply was attempted.
    - name: "Client trust target - Mark Secret apply attempt"
      ansible.builtin.set_fact:
        _client_trust_secret_apply_attempted: true
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Create or update the OpenShift Secret with approved certificate data.
    - name: "Client trust target - Apply dedicated trust Secret"
      kubernetes.core.k8s:
        host: "{{ item.api_url }}"
        api_key: "{{ item.api_key }}"
        validate_certs: "{{ item.validate_certs | default(true) }}"
        ca_cert: "{{ item.ca_cert if (item.ca_cert | default('') | length > 0) else omit }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ _client_trust_secret_name }}"
            namespace: "{{ namespace }}"
            labels:
              app.kubernetes.io/name: "{{ qmgr_name }}"
              app.kubernetes.io/managed-by: ansible-automation
              mq.ibm.com/environment: "{{ env_upper }}"
              mq.ibm.com/cert-type: "client-trust"
              mq.ibm.com/cert-backend: "openshift-secret"
          type: "{{ cert_client_trust_add_secret_type }}"
          stringData: "{{ _client_trust_secret_string_data }}"
      loop: "{{ openshift_targets }}"
      loop_control:
        label: "{{ item.region }}"
      register: _client_trust_secret_apply
      failed_when: false
      no_log: true
      when: _client_trust_backend == 'openshift_secret'

    # Purpose: Convert failed module results into safe, readable failure messages.
    - name: "Client trust target - Collect trust Secret apply failures"
      ansible.builtin.set_fact:
        _client_trust_secret_apply_failures: >-
          {{
            _client_trust_secret_apply_failures + [
              {
                'region': item.item.region | default('unknown'),
                'message': (
                  item.msg
                  | default(item.stderr | default('OpenShift Secret apply failed without a module message.', true), true)
                  | string
                  | regex_replace('\n+', ' ')
                  | regex_replace('\s+', ' ')
                  | regex_replace('(?i)(api[_-]?key|token|password|tls\\.key|tls\\.crt|ca\\.crt)[:=][^\\s,;}]+', '\\1=[redacted]')
                  | regex_replace('.*namespaces \\\\"([^\\"]+)\\\\" not found.*', 'OpenShift namespace \1 was not found.')
                  | regex_replace('.*namespaces "([^"]+)" not found.*', 'OpenShift namespace \1 was not found.')
                  | regex_replace(
                      '.*User \\\\"([^\\"]+)\\\\" cannot ([a-z]+) resource \\\\"([^\\"]+)\\\\".* namespace \\\\"([^\\"]+)\\\\".*',
                      'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                    )
                  | regex_replace(
                      '.*User "([^"]+)" cannot ([a-z]+) resource "([^"]+)".* namespace "([^"]+)".*',
                      'OpenShift denied access. User \1 cannot \2 \3 in namespace \4.'
                    )
                  | trim
                )
              }
            ]
          }}
      loop: "{{ _client_trust_secret_apply.results | default([]) }}"
      loop_control:
        label: "{{ item.item.region | default('unknown') }}"
      no_log: true
      when:
        - _client_trust_backend == 'openshift_secret'
        - >-
          item.failed | default(false) | bool
          or item.rc | default(0) | int != 0
          or item.exception is defined
          or item.module_stderr | default('', true) | string | trim | length > 0
          or item.status | default(0) | int >= 400
          or (
            item.msg is defined
            and item.msg | string | trim is search('(?i)(failed|forbidden|unauthorized|invalid|denied|cannot|unable|error)')
          )

    # Purpose: Stop when the updated client trust Secret cannot be applied.
    - name: "Client trust target - Fail if trust Secret apply failed"
      ansible.builtin.fail:
        msg: |-
          Client/signer trust Secret delivery failed for {{ qmgr_name | upper }}.

          Secret: {{ _client_trust_secret_name }}
          Namespace: {{ namespace }}

          Failed region(s):
          {% for failure in _client_trust_secret_apply_failures %}
          - {{ failure.region }}: {{ failure.message }}
          {% endfor %}

          Git changes were validated but not published. Any partial OpenShift Secret changes will be rolled back by this job.
      when:
        - _client_trust_backend == 'openshift_secret'
        - _client_trust_secret_apply_failures | length > 0

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track samplecertrepo write step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          writing shared samplecertrepo trust path {{ _client_trust_samplecertrepo_path }} with
          trust item {{ _client_trust_key }}
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Record that samplecertrepo write was attempted.
    - name: "Client trust target - Mark samplecertrepo write attempt"
      ansible.builtin.set_fact:
        _client_trust_samplecertrepo_write_attempted: true
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Create or update shared samplecertrepo trust data for VSO sync.
    - name: "Client trust target - Apply shared samplecertrepo trust data"
      community.hashi_samplecertrepo.samplecertrepo_kv2_write:
        url: "{{ samplecertrepo_url }}"
        auth_method: "{{ samplecertrepo_cert_auth_method }}"
        token: "{{ samplecertrepo_cert_token if samplecertrepo_cert_auth_method == 'token' else omit }}"
        role_id: "{{ samplecertrepo_cert_role_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        secret_id: "{{ samplecertrepo_cert_secret_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        validate_certs: "{{ samplecertrepo_validate_certs | default(true) }}"
        engine_mount_point: "{{ samplecertrepo_cert_mount_point }}"
        namespace: "{{ samplecertrepo_namespace if (samplecertrepo_namespace | default('') | length > 0) else omit }}"
        path: "{{ _client_trust_samplecertrepo_path }}"
        timeout: "{{ nativeha_api_timeout | default(45) | int }}"
        data: "{{ _client_trust_secret_string_data }}"
      no_log: true
      when: _client_trust_backend == 'samplecertrepo'

    # Purpose: Save the current operation name so failure output points to the exact step.
    - name: "Client trust target - Track GitOps publish step"
      ansible.builtin.set_fact:
        _client_trust_current_step: >-
          publishing GitOps trust patch {{ qmgr_rel_path }}/overlays/_shared/patches/{{ cert_client_trust_add_patch_file }}

    # Purpose: Store details shown in console and email output.
    - name: "Client trust target - Set publish metadata"
      ansible.builtin.set_fact:
        target_repo_pr_action_slug: "client-trust-add"
        target_repo_pr_action_label: "Add Client Trust Cert"
        target_repo_pr_repo_path: "{{ qmgr_rel_path }}"
        target_repo_pr_summary: >-
          Add/update client or signer trust certificate alias {{ _client_trust_alias_input }}
          for {{ qmgr_name | upper }} using dedicated Secret {{ _client_trust_secret_name }}.
        target_repo_pr_validation: >-
          Applied public trust certificate data to {{ _client_trust_storage_location }}.
          {{ _client_trust_gitops_validation_summary }}

    # Purpose: Publish the prepared GitOps changes by pull request or direct commit.
    - name: "Client trust target - Publish target repo change"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: target_repo_publish

    # Purpose: Prepare the client/signer trust add result shown to the operator.
    - name: "Client trust target - Capture final report data"
      ansible.builtin.set_fact:
        nativeha_report_client_trust_results: >-
          {{
            nativeha_report_client_trust_results | default([])
            + [
              {
                'qmgr_name': qmgr_name,
                'environment': env_upper,
                'namespace': namespace,
                'secret_name': _client_trust_secret_name,
                'source_name': _client_trust_source_name,
                'alias': _client_trust_alias_input,
                'normalized_alias': _client_trust_alias,
                'secret_key': _client_trust_key,
                'items': _client_trust_items,
                'regions': openshift_targets | map(attribute='region') | list,
                'backend': _client_trust_backend,
                'samplecertrepo_path': (_client_trust_samplecertrepo_path if _client_trust_backend == 'samplecertrepo' else ''),
                'target_repo_patch': qmgr_rel_path ~ '/overlays/_shared/patches/' ~ cert_client_trust_add_patch_file,
                'kustomization': qmgr_rel_path ~ '/overlays/_shared/kustomization.yaml',
                'certificate_blocks': _client_trust_cert_blocks | length,
                'gitops_validation': _client_trust_gitops_validation_summary,
                'storage_model': _client_trust_storage_model
              }
            ]
          }}

    # Purpose: Record the workflow result for final reporting.
    - name: "Client trust target - Complete"
      ansible.builtin.debug:
        msg:
          - "Queue Manager : {{ qmgr_name | upper }}"
          - "Namespace     : {{ namespace }}"
          - "Trust Source  : {{ _client_trust_source_name }}"
          - "Secret        : {{ _client_trust_secret_name }}"
          - "Alias         : {{ _client_trust_alias_input }}"
          - "Secret Key    : {{ _client_trust_key }}"
          - "Items         : {{ _client_trust_items | join(', ') }}"
          - "Validation    : {{ _client_trust_gitops_validation_summary }}"
          - "Storage Model : {{ _client_trust_storage_model }}"
          - "Backend       : {{ _client_trust_backend }}"
          - "samplecertrepo Path    : {{ _client_trust_samplecertrepo_path if _client_trust_backend == 'samplecertrepo' else 'not used' }}"
          - "Target Repo   : {{ git_repo_url }}"
          - "Target Branch : {{ target_branch }}"
          - "Publish Mode  : {{ target_repo_pr_result.mode | default(target_repo_change_mode | default('pull_request')) }}"
          - "PR URL        : {{ target_repo_pr_result.pull_request_url | default('not created') }}"

  rescue:
    # Purpose: Keep the failed task name so the final error points to the source.
    - name: "Client trust target - Capture failed task name"
      ansible.builtin.set_fact:
        _client_trust_failed_task_name: "{{ ansible_failed_task.name | default('unknown task') }}"

    # Purpose: Collect useful failure text from Ansible result fields before reporting.
    - name: "Client trust target - Build failure message candidates"
      ansible.builtin.set_fact:
        _client_trust_failure_candidates:
          - "{{ ansible_failed_result.msg | default('', true) }}"
          - "{{ ansible_failed_result.stderr | default('', true) }}"
          - "{{ ansible_failed_result.stdout | default('', true) }}"
          - "{{ ansible_failed_result.module_stderr | default('', true) }}"
          - "{{ ansible_failed_result.module_stdout | default('', true) }}"
          - "{{ ansible_failed_result.exception | default('', true) }}"

    # Purpose: Save the real failure detail before the final report is built.
    - name: "Client trust target - Capture failure detail"
      ansible.builtin.set_fact:
        _client_trust_failure_detail: >-
          {%- set messages = [] -%}
          {%- for candidate in _client_trust_failure_candidates -%}
          {%- set cleaned = (
                candidate
                | string
                | regex_replace('\n{3,}', '\n\n')
                | regex_replace('-----BEGIN [^-]+-----.*-----END [^-]+-----', '[redacted certificate material]')
                | regex_replace('(?i)(api[_-]?key|token|password|tls\\.key|tls\\.crt|ca\\.crt)[:=][^\\s,;}]+', '\\1=[redacted]')
                | regex_replace('(?i)bearer\\s+[^\\s,;}]+', 'Bearer [redacted]')
                | trim
              ) -%}
          {%- if cleaned | length > 0
                and cleaned not in ['One or more items failed', 'All items completed']
                and cleaned is not search('the output has been hidden') -%}
          {%- set _ = messages.append(cleaned) -%}
          {%- endif -%}
          {%- endfor -%}
          {%- if messages | length > 0 -%}
          {{ messages | unique | join('\n\n') }}
          {%- else -%}
          Task "{{ _client_trust_failed_task_name }}" failed while
          {{ _client_trust_current_step | default('processing client/signer trust add') }}.
          The failed module did not return a safe error message. Check
          backend trust read/update permissions for
          {{ _client_trust_storage_location | default(_client_trust_secret_name | default('the trust storage')) }},
          target GitOps repo access, and that certificate onboard has seeded
          {{ _client_trust_default_item | default('the default CA item') }}.
          {%- endif -%}

    # Purpose: Restore shared samplecertrepo trust data if publishing the GitOps patch failed.
    - name: "Client trust target - Restore previous shared samplecertrepo trust data"
      community.hashi_samplecertrepo.samplecertrepo_kv2_write:
        url: "{{ samplecertrepo_url }}"
        auth_method: "{{ samplecertrepo_cert_auth_method }}"
        token: "{{ samplecertrepo_cert_token if samplecertrepo_cert_auth_method == 'token' else omit }}"
        role_id: "{{ samplecertrepo_cert_role_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        secret_id: "{{ samplecertrepo_cert_secret_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
        validate_certs: "{{ samplecertrepo_validate_certs | default(true) }}"
        engine_mount_point: "{{ samplecertrepo_cert_mount_point }}"
        namespace: "{{ samplecertrepo_namespace if (samplecertrepo_namespace | default('') | length > 0) else omit }}"
        path: "{{ _client_trust_samplecertrepo_path }}"
        timeout: "{{ nativeha_api_timeout | default(45) | int }}"
        data: "{{ _client_trust_samplecertrepo_previous_data }}"
      register: _client_trust_samplecertrepo_restore
      failed_when: false
      no_log: true
      when:
        - _client_trust_backend | default('openshift_secret') == 'samplecertrepo'
        - _client_trust_samplecertrepo_write_attempted | default(false) | bool
        - target_repo_pr_result is not defined

    # Purpose: Restore OpenShift Secret data if publishing the GitOps patch failed.
    - name: "Client trust target - Restore previous trust Secrets"
      kubernetes.core.k8s:
        host: "{{ item.item.api_url }}"
        api_key: "{{ item.item.api_key }}"
        validate_certs: "{{ item.item.validate_certs | default(true) }}"
        ca_cert: "{{ item.item.ca_cert if (item.item.ca_cert | default('') | length > 0) else omit }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ (item.resources | first).metadata.name }}"
            namespace: "{{ (item.resources | first).metadata.namespace | default(namespace) }}"
            labels: "{{ (item.resources | first).metadata.labels | default({}) }}"
            annotations: "{{ (item.resources | first).metadata.annotations | default({}) }}"
          type: "{{ (item.resources | first).type | default(cert_client_trust_add_secret_type) }}"
          data: "{{ (item.resources | first).data | default({}) }}"
      loop: "{{ _client_trust_secret_reads.results | default([]) }}"
      loop_control:
        label: "{{ item.item.region | default('unknown') }}"
      register: _client_trust_secret_restore
      failed_when: false
      no_log: true
      when:
        - _client_trust_backend | default('openshift_secret') == 'openshift_secret'
        - _client_trust_secret_apply_attempted | default(false) | bool
        - target_repo_pr_result is not defined
        - item.resources | default([]) | length > 0

    # Purpose: Delete newly-created OpenShift Secrets if publishing the GitOps patch failed.
    - name: "Client trust target - Remove newly-created trust Secrets"
      kubernetes.core.k8s:
        host: "{{ item.item.api_url }}"
        api_key: "{{ item.item.api_key }}"
        validate_certs: "{{ item.item.validate_certs | default(true) }}"
        ca_cert: "{{ item.item.ca_cert if (item.item.ca_cert | default('') | length > 0) else omit }}"
        state: absent
        api_version: v1
        kind: Secret
        namespace: "{{ namespace }}"
        name: "{{ _client_trust_secret_name }}"
      loop: "{{ _client_trust_secret_reads.results | default([]) }}"
      loop_control:
        label: "{{ item.item.region | default('unknown') }}"
      register: _client_trust_secret_remove
      failed_when: false
      no_log: true
      when:
        - _client_trust_backend | default('openshift_secret') == 'openshift_secret'
        - _client_trust_secret_apply_attempted | default(false) | bool
        - target_repo_pr_result is not defined
        - item.resources | default([]) | length == 0

    # Purpose: Combine the failed step, task name, and message for the final report.
    - name: "Client trust target - Failure context"
      ansible.builtin.debug:
        msg: |-
          Client/signer trust add failed for {{ qmgr_name | upper }} in {{ env_upper }}.

          Failed task:
          {{ _client_trust_failed_task_name }}

          Step:
          {{ _client_trust_current_step | default('unknown') }}

          Cacluster1:
          {{ _client_trust_failure_detail }}

          {% if _client_trust_secret_apply_attempted | default(false) | bool and target_repo_pr_result is not defined %}
          OpenShift trust Secret rollback was attempted because the Git publish did not complete.
          {% endif %}
          {% if _client_trust_samplecertrepo_write_attempted | default(false) | bool and target_repo_pr_result is not defined %}
          samplecertrepo trust data rollback was attempted because the Git publish did not complete.
          {% endif %}

    # Purpose: End the AAP job as failed after reporting the original problem.
    - name: "Client trust target - Re-raise failure"
      ansible.builtin.fail:
        msg: |-
          Client/signer trust add failed for {{ qmgr_name | upper }} in {{ env_upper }}.

          Failed task: {{ _client_trust_failed_task_name }}
          Step: {{ _client_trust_current_step | default('unknown') }}

          {{ _client_trust_failure_detail }}

  always:
    # Purpose: Release the direct publish lock if this role acquired it before backend mutation.
    - name: "Client trust target - Release direct publish lock"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: direct_publish_lock_release
      when: _direct_publish_lock_acquired | default(false) | bool

    # Purpose: Remove the temporary Git checkout after the workflow finishes.
    - name: "Client trust target - Cleanup git working directory"
      ansible.builtin.file:
        path: "{{ git_work_dir }}"
        state: absent
      when:
        - git_work_dir is defined
        - git_work_dir_base is defined
        - git_work_dir != git_work_dir_base
