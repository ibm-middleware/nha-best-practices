---
# Day-2 deployment of application MQSC objects through GitOps.

# Purpose: Group the work so failures are reported and the temporary Git workspace is removed.
- name: "Application MQ objects - Execute with guaranteed workspace cleanup"
  block:
    # Purpose: Check operator inputs before starting application MQ objects deploy changes.
    - name: "Pre-flight - Validate required inputs"
      ansible.builtin.assert:
        that:
          - app_sys_id | default('', true) | trim | length > 0
          - mq_environment | default('', true) | trim | length > 0
          - qmgr_name | default('', true) | trim | length > 0
          - app_mqsc_change_reason | default('', true) | trim | length > 0
          - >-
            app_mqsc_content | default('', true) | trim | length > 0
            or app_mqsc_source_file | default('', true) | trim | length > 0
        fail_msg: >-
          Required inputs: app_sys_id, mq_environment, qmgr_name,
          app_mqsc_change_reason, and either app_mqsc_content or
          app_mqsc_source_file.

    # Purpose: Trim and standardize operator input before validation.
    - name: "Identity - Normalize input values"
      ansible.builtin.set_fact:
        app_prefix: "{{ app_sys_id | lower | trim }}"
        env_upper: "{{ mq_environment | upper | trim }}"
        qmgr_selector_raw: "{{ qmgr_name | string | lower | trim }}"
        app_mqsc_group_normalized: "{{ app_mqsc_group | default(app_mqsc_default_group, true) | lower | trim }}"
        app_mqsc_change_reason_normalized: "{{ app_mqsc_change_reason | trim }}"
        app_mqsc_activation_strategy_normalized: "{{ app_mqsc_activation_strategy | default('restart_patch', true) | lower | trim }}"
        app_mqsc_restart_region_raw: "{{ app_mqsc_restart_region | default(app_mqsc_restart_regions | default('all'), true) | lower | trim }}"
        _app_mqsc_source_file_normalized: "{{ app_mqsc_source_file | default('', true) | trim }}"

    # Purpose: Stop early if app or environment is missing or unsupported.
    - name: "Pre-flight - Validate app, environment, and group"
      ansible.builtin.assert:
        that:
          - app_prefix is match('^[a-z0-9]{3}$')
          - env_upper in env_qmgr_abbr
          - env_upper in env_repo_map
          - env_upper in env_branch_map
          - env_upper in env_region_map
          - app_mqsc_group_normalized in app_mqsc_group_dirs
          - app_mqsc_group_normalized in app_mqsc_allowed_prefixes_by_group
          - app_mqsc_activation_strategy_normalized in ['restart_patch', 'manual', 'none']
          - >-
            app_mqsc_activation_strategy_normalized != 'restart_patch'
            or (app_mqsc_apply_strategy | default('restart') | lower | trim) == 'restart'
        fail_msg: >-
          app_sys_id, mq_environment, app_mqsc_group, or activation strategy is
          invalid. Valid app MQSC groups are {{ app_mqsc_group_dirs | join(', ') }}.
          app_mqsc_activation_strategy must be restart_patch, manual, or none;
          restart_patch also requires app_mqsc_apply_strategy=restart.

    # Purpose: Stop early if the region map cannot support the requested queue manager mode.
    - name: "Pre-flight - Validate app MQSC region catalog"
      ansible.builtin.assert:
        that:
          - env_region_map[env_upper] | difference(regions.keys() | list) | length == 0
        fail_msg: >-
          Application MQSC deploy cannot continue because env_region_map[{{ env_upper }}]
          references region keys that are missing from the regions catalog:
          {{ env_region_map[env_upper] | difference(regions.keys() | list) }}.
          Fix nativeha_qmgr_control_vars.yaml before rerunning.
        quiet: true

    # Purpose: Load MQSC from a file when the survey did not provide inline content.
    - name: "MQSC - Read source file when content is not supplied"
      ansible.builtin.slurp:
        src: "{{ _app_mqsc_source_file_normalized }}"
      register: _app_mqsc_source_slurp
      when:
        - app_mqsc_content | default('', true) | trim | length == 0
        - _app_mqsc_source_file_normalized | length > 0

    # Purpose: Normalize MQSC text before command-policy validation.
    - name: "MQSC - Normalize content"
      ansible.builtin.set_fact:
        app_mqsc_effective_content: >-
          {{
            (
              app_mqsc_content
              if app_mqsc_content | default('', true) | trim | length > 0
              else (_app_mqsc_source_slurp.content | b64decode)
            )
            | string
            | regex_replace('\r\n?', '\n')
            | trim
          }}

    # Purpose: Prepare MQSC line, byte, and policy data for validation.
    - name: "MQSC - Build validation facts"
      ansible.builtin.set_fact:
        app_mqsc_effective_content: "{{ app_mqsc_effective_content ~ '\n' }}"
        _app_mqsc_content_bytes: "{{ app_mqsc_effective_content | length }}"
        _app_mqsc_lines: "{{ app_mqsc_effective_content.split('\n') }}"
        _app_mqsc_allowed_patterns: "{{ app_mqsc_allowed_prefixes_by_group[app_mqsc_group_normalized] }}"

    # Purpose: Remove blank and comment MQSC lines before policy checks.
    - name: "MQSC - Build active command line list"
      ansible.builtin.set_fact:
        _app_mqsc_active_lines: >-
          {{
            _app_mqsc_lines
            | map('trim')
            | reject('equalto', '')
            | reject('match', '^[*]')
            | reject('match', '^#')
            | list
          }}

    # Purpose: Join continued MQSC lines so each command is checked as one unit.
    - name: "MQSC - Build logical command list"
      ansible.builtin.set_fact:
        _app_mqsc_logical_commands: "{{ _app_mqsc_logical_commands_json | from_json }}"
      vars:
        _app_mqsc_logical_commands_json: >-
          {% set commands = [] -%}
          {% set ns = namespace(current='') -%}
          {% for line in _app_mqsc_active_lines -%}
          {% set line_without_plus = line | regex_replace('\\s*[+]\\s*$', '') | trim -%}
          {% if ns.current | length > 0 -%}
          {% set ns.current = ns.current ~ ' ' ~ line_without_plus -%}
          {% else -%}
          {% set ns.current = line_without_plus -%}
          {% endif -%}
          {% if not (line is search('\\s*[+]\\s*$')) -%}
          {{ commands.append(ns.current | trim) or '' }}
          {% set ns.current = '' -%}
          {% endif -%}
          {% endfor -%}
          {% if ns.current | length > 0 -%}
          {{ commands.append(ns.current | trim) or '' }}
          {% endif -%}
          {{ commands | to_json }}

    # Purpose: Stop empty or oversized MQSC before GitOps files are written.
    - name: "MQSC - Validate content size and command count"
      ansible.builtin.assert:
        that:
          - _app_mqsc_logical_commands | length > 0
          - _app_mqsc_content_bytes | int <= app_mqsc_max_bytes | int
        fail_msg: >-
          MQSC content must contain at least one command and must be no larger
          than {{ app_mqsc_max_bytes }} bytes.

    # Purpose: Identify MQSC commands outside the selected application command group.
    - name: "MQSC - Find commands outside selected group policy"
      ansible.builtin.set_fact:
        _app_mqsc_bad_prefix_lines: >-
          {% set bad = [] -%}
          {% for line in _app_mqsc_logical_commands -%}
          {% set matches = [] -%}
          {% for pattern in _app_mqsc_allowed_patterns -%}
          {% if line | regex_search(pattern) -%}
          {{ matches.append(pattern) or '' }}{%- endif -%}
          {%- endfor -%}
          {% if matches | length == 0 -%}
          {{ bad.append(line) or '' }}{%- endif -%}
          {%- endfor -%}
          {{ bad }}

    # Purpose: Identify MQSC commands blocked for application deployments.
    - name: "MQSC - Find disallowed commands"
      ansible.builtin.set_fact:
        _app_mqsc_policy_blocked_lines: >-
          {% set blocked = [] -%}
          {% for line in _app_mqsc_logical_commands -%}
          {% for pattern in app_mqsc_disallowed_regexes | default([]) -%}
          {% if line | regex_search(pattern) and line not in blocked -%}
          {{ blocked.append(line) or '' }}{%- endif -%}
          {%- endfor -%}
          {%- endfor -%}
          {{ blocked }}
        _app_mqsc_delete_lines: >-
          {{
            _app_mqsc_logical_commands
            | select('match', '(?i)^\\s*DELETE\\b')
            | list
          }}
        _app_mqsc_validation_sample: "{{ _app_mqsc_active_lines | first }}"

    # Purpose: Block unsafe MQSC changes, including deletes unless explicitly allowed.
    - name: "MQSC - Enforce production guardrails"
      ansible.builtin.assert:
        that:
          - _app_mqsc_bad_prefix_lines | length == 0
          - _app_mqsc_policy_blocked_lines | length == 0
          - app_mqsc_allow_delete | default(false) | bool or _app_mqsc_delete_lines | length == 0
        fail_msg: >-
          MQSC validation failed. Wrong group commands={{
          _app_mqsc_bad_prefix_lines }}; blocked commands={{
          _app_mqsc_policy_blocked_lines }}; DELETE commands require
          app_mqsc_allow_delete=true and currently found={{ _app_mqsc_delete_lines }}.

    # Purpose: Derive the GitOps repository path for the selected queue manager.
    - name: "Identity - Derive target repo, root path, and selector values"
      ansible.builtin.set_fact:
        env_code: "{{ env_qmgr_abbr[env_upper] | lower }}"
        git_repo_url: "{{ env_repo_map[env_upper] }}"
        target_branch: "{{ env_branch_map[env_upper] }}"
        qmgr_root_rel: >-
          {{
            ('queue_managers/' ~ qmgr_env_subdir_map[env_upper])
            if env_upper in (qmgr_env_subdir_map | default({}))
            else 'queue_managers'
          }}
        qmgr_select_all: "{{ qmgr_selector_raw == 'all' }}"
        qmgr_requested_list: >-
          {{
            []
            if qmgr_selector_raw == 'all'
            else (qmgr_selector_raw.split(',')
                  | map('trim')
                  | reject('equalto', '')
                  | unique
                  | list)
          }}
        _app_mqsc_restart_enabled: "{{ app_mqsc_activation_strategy_normalized == 'restart_patch' }}"
        _app_mqsc_restart_target_regions: >-
          {{
            env_region_map[env_upper]
            if app_mqsc_restart_region_raw in ['', 'all']
            else (app_mqsc_restart_region_raw.split(',')
                  | map('trim')
                  | reject('equalto', '')
                  | unique
                  | list)
          }}

    # Purpose: Stop early if the requested queue manager scope is empty or malformed.
    - name: "Pre-flight - Validate queue manager selector"
      ansible.builtin.assert:
        that:
          - qmgr_select_all | bool or qmgr_requested_list | length > 0
        fail_msg: >-
          qmgr_name must be all, a single queue manager name, or a
          comma-separated list of queue manager names.

    # Purpose: Confirm activation restart regions.
    - name: "Pre-flight - Validate activation restart regions"
      ansible.builtin.assert:
        that:
          - _app_mqsc_restart_target_regions | length > 0
          - _app_mqsc_restart_target_regions | difference(env_region_map[env_upper]) | length == 0
        fail_msg: >-
          app_mqsc_restart_region={{ app_mqsc_restart_region_raw }} is not
          valid for {{ env_upper }}. Use all or one of:
          {{ env_region_map[env_upper] }}.
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Stop early if any supplied queue manager name is malformed.
    - name: "Pre-flight - Validate explicit queue manager names"
      ansible.builtin.assert:
        that:
          - item is match('^' ~ app_prefix ~ env_code ~ '[0-9]{3}$')
        fail_msg: >-
          qmgr_name={{ item }} does not match app_sys_id={{ app_prefix }}
          and mq_environment={{ env_upper }}. Expected pattern:
          {{ app_prefix }}{{ env_code }}<3-digit-seq>.
      loop: "{{ qmgr_requested_list }}"
      when: not qmgr_select_all | bool

    # Purpose: Use a run-specific checkout so parallel jobs do not share files.
    - name: "Git - Isolate working directory for this run"
      ansible.builtin.set_fact:
        git_work_dir_base: "{{ git_work_dir }}"
        git_work_dir: "{{ git_work_dir }}/app_mqsc_{{ app_prefix }}_{{ env_upper | lower }}_{{ now(utc=false, fmt='%Y%m%d%H%M%S') }}_{{ 1000000 | random }}"

    # Purpose: Create the parent directory for temporary Git checkouts.
    - name: "Git - Ensure work base exists"
      ansible.builtin.file:
        path: "{{ git_work_dir_base }}"
        state: directory
        mode: "0755"
      check_mode: false

    # Purpose: Clone the target repository and set the automation Git identity.
    - name: "Git - Clone and configure target repo"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: git_clone_and_configure

    # Purpose: Serialize direct-mode GitOps changes before reading and rendering MQSC files.
    - name: "Git - Acquire direct publish lock"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: direct_publish_lock_acquire
      vars:
        direct_publish_lock_sync_after_acquire: true

    # Purpose: Confirm queue manager root exists.
    - name: "Discovery - Check queue manager root exists"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ qmgr_root_rel }}"
      register: _qmgr_root_stat

    # Purpose: Stop when queue manager root is missing.
    - name: "Discovery - Fail if queue manager root is missing"
      ansible.builtin.assert:
        that:
          - _qmgr_root_stat.stat.exists
          - _qmgr_root_stat.stat.isdir
        fail_msg: >-
          Queue manager root {{ qmgr_root_rel }} does not exist in
          {{ git_repo_url }} branch {{ target_branch }} for {{ env_upper }}.

    # Purpose: Read existing queue manager files so only real targets are changed.
    - name: "Discovery - Find all queue managers for selected app and environment"
      ansible.builtin.find:
        paths: "{{ git_work_dir }}/{{ qmgr_root_rel }}"
        file_type: directory
        recurse: false
        use_regex: true
        patterns: "^{{ app_prefix }}{{ env_code }}[0-9]{3}$"
      register: _app_mqsc_all_qmgr_dirs
      when: qmgr_select_all | bool

    # Purpose: Store the exact queue managers selected by the operator.
    - name: "Discovery - Set targets from all selector"
      ansible.builtin.set_fact:
        qmgr_target_names: >-
          {{
            _app_mqsc_all_qmgr_dirs.files
            | map(attribute='path')
            | map('basename')
            | sort
            | list
          }}
      when: qmgr_select_all | bool

    # Purpose: Store the exact queue managers selected by the operator.
    - name: "Discovery - Set targets from explicit selector"
      ansible.builtin.set_fact:
        qmgr_target_names: "{{ qmgr_requested_list }}"
      when: not qmgr_select_all | bool

    # Purpose: Stop when no queue managers were selected.
    - name: "Discovery - Fail if no queue managers were selected"
      ansible.builtin.assert:
        that:
          - qmgr_target_names | length > 0
        fail_msg: >-
          No queue managers matched app_sys_id={{ app_prefix }},
          mq_environment={{ env_upper }}, qmgr_name={{ qmgr_name }}.

    # Purpose: Confirm selected queue manager directories.
    - name: "Discovery - Check selected queue manager directories"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ qmgr_root_rel }}/{{ item }}"
      loop: "{{ qmgr_target_names }}"
      register: _qmgr_dir_stats

    # Purpose: List selected queue managers that do not exist in the GitOps repo.
    - name: "Discovery - Collect missing queue manager directories"
      ansible.builtin.set_fact:
        _missing_qmgr_dirs: "{{ _qmgr_dir_stats.results | rejectattr('stat.exists') | map(attribute='item') | list }}"

    # Purpose: Stop when selected queue managers do not exist.
    - name: "Discovery - Fail if selected queue managers do not exist"
      ansible.builtin.fail:
        msg: "Selected queue managers do not exist under {{ qmgr_root_rel }}: {{ _missing_qmgr_dirs }}."
      when: _missing_qmgr_dirs | length > 0

    # Purpose: Build the application MQSC file paths this run is allowed to edit.
    - name: "Discovery - Compute expected app MQSC paths"
      ansible.builtin.set_fact:
        _expected_app_mqsc_paths: >-
          {% set paths = [] -%}
          {% set group_file = app_mqsc_group_normalized ~ '.mqsc' -%}
          {% for qname in qmgr_target_names -%}
          {% set base = qmgr_root_rel ~ '/' ~ qname ~ '/overlays/_shared/mqsc-app/' -%}
          {{ paths.append(base ~ app_mqsc_group_normalized ~ '/' ~ group_file) or '' }}
          {%- endfor -%}
          {{ paths | sort }}
        _qmgr_target_names_upper: "{{ qmgr_target_names | map('upper') | list }}"
        _app_mqsc_configmap_suffix: "{{ app_mqsc_group_normalized | regex_replace('^[0-9]+-', '') }}"
        _expected_app_mqsc_restart_patch_paths: []
        _app_mqsc_restart_overlay_paths: []

    # Purpose: Build the exact patch file paths this run is allowed to edit.
    - name: "Activation - Compute restart patch paths"
      ansible.builtin.set_fact:
        _expected_app_mqsc_restart_patch_paths: >-
          {% set paths = [] -%}
          {% for qname in qmgr_target_names -%}
          {% for rname in _app_mqsc_restart_target_regions -%}
          {% set rel = qmgr_root_rel ~ '/' ~ qname ~ '/overlays/' ~ rname -%}
          {{ paths.append(rel ~ '/' ~ regions[rname].region_label ~ '-patch-restart.yaml') or '' }}
          {%- endfor -%}
          {%- endfor -%}
          {{ paths | sort }}
        _app_mqsc_restart_overlay_paths: >-
          {% set paths = [] -%}
          {% for qname in qmgr_target_names -%}
          {% for rname in _app_mqsc_restart_target_regions -%}
          {{ paths.append(qmgr_root_rel ~ '/' ~ qname ~ '/overlays/' ~ rname) or '' }}
          {%- endfor -%}
          {%- endfor -%}
          {{ paths | sort }}
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Block MQSC commands that are outside the approved application policy.
    - name: "Discovery - Check expected app MQSC files"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ item }}"
      loop: "{{ _expected_app_mqsc_paths }}"
      register: _app_mqsc_path_stats

    # Purpose: List application MQSC files that are missing from selected queue managers.
    - name: "Discovery - Collect missing app MQSC files"
      ansible.builtin.set_fact:
        _missing_app_mqsc_paths: "{{ _app_mqsc_path_stats.results | rejectattr('stat.exists') | map(attribute='item') | list }}"

    # Purpose: Stop when app MQSC files are missing.
    - name: "Discovery - Fail if app MQSC files are missing"
      ansible.builtin.fail:
        msg: >-
          Missing app MQSC placeholder files: {{ _missing_app_mqsc_paths }}.
          Queue manager must be onboarded with app MQSC layout before Day-2
          app object deployment.
      when: _missing_app_mqsc_paths | length > 0

    # Purpose: Confirm expected restart patch files.
    - name: "Activation - Check expected restart patch files"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ item }}"
      loop: "{{ _expected_app_mqsc_restart_patch_paths }}"
      register: _app_mqsc_restart_patch_stats
      when: _app_mqsc_restart_enabled | bool

    # Purpose: List restart patch files that are missing from selected overlays.
    - name: "Activation - Collect missing restart patch files"
      ansible.builtin.set_fact:
        _missing_app_mqsc_restart_patch_paths: "{{ _app_mqsc_restart_patch_stats.results | rejectattr('stat.exists') | map(attribute='item') | list }}"
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Stop when restart patch files are missing.
    - name: "Activation - Fail if restart patch files are missing"
      ansible.builtin.fail:
        msg: >-
          Missing restart patch files for app MQSC activation:
          {{ _missing_app_mqsc_restart_patch_paths }}. Re-onboard or migrate
          the queue manager to the restart-patch overlay layout first.
      when:
        - _app_mqsc_restart_enabled | bool
        - _missing_app_mqsc_restart_patch_paths | length > 0

    # Purpose: Write the approved application MQSC into each selected queue manager.
    - name: "MQSC - Write desired app MQSC content"
      ansible.builtin.copy:
        content: "{{ app_mqsc_effective_content }}"
        dest: "{{ git_work_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ _expected_app_mqsc_paths }}"

    # Purpose: Build the restart timestamp and reason written to the patch.
    - name: "Activation - Resolve restart annotation values"
      ansible.builtin.set_fact:
        qmgr_restart_at: "{{ app_mqsc_restart_at | default(now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ'), true) }}"
        qmgr_restart_reason: "{{ app_mqsc_restart_reason | default('application MQSC deploy: ' ~ app_mqsc_change_reason_normalized, true) | trim }}"
        qmgr_restart_requested_by: "{{ app_mqsc_requested_by | default(restart_requested_by | default('ansible-automation'), true) | trim }}"
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Check that restart patch values contain the requested timestamp and reason.
    - name: "Activation - Validate restart annotation values"
      ansible.builtin.assert:
        that:
          - qmgr_restart_at is match('^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$')
          - qmgr_restart_reason | length > 0
          - qmgr_restart_reason | length <= 160
          - qmgr_restart_reason is not search('[\r\n]')
          - qmgr_restart_requested_by | length > 0
          - qmgr_restart_requested_by | length <= 80
          - qmgr_restart_requested_by is not search('[\r\n]')
        fail_msg: |-
          Application MQSC restart activation metadata is invalid.

          app_mqsc_restart_at must use UTC format like 2026-05-12T10:30:00Z.
          app_mqsc_restart_reason and app_mqsc_requested_by must be short single-line values.
          No Git changes were made.
        quiet: true
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Write restart annotation values into regional restart patch files.
    - name: "Activation - Render restart patch files"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../nativeha_templates/overlays/restart_patch.yaml.j2"
        dest: "{{ git_work_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ _expected_app_mqsc_restart_patch_paths }}"
      when: _app_mqsc_restart_enabled | bool

    # Purpose: Build overlay paths that must render cleanly before publish.
    - name: "Validation - Compute regional overlay render paths"
      ansible.builtin.set_fact:
        _app_mqsc_target_overlay_paths: >-
          {% set paths = [] -%}
          {% for qname in qmgr_target_names -%}
          {% for rname in env_region_map[env_upper] -%}
          {{ paths.append(qmgr_root_rel ~ '/' ~ qname ~ '/overlays/' ~ rname) or '' }}
          {%- endfor -%}
          {%- endfor -%}
          {{ paths | sort }}

    # Purpose: Render and validate selected regional overlays using shared task.
    - name: "Validation - Render selected regional overlays"
      ansible.builtin.include_tasks: "{{ role_path }}/../gitops_publish/tasks/validate_kustomize_render.yaml"
      vars:
        _kustomize_overlay_paths: >-
          {{
            _app_mqsc_target_overlay_paths
            | map('regex_replace', '^(.*)$', git_work_dir ~ '/\1')
            | list
          }}

    # Purpose: Block MQSC commands that are outside the approved application policy.
    - name: "Validation - Check rendered MQSC ConfigMap values"
      ansible.builtin.assert:
        that:
          - _expected_configmap_name in item.stdout
          - _app_mqsc_validation_sample in item.stdout
        fail_msg: >-
          Render validation failed for overlay {{ item.item }}. Expected app
          MQSC ConfigMap {{ _expected_configmap_name }} and the first MQSC
          command to appear in rendered manifests.
      vars:
        _render_qmgr_name: "{{ item.item | regex_replace('^' ~ qmgr_root_rel ~ '/', '') | regex_replace('/overlays/.*$', '') }}"
        _expected_configmap_name: "{{ _render_qmgr_name }}-mqsc-{{ _app_mqsc_configmap_suffix }}"
      loop: "{{ _render_results.results }}"

    # Purpose: Confirm rendered restart activation annotations.
    - name: "Validation - Check rendered restart activation annotations"
      ansible.builtin.assert:
        that:
          - "(restart_annotation_prefix ~ '/restart-at') in item.stdout"
          - "qmgr_restart_at in item.stdout"
        fail_msg: >-
          Render validation failed for overlay {{ item.item }}. Expected
          restart annotation {{ qmgr_restart_at }} for app MQSC activation.
      loop: "{{ _render_results.results }}"
      when:
        - _app_mqsc_restart_enabled | bool
        - item.item in _app_mqsc_restart_overlay_paths

    # Purpose: Prepare expected app MQSC publish paths.
    - name: "Git - Build expected app MQSC publish paths"
      ansible.builtin.set_fact:
        _expected_app_mqsc_publish_paths: "{{ (_expected_app_mqsc_paths + _expected_app_mqsc_restart_patch_paths) | sort }}"

    # Purpose: Read Git status paths so only expected files are allowed.
    - name: "Git - Check pending app MQSC changes"
      ansible.builtin.command:  # noqa command-instead-of-module
        argv: ["git", "status", "--porcelain"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _app_mqsc_git_status
      changed_when: false
      check_mode: false

    # Purpose: Convert Git status output into paths checked against the allow-list.
    - name: "Git - Classify pending app MQSC change paths"
      ansible.builtin.set_fact:
        _app_mqsc_changed_paths: "{{ _app_mqsc_git_status.stdout_lines | map('regex_replace', '^.. +', '') | list }}"
        _app_mqsc_unexpected_paths: >-
          {{
            (_app_mqsc_git_status.stdout_lines
             | map('regex_replace', '^.. +', '')
             | list)
            | difference(_expected_app_mqsc_publish_paths)
          }}

    # Purpose: Stop when app MQSC changed unexpected files.
    - name: "Git - Fail if app MQSC changed unexpected files"
      ansible.builtin.assert:
        that:
          - _app_mqsc_unexpected_paths | length == 0
        fail_msg: >-
          App MQSC deployment changed unexpected files: {{
          _app_mqsc_unexpected_paths }}. Expected only {{
          _expected_app_mqsc_publish_paths }}.

    # Purpose: Choose publish identity from inputs and defaults.
    - name: "Git - Resolve publish identity"
      ansible.builtin.set_fact:
        _app_mqsc_publish_subject: >-
          {{
            qmgr_target_names[0]
            if qmgr_target_names | length == 1
            else app_prefix ~ '-' ~ (env_upper | lower) ~ '-app-mqsc'
          }}
        _app_mqsc_publish_title_subject: >-
          {{
            (qmgr_target_names[0] | upper)
            if qmgr_target_names | length == 1
            else (app_prefix | upper) ~ ' ' ~ env_upper ~ ' app MQSC'
          }}
        _app_mqsc_publish_repo_path: >-
          {{
            qmgr_root_rel ~ '/' ~ qmgr_target_names[0]
            if qmgr_target_names | length == 1
            else qmgr_root_rel
          }}
        _app_mqsc_publish_changelog_path: >-
          {{
            qmgr_root_rel ~ '/' ~ qmgr_target_names[0] ~ '/CHANGELOG.md'
            if qmgr_target_names | length == 1
            else qmgr_root_rel ~ '/CHANGELOG.md'
          }}

    # Purpose: Prepare the title, summary, and validation text for the GitOps change.
    - name: "Git - Prepare target repo publish metadata"
      ansible.builtin.set_fact:
        qmgr_name_normalized: "{{ _app_mqsc_publish_subject }}"
        target_repo_pr_action_slug: "app-mqsc"
        target_repo_pr_action_label: "Application MQSC Deploy"
        target_repo_pr_branch_subject: "{{ _app_mqsc_publish_subject }}"
        target_repo_pr_title_subject: "{{ _app_mqsc_publish_title_subject }}"
        target_repo_pr_qmgr_label: "{{ _qmgr_target_names_upper | join(', ') }}"
        target_repo_pr_changelog_path: "{{ _app_mqsc_publish_changelog_path }}"
        target_repo_pr_repo_path: "{{ _app_mqsc_publish_repo_path }}"
        target_repo_pr_summary: >-
          Deploy application MQSC group {{ app_mqsc_group_normalized }} to
          {{ _qmgr_target_names_upper | join(', ') }} in {{ env_upper }} for
          app {{ app_prefix | upper }}. Reason: {{
          app_mqsc_change_reason_normalized }}. Activation strategy:
          {{ app_mqsc_activation_strategy_normalized }}.
        target_repo_pr_validation: >-
          Validated {{ _app_mqsc_logical_commands | length }} MQSC command(s)
          from {{ _app_mqsc_active_lines | length }} active line(s)
          against group policy, wrote only {{
          _expected_app_mqsc_publish_paths | join(', ') }}, rendered selected
          regional overlays{% if _app_mqsc_restart_enabled | bool %}, verified
          restart annotation {{ qmgr_restart_at }} for regions {{
          _app_mqsc_restart_target_regions | join(', ') }}{% endif %}, and
          confirmed no unexpected files changed before changelog metadata.

    # Purpose: Prepare the application MQ objects deploy result shown to the operator.
    - name: "Report - Capture application MQSC result"
      ansible.builtin.set_fact:
        nativeha_report_app_mqsc_results:
          - qmgrs: "{{ _qmgr_target_names_upper }}"
            group: "{{ app_mqsc_group_normalized }}"
            file_paths: "{{ _expected_app_mqsc_paths }}"
            restart_patch_paths: "{{ _expected_app_mqsc_restart_patch_paths }}"
            command_count: "{{ _app_mqsc_logical_commands | length }}"
            active_line_count: "{{ _app_mqsc_active_lines | length }}"
            apply_strategy: "{{ app_mqsc_apply_strategy | default('restart') }}"
            activation_strategy: "{{ app_mqsc_activation_strategy_normalized }}"
            restart_at: "{{ qmgr_restart_at | default('not requested') }}"
            restart_regions: "{{ _app_mqsc_restart_target_regions if _app_mqsc_restart_enabled | bool else [] }}"
            allow_delete: "{{ app_mqsc_allow_delete | default(false) | bool }}"
            reason: "{{ app_mqsc_change_reason_normalized }}"

    # Purpose: Publish the prepared GitOps changes by pull request or direct commit.
    - name: "Git - Publish target repo changes"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: target_repo_publish

    # Purpose: Record application MQSC deploy result for final reporting.
    - name: "Application MQ objects - Complete"
      ansible.builtin.debug:
        msg:
          - "Application MQSC deployment complete"
          - "Application ID : {{ app_prefix | upper }}"
          - "Environment    : {{ env_upper }}"
          - "Queue Managers : {{ _qmgr_target_names_upper | join(', ') }}"
          - "MQSC Group     : {{ app_mqsc_group_normalized }}"
          - "Commands       : {{ _app_mqsc_logical_commands | length }}"
          - "Active Lines   : {{ _app_mqsc_active_lines | length }}"
          - "Activation     : {{ app_mqsc_activation_strategy_normalized }}"
          - "Restart At     : {{ qmgr_restart_at | default('not requested') }}"
          - "Base Branch    : {{ target_branch }}"
          - "Change Mode    : {{ target_repo_pr_result.mode | default(target_repo_change_mode | default('pull_request')) }}"
          - "Publish Branch : {{ target_repo_pr_result.branch | default('not created') }}"
          - "PR URL         : {{ target_repo_pr_result.pull_request_url | default('not created') }}"

  rescue:
    # Purpose: Save the real failure detail before the final report is built.
    - name: "Rescue - Capture application MQSC failure detail"
      ansible.builtin.set_fact:
        _app_mqsc_failure_detail: >-
          {{
            ansible_failed_result.msg
            | default(
                ansible_failed_result.stderr
                | default('Application MQSC deployment failed before a detailed cause was returned.')
              )
            | string
            | regex_replace('\n{3,}', '\n\n')
            | trim
          }}

    # Purpose: Print the captured failure detail in the job log.
    - name: "Rescue - Log application MQSC failure"
      ansible.builtin.debug:
        msg:
          - "Application MQSC deployment failed"
          - "Application ID : {{ app_sys_id | default('not supplied') | upper }}"
          - "Queue Selector : {{ qmgr_name | default('not supplied') }}"
          - "Environment    : {{ mq_environment | default('not supplied') | upper }}"
          - "MQSC Group     : {{ app_mqsc_group | default('not supplied') }}"
          - "Root Cause     : {{ _app_mqsc_failure_detail }}"

    # Purpose: End the AAP job as failed after reporting the original problem.
    - name: "Rescue - Re-raise application MQSC failure"
      ansible.builtin.fail:
        msg: |-
          Application MQSC deployment failed for
          app_sys_id={{ app_sys_id | default('undefined') }},
          mq_environment={{ mq_environment | default('undefined') }},
          qmgr_name={{ qmgr_name | default('undefined') }}.

          {{ _app_mqsc_failure_detail }}

  always:
    # Purpose: Release the direct publish lock before removing the temporary checkout.
    - name: "Cleanup - Release direct publish lock"
      ansible.builtin.include_role:
        name: gitops_publish
        tasks_from: direct_publish_lock_release
      when: _direct_publish_lock_acquired | default(false) | bool

    # Purpose: Remove the temporary Git checkout after application MQSC deploy.
    - name: "Cleanup - Remove target repo workspace"
      ansible.builtin.file:
        path: "{{ git_work_dir }}"
        state: absent
      when: git_work_dir is defined
      check_mode: false
