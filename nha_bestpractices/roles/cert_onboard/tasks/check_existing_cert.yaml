---
# Decide whether cert_type should be skipped, renewed, or requested.

# Purpose: Start clean lifecycle decision fields for {{ cert_type }}.
- name: "Check existing - Reset state for {{ cert_type }}"
  ansible.builtin.set_fact:
    _cert_in_backend: false
    _cert_days_remaining: null
    _cert_not_after: ""
    _cert_subject_cn: ""
    _cert_thumbprint: ""
    cert_action: ""
    cert_action_reason: ""
    _backend_read:
      found: false
      source: "{{ cert_delivery_backend_effective }}"
      tls_crt: ""
      tls_key: ""
      ca_crt: ""
      repairable: false
      found_any: false
      incomplete: false
      missing_regions: []
      incomplete_regions: []
      api_failure_regions: []
      inconsistent_regions: []
    _samplecertrepo_read: {}

# Purpose: Build the samplecertrepo path or OpenShift Secret name for {{ cert_type }}.
- name: "Check existing - Resolve storage path for {{ cert_type }}"
  ansible.builtin.set_fact:
    _samplecertrepo_cert_path: "{{ samplecertrepo_cert_base_path }}/{{ cert_type_samplecertrepo_subpath[cert_type] }}"
    _openshift_secret_name: "{{ qmgr_name }}-{{ cert_type_samplecertrepo_subpath[cert_type] }}"

# Purpose: Read the existing {{ cert_type }} certificate from samplecertrepo before lifecycle decisions.
- name: "Check existing - Read samplecertrepo certificate for {{ cert_type }}"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_common/tasks/samplecertrepo_read.yaml"
  when: cert_delivery_backend_effective == 'samplecertrepo'

# Purpose: Convert the samplecertrepo response into the common backend-read structure.
- name: "Check existing - Normalize samplecertrepo read for {{ cert_type }}"
  ansible.builtin.set_fact:
    _backend_read:
      found: >-
        {{
          not (_samplecertrepo_read.failed | default(false))
          and (_samplecertrepo_read.data is defined)
          and (_samplecertrepo_read.data.data is defined)
          and (_samplecertrepo_read.data.data['tls.crt'] is defined)
          and (_samplecertrepo_read.data.data['tls.key'] is defined)
          and (_samplecertrepo_read.data.data['ca.crt'] is defined)
        }}
      found_any: >-
        {{
          not (_samplecertrepo_read.failed | default(false))
          and (_samplecertrepo_read.data is defined)
          and (_samplecertrepo_read.data.data is defined)
        }}
      repairable: false
      source: "samplecertrepo"
      tls_crt: >-
        {{
          _samplecertrepo_read.data.data['tls.crt']
          if (
            not (_samplecertrepo_read.failed | default(false))
            and (_samplecertrepo_read.data is defined)
            and (_samplecertrepo_read.data.data is defined)
            and (_samplecertrepo_read.data.data['tls.crt'] is defined)
          )
          else ''
        }}
      tls_key: >-
        {{
          _samplecertrepo_read.data.data['tls.key']
          if (
            not (_samplecertrepo_read.failed | default(false))
            and (_samplecertrepo_read.data is defined)
            and (_samplecertrepo_read.data.data is defined)
            and (_samplecertrepo_read.data.data['tls.key'] is defined)
          )
          else ''
        }}
      ca_crt: >-
        {{
          _samplecertrepo_read.data.data['ca.crt']
          if (
            not (_samplecertrepo_read.failed | default(false))
            and (_samplecertrepo_read.data is defined)
            and (_samplecertrepo_read.data.data is defined)
            and (_samplecertrepo_read.data.data['ca.crt'] is defined)
          )
          else ''
        }}
      incomplete: >-
        {{
          not (_samplecertrepo_read.failed | default(false))
          and (_samplecertrepo_read.data is defined)
          and (_samplecertrepo_read.data.data is defined)
          and not (
            _samplecertrepo_read.data.data['tls.crt'] is defined
            and _samplecertrepo_read.data.data['tls.key'] is defined
            and _samplecertrepo_read.data.data['ca.crt'] is defined
          )
        }}
  when: cert_delivery_backend_effective == 'samplecertrepo'

# Purpose: Read the existing {{ cert_type }} certificate from OpenShift before lifecycle decisions.
- name: "Check existing - Read OpenShift certificate for {{ cert_type }}"
  ansible.builtin.include_tasks: "{{ role_path }}/../cert_store_ocp/tasks/read_secret.yaml"
  when: cert_delivery_backend_effective == 'openshift_secret'

# Purpose: Record whether backend storage has complete or repairable {{ cert_type }} material.
- name: "Check existing - Set backend presence for {{ cert_type }}"
  ansible.builtin.set_fact:
    _cert_in_backend: "{{ _backend_read.found | default(false) | bool }}"
    _cert_material_available: >-
      {{
        _backend_read.found | default(false) | bool
        or _backend_read.repairable | default(false) | bool
      }}

# Purpose: Use an existing app signer chain when no new app certificate is needed.
- name: "Check existing - Capture default client trust CA from existing app certificate"
  ansible.builtin.set_fact:
    _client_trust_default_ca_pem: "{{ _backend_read.ca_crt }}"
  when:
    - cert_type == 'app'
    - _cert_material_available | bool
    - _backend_read.ca_crt | default('', true) | string | trim | length > 0
  no_log: true

# Purpose: Stop when an OpenShift read failure could hide existing {{ cert_type }} certificate data.
- name: "Check existing - Fail on unsafe OpenShift read state for {{ cert_type }}"
  ansible.builtin.fail:
    msg: |-
      Existing OpenShift certificate Secret state is not safe to use for {{ qmgr_name | upper }} {{ cert_type }}.

      Secret: {{ _backend_read.secret_name | default(_openshift_secret_name) }}
      Namespace: {{ namespace }}

      Problem region(s):
      {% if _backend_read.api_failure_regions | default([]) | length > 0 %}
      - Could not read Secret in: {{ _backend_read.api_failure_regions | join(', ') }}
      {% endif %}
      {% if _backend_read.inconsistent_regions | default([]) | length > 0 %}
      - Secret material is different across: {{ _backend_read.inconsistent_regions | join(', ') }}
      {% endif %}

      Certificate processing was stopped before contacting samplecertca. Please verify the existing Secret data in OpenShift, then rerun.
  when:
    - cert_delivery_backend_effective == 'openshift_secret'
    - >-
      (_backend_read.api_failure_regions | default([]) | length > 0)
      or (_backend_read.inconsistent_regions | default([]) | length > 0)

# Purpose: Parse existing {{ cert_type }} certificate dates and identity before deciding action.
- name: "Check existing - Parse existing certificate for {{ cert_type }}"
  when: _cert_material_available | bool
  block:
    # Purpose: Write the existing PEM to a temporary file so OpenSSL can parse it.
    - name: "Check existing - Write PEM to temp file for {{ cert_type }}"
      ansible.builtin.copy:
        content: "{{ _backend_read.tls_crt }}"
        dest: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
        mode: "0600"

    # Purpose: Read subject, issuer, serial, and fingerprints from existing {{ cert_type }} certificate.
    - name: "Check existing - Extract certificate info for {{ cert_type }}"
      community.crypto.x509_certificate_info:
        path: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
      register: _cert_info

    # Purpose: Calculate how many days remain before existing {{ cert_type }} certificate expires.
    - name: "Check existing - Calculate days remaining for {{ cert_type }}"
      ansible.builtin.set_fact:
        _cert_days_remaining: >-
          {{ ((_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) - (now(utc=true))).days | int }}
        _cert_not_after: "{{ _cert_info.not_after }}"
        _cert_subject_cn: "{{ _cert_info.subject.commonName | default('unknown') }}"
        _cert_thumbprint: "{{ _cert_info.fingerprints.sha256 | default('') }}"

    # Purpose: Remove the temporary PEM file after parsing {{ cert_type }}.
    - name: "Check existing - Remove temp cert file for {{ cert_type }}"
      ansible.builtin.file:
        path: "{{ cert_tmp_dir.path }}/{{ cert_type }}_check.crt"
        state: absent

  rescue:
    # Purpose: Mark the existing certificate corrupt when OpenSSL cannot parse it.
    - name: "Check existing - PEM parse failed for {{ cert_type }}"
      ansible.builtin.set_fact:
        _cert_days_remaining: null

# Purpose: Request a new {{ cert_type }} certificate when backend data is incomplete.
- name: "Decision - REQUEST_NEW incomplete {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "request_new"
    cert_action_reason: >-
      Existing certificate storage in {{ cert_delivery_backend_effective }} is incomplete
      for {{ qmgr_name | upper }} {{ cert_type }}.
      missing_regions={{ _backend_read.missing_regions | default([]) }}
      incomplete_regions={{ _backend_read.incomplete_regions | default([]) }}.
      A fresh certificate will be requested and delivered because there is no
      complete reusable certificate material.
  when:
    - not (_cert_material_available | bool)
    - >-
      _backend_read.incomplete | default(false) | bool
      or _backend_read.incomplete_regions | default([]) | length > 0

# Purpose: Request a new certificate when no usable certificate exists.
- name: "Decision - REQUEST_NEW missing {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "request_new"
    cert_action_reason: "Certificate not found in {{ cert_delivery_backend_effective }}"
  when:
    - not (_cert_material_available | bool)
    - cert_action | length == 0

# Purpose: Request a new certificate when existing certificate data cannot be parsed.
- name: "Decision - REQUEST_NEW corrupt {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "request_new"
    cert_action_reason: "Certificate exists in {{ cert_delivery_backend_effective }} but PEM is corrupt/unreadable"
  when:
    - _cert_material_available | bool
    - _cert_days_remaining is none or _cert_days_remaining == ''

# Purpose: Renew the certificate because it is already expired.
- name: "Decision - RENEW expired {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Expired {{ (_cert_days_remaining | int | abs) }} days ago ({{ _cert_not_after }})"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int <= 0

# Purpose: Renew the certificate because it is inside the renewal window.
- name: "Decision - RENEW within threshold {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Expires in {{ _cert_days_remaining }} days (threshold={{ cert_renewal_threshold_days }}d)"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > 0
    - _cert_days_remaining | int <= cert_renewal_threshold_days | int

# Purpose: Skip renewal because the existing certificate is still healthy.
- name: "Decision - SKIP valid {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "skip"
    cert_action_reason: "Valid in {{ cert_delivery_backend_effective }} for {{ _cert_days_remaining }} days"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > cert_renewal_threshold_days | int
    - _backend_read.found | default(false) | bool
    - not (cert_force_renew | default(false) | bool)

# Purpose: Repair backend storage when registry data is valid but backend data is missing.
- name: "Decision - REPAIR_BACKEND partial valid {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "repair_backend"
    cert_action_reason: >-
      Valid certificate found in {{ cert_delivery_backend_effective }} for
      {{ _cert_days_remaining }} days, but backend delivery is incomplete in
      missing_regions={{ _backend_read.missing_regions | default([]) }}
      incomplete_regions={{ _backend_read.incomplete_regions | default([]) }}.
      Existing certificate material will be copied to the incomplete target(s);
      no new certificate request is required for this cert type.
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > cert_renewal_threshold_days | int
    - _backend_read.repairable | default(false) | bool
    - not (cert_force_renew | default(false) | bool)

# Purpose: Renew the certificate because the operator requested force renewal.
- name: "Decision - RENEW force {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_action: "renew"
    cert_action_reason: "Force-renew requested"
  when:
    - _cert_days_remaining is not none
    - _cert_days_remaining != ''
    - _cert_days_remaining | int > cert_renewal_threshold_days | int
    - cert_force_renew | default(false) | bool

# Purpose: Keep existing certificate material available for backend repair.
- name: "Decision - Store backend repair material for {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_repair_material: >-
      {{
        cert_repair_material | default({}) | combine({
          cert_type: {
            'tls.crt': _backend_read.tls_crt,
            'tls.key': _backend_read.tls_key,
            'ca.crt': _backend_read.ca_crt
          }
        })
      }}
  when: cert_action == 'repair_backend'
  no_log: true

# Purpose: Cross-check samplecertca before skipping {{ cert_type }} renewal.
- name: "Decision - Optional certificate provider cross-check {{ cert_type }}"
  when:
    - cert_action == 'skip'
    - cert_samplecertca_cross_check_on_skip | default(false) | bool
  block:
    # Purpose: Read certificate details needed for lifecycle decisions and reporting.
    - name: "Decision - Query certificate provider for {{ cert_type }}"
      ansible.builtin.uri:
        url: >-
          {{ samplecertca_url }}{{ samplecertca_cert_search }}?ObjectDN={{
            (samplecertca_policy_dn ~ '\\' ~ qmgr_name ~ '_' ~ cert_type_csr_suffix[cert_type])
            | urlencode }}
        method: GET
        headers:
          accept: "application/json"
          Authorization: "Bearer {{ samplecertca_token }}"
        validate_certs: "{{ samplecertca_validate_certs }}"
        status_code: [200, 400, 404]
      register: _samplecertca_check
      failed_when: false
      no_log: true

    # Purpose: Request a new certificate when samplecertca no longer has the expected record.
    - name: "Decision - REQUEST_NEW provider record missing {{ cert_type }}"
      ansible.builtin.set_fact:
        cert_action: "request_new"
        cert_action_reason: "Valid in backend but missing/revoked in certificate provider inventory"
      when: >-
        _samplecertca_check is failed or
        _samplecertca_check.status | default(0) != 200 or
        _samplecertca_check.json.Certificates | default([]) | length == 0

# Purpose: Keep existing {{ cert_type }} metadata when the certificate is reused.
- name: "Check existing - Preserve registry metadata for reused {{ cert_type }}"
  ansible.builtin.set_fact:
    registry_cert_data: >-
      {{ registry_cert_data | default({}) | combine({
           cert_type: {
             'status': 'active',
             'common_name': _cert_subject_cn,
             'subject_alt_name': _cert_info.subject_alt_name | default([]),
             'subject': _cert_info.subject | default({}),
             'issuer': _cert_info.issuer.commonName | default(_cert_info.issuer | default({}) | string),
             'serial_number': (_cert_info.serial_number | community.crypto.to_serial) if (_cert_info.serial_number is defined) else '',
             'thumbprint': _cert_thumbprint,
             'not_before': _cert_info.not_before | default(''),
             'not_after': _cert_not_after,
             'days_remaining': _cert_days_remaining | int,
             'samplecertca_dn': samplecertca_policy_dn ~ '\\' ~ qmgr_name ~ '_' ~ cert_type_csr_suffix[cert_type],
             'samplecertca_guid': (registry_cert_data[cert_type] | default({})).samplecertca_guid | default(''),
             'samplecertrepo_path': samplecertrepo_cert_base_path ~ '/' ~ cert_type_samplecertrepo_subpath[cert_type],
             'openshift_secret': _openshift_secret_name,
             'delivery_backend': cert_delivery_backend_effective,
             'last_action': cert_action,
             'last_action_date': now(utc=true) | string
           }
         }, recursive=true)
      }}
  when:
    - cert_action in ['skip', 'repair_backend']
    - _cert_material_available | bool

# Purpose: Show the lifecycle action chosen for this certificate type.
- name: "Decision result for {{ cert_type }}"
  ansible.builtin.debug:
    msg: "[{{ cert_type }}] {{ cert_action | upper }} - {{ cert_action_reason }}"

# Purpose: Save the lifecycle decision for final reporting.
- name: "Record decision for {{ cert_type }}"
  ansible.builtin.set_fact:
    cert_actions: >-
      {{ cert_actions | combine({
           cert_type: {
             'action': cert_action,
             'reason': cert_action_reason,
             'existing_samplecertca_dn': (_existing_registry_cert_data[cert_type] | default({})).samplecertca_dn | default(''),
             'existing_samplecertca_guid': (_existing_registry_cert_data[cert_type] | default({})).samplecertca_guid | default('')
           }
         })
      }}
