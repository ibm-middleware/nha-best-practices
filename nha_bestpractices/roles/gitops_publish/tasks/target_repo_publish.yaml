---
# target_repo_publish.yaml
# Routes target repository publication through the configured mode:
# Input variables set by the caller before include_tasks:
# Input variable from nativeha_qmgr_control_vars.yaml:
# Runtime facts created here:
# Output fact created by the selected backend:

# Purpose: Turn the requested queue manager scope into an exact target list.
- name: "Publish - Resolve target repo change mode"
  ansible.builtin.set_fact:
    # First normalize casing/spaces/hyphens so operators can use friendly values.
    target_repo_change_mode_effective: >-
      {{
        target_repo_change_mode
        | default('pull_request', true)
        | lower
        | trim
        | regex_replace('-', '_')
      }}

# Purpose: Standardize target repo change mode.
- name: "Publish - Normalize target repo change mode"
  ansible.builtin.set_fact:
    # Accept common aliases, but keep only two internal modes after this task.
    target_repo_change_mode_effective: >-
      {{
        'pull_request'
        if target_repo_change_mode_effective in ['pr', 'pullrequest', 'pull_request']
        else 'direct'
        if target_repo_change_mode_effective in ['direct', 'direct_commit']
        else target_repo_change_mode_effective
      }}

# Purpose: Confirm target repo change mode.
- name: "Publish - Validate target repo change mode"
  ansible.builtin.assert:
    that:
      - target_repo_change_mode_effective in ['direct', 'pull_request']
    fail_msg: >-
      target_repo_change_mode must be direct or pull_request.
      Got: {{ target_repo_change_mode | default('undefined') }}.

# Purpose: Publish changes directly to the target branch when PR mode is disabled.
- name: "Publish - Direct commit to target branch"
  # Lab/demo path: commit generated files straight into target_branch.
  when: target_repo_change_mode_effective == 'direct'
  block:
    - name: "Publish - Capture existing direct publish lock state"
      ansible.builtin.set_fact:
        _target_repo_publish_lock_preexisting: "{{ _direct_publish_lock_acquired | default(false) | bool }}"

    - name: "Publish - Acquire direct publish lock"
      ansible.builtin.include_tasks: direct_publish_lock_acquire.yaml

    - name: "Publish - Commit direct target repo changes"
      ansible.builtin.include_tasks: target_repo_direct_commit.yaml

  always:
    - name: "Publish - Release direct publish lock"
      ansible.builtin.include_tasks: direct_publish_lock_release.yaml
      when:
        - _direct_publish_lock_acquired | default(false) | bool
        - not (_target_repo_publish_lock_preexisting | default(false) | bool)

# Purpose: Publish the prepared GitOps changes by pull request or direct commit.
- name: "Publish - Pull request workflow"
  # Governed path: push/update a feature branch and create/update a PR.
  ansible.builtin.include_tasks: target_repo_pr.yaml
  when: target_repo_change_mode_effective == 'pull_request'
