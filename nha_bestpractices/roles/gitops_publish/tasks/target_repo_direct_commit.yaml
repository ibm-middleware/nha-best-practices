---
# target_repo_direct_commit.yaml
# Commits generated target repository changes directly to target_branch.
# This mode is intended for lab/demo use. Production governance should use
# target_repo_change_mode: pull_request.
# Input variables from caller:
# Optional input variables:
# Output fact:

# Purpose: Check operator inputs before starting GitOps publish changes.
- name: "Direct publish - Validate inputs"
  ansible.builtin.assert:
    that:
      - git_work_dir is defined and git_work_dir | length > 0
      - git_repo_url is defined and git_repo_url | length > 0
      - target_branch is defined and target_branch | length > 0
      - env_upper is defined and env_upper | length > 0
      - target_repo_pr_action_label is defined
      - target_repo_pr_repo_path is defined
      - target_repo_pr_summary is defined
      - target_repo_pr_validation is defined
    fail_msg: "Missing required target repo publish input facts."

# Purpose: Choose the source and target branches for the publish operation.
- name: "Direct publish - Resolve branch identity"
  ansible.builtin.set_fact:
    # Use an explicit branch subject for bulk Day-2 actions when supplied.
    # Otherwise use qmgr_name_normalized when a Day-2 role provides it, or qmgr_name.
    _direct_qmgr: "{{ (target_repo_pr_branch_subject | default(qmgr_name_normalized | default(qmgr_name), true)) | lower }}"

# Purpose: Choose queue manager details shown in changelog and PR text.
- name: "Direct publish - Resolve display identity"
  ansible.builtin.set_fact:
    _direct_qmgr_label: >-
      {{
        target_repo_pr_qmgr_label
        | default((_direct_qmgr | upper), true)
      }}
    _direct_title_subject: >-
      {{
        target_repo_pr_title_subject
        | default(target_repo_pr_qmgr_label | default((_direct_qmgr | upper), true), true)
      }}
    # Changelog is per queue manager unless caller overrides target_repo_pr_changelog_path.
    _direct_changelog_rel: >-
      {{
        target_repo_pr_changelog_path | default(
          (target_repo_pr_repo_path | regex_replace('/+$', '')) ~ '/CHANGELOG.md',
          true
        )
      }}

# Purpose: Read Git status paths so only expected files are allowed.
- name: "Direct publish - Check pending changes"  # noqa command-instead-of-module
  ansible.builtin.command:
    cmd: git status --porcelain
  args:
    chdir: "{{ git_work_dir }}"
  register: _direct_status_initial
  changed_when: false
  check_mode: false

# Purpose: End publish cleanly when Git has no changes.
- name: "Direct publish - No changes detected"
  ansible.builtin.set_fact:
    target_repo_pr_result:
      changed: false
      action: "none"
      mode: "direct"
      branch: "{{ target_branch }}"
      base_branch: "{{ target_branch }}"
      pull_request_url: "not created (direct mode)"
      reason: "No target repo changes detected."
  when: _direct_status_initial.stdout | length == 0

# Purpose: Commit and push the prepared GitOps change.
- name: "Direct publish - Commit and push changes"
  when: _direct_status_initial.stdout | length > 0
  block:
    # Purpose: Check whether the generated queue manager path already exists.
    - name: "Direct publish - Ensure queue manager changelog directory exists"
      ansible.builtin.file:
        path: "{{ git_work_dir }}/{{ _direct_changelog_rel | dirname }}"
        state: directory
        mode: "0755"

    # Purpose: Read existing queue manager files so only real targets are changed.
    - name: "Direct publish - Read queue manager CHANGELOG.md"
      ansible.builtin.slurp:
        src: "{{ git_work_dir }}/{{ _direct_changelog_rel }}"
      register: _direct_cl_raw
      failed_when: false
      changed_when: false

    # Purpose: Prepare changelog text before adding the new entry.
    - name: "Direct publish - Prepare changelog text"
      ansible.builtin.set_fact:
        _direct_cl_text: "{{ _direct_cl_raw.content | default('') | b64decode }}"

    # Purpose: Read the current changelog version from existing text.
    - name: "Direct publish - Parse current queue manager changelog version"
      ansible.builtin.set_fact:
        _direct_cl_heading: >-
          {{
            (_direct_cl_text.splitlines() | select('match', '^## ') | first)
            | default('')
          }}

    # Purpose: Convert the changelog version to a number before incrementing it.
    - name: "Direct publish - Normalize current queue manager changelog version"
      ansible.builtin.set_fact:
        _direct_cl_latest_version: >-
          {{
            (_direct_cl_heading | regex_search('[0-9]+[.][0-9]+[.][0-9]+') | default('', true))
            if _direct_cl_heading | length > 0 else ''
          }}

    # Purpose: Increment the queue manager changelog version for this publish.
    - name: "Direct publish - Compute queue manager changelog version"
      ansible.builtin.set_fact:
        # Each queue-manager changelog has its own simple 1.0.N sequence.
        _direct_ver: >-
          {{
            '1.0.1'
            if _direct_cl_version_parts | length != 3
            else _direct_cl_version_parts[0] ~ '.' ~ _direct_cl_version_parts[1]
                 ~ '.' ~ ((_direct_cl_version_parts[2] | int) + 1)
          }}
      vars:
        _direct_cl_version_parts: "{{ _direct_cl_latest_version.split('.') }}"

    # Purpose: Clean optional metadata before writing changelog or PR text.
    - name: "Direct publish - Normalize optional manager metadata"
      ansible.builtin.set_fact:
        # vars.get avoids undefined-variable failures for Day-2 flows that do
        # not know namespace/sizing information.
        _direct_namespace: "{{ vars.get('namespace', '') }}"
        _direct_instance_type: "{{ vars.get('instance_type', '') }}"
        _direct_size_tier: "{{ vars.get('selected_size_tier', '') }}"
        _direct_qmgr_size: >-
          {{
            vars.get('qmgr_size', {})
            if vars.get('qmgr_size', {}) is mapping
            else {}
          }}

    # Purpose: Write the queue manager changelog entry for this publish.
    - name: "Direct publish - Write queue manager CHANGELOG.md"
      ansible.builtin.copy:
        dest: "{{ git_work_dir }}/{{ _direct_changelog_rel }}"
        mode: "0644"
        content: |
          {% set entry %}
          ## [{{ _direct_ver }}] - {{ now(utc=false, fmt='%Y-%m-%d') }}

          - Action: {{ target_repo_pr_action_label }}
          - Environment: {{ env_upper }}
          - Queue manager: {{ _direct_qmgr_label }}
          {% if _direct_namespace | string | length > 0 %}
          - Namespace: {{ _direct_namespace }}
          {% endif %}
          {% if _direct_instance_type | string | length > 0 %}
          - Instance type: {{ _direct_instance_type }}
          {% endif %}
          {% if _direct_size_tier | string | length > 0 %}
          - Size tier: {{ _direct_size_tier }}
          {% endif %}
          {% if _direct_qmgr_size | length > 0 %}
          - Runtime requests: {{ _direct_qmgr_size.request_cpu | default('n/a') }}/{{ _direct_qmgr_size.request_memory | default('n/a') }}
          - Runtime limits: {{ _direct_qmgr_size.limits_cpu | default('n/a') }}/{{ _direct_qmgr_size.limits_memory | default('n/a') }}
          - Storage: queue manager {{ _direct_qmgr_size.qmgr_storage | default('n/a') }}, logs {{ _direct_qmgr_size.log_storage | default('n/a') }}
          {% endif %}
          {% if _upgrade_version is defined %}
          - Requested MQ version: {{ _upgrade_version }}
          {% endif %}
          {% if _upgrade_image is defined %}
          - Requested image: {{ _upgrade_image }}
          {% endif %}
          {% if _upgrade_license_id is defined %}
          - License ID: {{ _upgrade_license_id }}
          {% endif %}
          {% if total_volume_24h is defined and avg_msg_size is defined %}
          - Sizing input: {{ total_volume_24h }} messages/day at {{ avg_msg_size }} average message size
          {% endif %}
          {% if _target_regions is defined %}
          - Regions: {{ _target_regions | join(', ') }}
          {% endif %}
          - Target path: {{ target_repo_pr_repo_path }}
          - Branch: {{ target_branch }}
          - Publish mode: Direct commit to target branch
          - Summary: {{ target_repo_pr_summary }}
          - Validation: {{ target_repo_pr_validation }}

          {% endset %}
          {% if _direct_cl_text | trim | length == 0 %}
          # Changelog

          All notable MQ NativeHA target repository changes are recorded here.

          {{ entry }}
          {% elif _direct_cl_text is match('^# Changelog') %}
          # Changelog

          {{ entry }}
          {{ _direct_cl_text | regex_replace('^# Changelog', '') | trim }}
          {% else %}
          # Changelog

          {{ entry }}
          {{ _direct_cl_text }}
          {% endif %}

    # Purpose: Prepare the commit or pull request title.
    - name: "Direct publish - Prepare commit title"
      ansible.builtin.set_fact:
        _direct_title: "[{{ env_upper }}] {{ target_repo_pr_action_label }} {{ _direct_title_subject }}"

    # Purpose: Stage the generated Git changes for commit.
    - name: "Direct publish - Stage all changes"
      ansible.builtin.command:
        argv: ["git", "add", "-A"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: false
      check_mode: false

    # Purpose: Commit and push the prepared GitOps change.
    - name: "Direct publish - Commit"
      ansible.builtin.command:
        argv: ["git", "commit", "-m", "{{ _direct_title }}"]
      args:
        chdir: "{{ git_work_dir }}"
      changed_when: true
      check_mode: false

    # Purpose: Bring the automation branch up to date before the first push.
    - name: "Direct publish - Rebase target branch before first push"
      ansible.builtin.command:
        argv: ["git", "pull", "--rebase", "origin", "{{ target_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _direct_rebase_initial
      changed_when: false
      failed_when: false
      check_mode: false

    # Purpose: Stop early when the local checkout cannot be rebased cleanly.
    - name: "Direct publish - Fail on initial rebase issue"
      ansible.builtin.fail:
        msg: >-
          Could not sync the local checkout with {{ target_branch }} before
          direct publish. Resolve the branch state in the target repo and rerun
          the job. Git output:
          {{ (_direct_rebase_initial.stderr | default('') ~ ' ' ~ _direct_rebase_initial.stdout | default('')) | trim }}
      when: _direct_rebase_initial.rc != 0

    # Purpose: Push the prepared GitOps change to the target branch.
    - name: "Direct publish - Push target branch"
      ansible.builtin.command:
        argv: ["git", "push", "origin", "HEAD:refs/heads/{{ target_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _direct_push_initial
      changed_when: true
      failed_when: false
      check_mode: false

    # Purpose: Decide whether the rejection looks like a stale-branch race we can retry once.
    - name: "Direct publish - Detect stale branch race"
      ansible.builtin.set_fact:
        _direct_push_retry_needed: >-
          {{
            (_direct_push_initial.rc != 0)
            and (
              (_direct_push_initial.stderr | default('') ~ ' ' ~ _direct_push_initial.stdout | default(''))
              is search('(?i)(incorrect old value provided|non-fast-forward|fetch first|failed to push some refs|\\[remote rejected\\])')
            )
          }}

    # Purpose: Sync again after a stale-branch rejection before one final push attempt.
    - name: "Direct publish - Rebase target branch after push rejection"
      ansible.builtin.command:
        argv: ["git", "pull", "--rebase", "origin", "{{ target_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _direct_rebase_retry
      changed_when: false
      failed_when: false
      check_mode: false
      when: _direct_push_retry_needed | bool

    # Purpose: Retry the push once after rebasing onto the latest branch head.
    - name: "Direct publish - Retry push target branch"
      ansible.builtin.command:
        argv: ["git", "push", "origin", "HEAD:refs/heads/{{ target_branch }}"]
      args:
        chdir: "{{ git_work_dir }}"
      register: _direct_push_retry
      changed_when: true
      failed_when: false
      check_mode: false
      when:
        - _direct_push_retry_needed | bool
        - _direct_rebase_retry.rc == 0

    # Purpose: Stop with a clear message when direct publish still cannot land safely.
    - name: "Direct publish - Fail on push rejection"
      ansible.builtin.fail:
        msg: >-
          {% set initial_output = (_direct_push_initial.stderr | default('') ~ ' ' ~ _direct_push_initial.stdout | default('')) | trim -%}
          {% set retry_rebase_output = (_direct_rebase_retry.stderr | default('') ~ ' ' ~ _direct_rebase_retry.stdout | default('')) | trim if _direct_rebase_retry is defined else '' -%}
          {% set retry_push_output = (_direct_push_retry.stderr | default('') ~ ' ' ~ _direct_push_retry.stdout | default('')) | trim if _direct_push_retry is defined else '' -%}
          {% if _direct_push_retry_needed | default(false) | bool -%}
          Could not push directly to {{ target_branch }} after resyncing the branch once.
          Another job likely updated the same branch or files at the same time.
          For shared branches such as {{ target_branch }}, prefer
          target_repo_change_mode=pull_request or serialize AAP jobs per target
          repo. Rerun the job after syncing the AAP project and target repo.
          {%- else -%}
          Could not push directly to {{ target_branch }}.
          {%- endif %}
          Git output:
          {{ [initial_output, retry_rebase_output, retry_push_output] | reject('equalto', '') | join(' ') }}
      when: >-
        _direct_push_initial.rc != 0
        and not (
          (_direct_push_retry_needed | default(false) | bool)
          and (_direct_push_retry is defined)
          and (_direct_push_retry.rc == 0)
        )

    # Purpose: Return the operation result to the calling role.
    - name: "Direct publish - Store result"
      ansible.builtin.set_fact:
        target_repo_pr_result:
          changed: true
          action: "committed"
          mode: "direct"
          version: "{{ _direct_ver }}"
          branch: "{{ target_branch }}"
          base_branch: "{{ target_branch }}"
          pull_request_url: "not created (direct mode)"

# Purpose: Return a no-change publish result to the caller.
- name: "Direct publish - No changes"
  ansible.builtin.debug:
    msg: "{{ target_repo_pr_result.reason }}"
  when: not target_repo_pr_result.changed | bool

# Purpose: Return the publish result to the caller.
- name: "Direct publish - Done"  # noqa no-handler
  ansible.builtin.debug:
    msg:
      - "Direct publish {{ target_repo_pr_result.action }}"
      - "Branch : {{ target_repo_pr_result.branch }}"
      - "Mode   : direct"
  when: target_repo_pr_result.changed | bool
