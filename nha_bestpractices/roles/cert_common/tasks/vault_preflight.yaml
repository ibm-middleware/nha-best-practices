---
# Verify samplecertrepo KV access before requesting or revoking certificate material.
# This task is intentionally non-mutating: it uses samplecertrepo self-capabilities only.

# Purpose: Start clean samplecertrepo permission-check results.
- name: "samplecertrepo - Initialize preflight facts"
  ansible.builtin.set_fact:
    _samplecertrepo_preflight_paths: []
    _samplecertrepo_preflight_failures: []
    _samplecertrepo_preflight_required_capabilities_effective: >-
      {{ samplecertrepo_preflight_required_capabilities | default(['create', 'update', 'read'], true) }}

# Purpose: Build the normalized target list used by certificate roles.
- name: "samplecertrepo - Build target capability paths"
  ansible.builtin.set_fact:
    _samplecertrepo_preflight_paths: >-
      {{
        _samplecertrepo_preflight_paths + [
          {
            'cert_type': item,
            'kv_path': samplecertrepo_cert_base_path ~ '/' ~ cert_type_samplecertrepo_subpath[item],
            'data_path': samplecertrepo_cert_mount_point ~ '/data/' ~ samplecertrepo_cert_base_path ~ '/' ~ cert_type_samplecertrepo_subpath[item]
          }
        ]
      }}
  loop: "{{ active_cert_types }}"
  loop_control:
    label: "{{ item }}"

# Purpose: Add any non-leaf certificate samplecertrepo paths needed by this workflow.
- name: "samplecertrepo - Add extra capability paths"
  ansible.builtin.set_fact:
    _samplecertrepo_preflight_paths: >-
      {{
        _samplecertrepo_preflight_paths + [
          {
            'cert_type': item.cert_type | default('extra'),
            'kv_path': item.kv_path,
            'data_path': samplecertrepo_cert_mount_point ~ '/data/' ~ item.kv_path
          }
        ]
      }}
  loop: "{{ samplecertrepo_preflight_extra_paths | default([]) }}"
  loop_control:
    label: "{{ item.cert_type | default(item.kv_path | default('extra')) }}"

# Purpose: Confirm samplecertrepo permissions before reading or writing certificate paths.
- name: "samplecertrepo - Check target KV capabilities"
  community.hashi_samplecertrepo.samplecertrepo_write:
    url: "{{ samplecertrepo_url }}"
    auth_method: "{{ samplecertrepo_cert_auth_method }}"
    token: "{{ samplecertrepo_cert_token if samplecertrepo_cert_auth_method == 'token' else omit }}"
    role_id: "{{ samplecertrepo_cert_role_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
    secret_id: "{{ samplecertrepo_cert_secret_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
    validate_certs: "{{ samplecertrepo_validate_certs | default(true) }}"
    namespace: "{{ samplecertrepo_namespace if (samplecertrepo_namespace | default('') | length > 0) else omit }}"
    path: sys/capabilities-self
    data:
      path: "{{ item.data_path }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
  loop: "{{ _samplecertrepo_preflight_paths }}"
  loop_control:
    label: "{{ item.cert_type }}"
  register: _samplecertrepo_preflight_capabilities
  changed_when: false
  failed_when: false
  no_log: true

# Purpose: Convert failed module results into safe, readable failure messages.
- name: "samplecertrepo - Collect capability failures"
  ansible.builtin.set_fact:
    _samplecertrepo_preflight_failures: >-
      {{
        _samplecertrepo_preflight_failures + [
          {
            'cert_type': item.item.cert_type,
            'kv_path': item.item.kv_path,
            'data_path': item.item.data_path,
            'capabilities': _samplecertrepo_capabilities,
            'missing_capabilities': _samplecertrepo_missing_capabilities,
            'detail': _samplecertrepo_failure_detail
          }
        ]
      }}
  loop: "{{ _samplecertrepo_preflight_capabilities.results | default([]) }}"
  loop_control:
    label: "{{ item.item.cert_type | default('unknown') }}"
  vars:
    _samplecertrepo_capabilities: "{{ item.data.capabilities | default([]) }}"
    _samplecertrepo_missing_capabilities: "{{ _samplecertrepo_preflight_required_capabilities_effective | difference(_samplecertrepo_capabilities) }}"
    _samplecertrepo_raw_failure_detail: >-
      {{
        item.msg
        | default(item.errors | default(item.data.errors | default(['samplecertrepo capability check did not return the required permissions.'], true), true), true)
        | string
      }}
    _samplecertrepo_failure_detail: >-
      {{
        (
          'samplecertrepo rejected the token or the permission check could not complete. '
          ~ 'Verify the samplecertrepo URL, token/AppRole, TLS settings, and '
          ~ 'sys/capabilities-self access.'
          if _samplecertrepo_raw_failure_detail is search('^MODULE FAILURE')
          else _samplecertrepo_raw_failure_detail
        )
        | regex_replace('\n+', ' ')
        | regex_replace('\s+', ' ')
        | regex_replace('(?i)(token|password|secret_id|secret-id)[:=][^\s,;}]+', '\1=[redacted]')
        | trim
      }}
  when:
    - item.failed | default(false) | bool or _samplecertrepo_missing_capabilities | length > 0
  no_log: true

# Purpose: Stop when target kv access is not ready.
- name: "samplecertrepo - Fail when target KV access is not ready"
  ansible.builtin.fail:
    msg: |-
      samplecertrepo is not ready for certificate management for {{ qmgr_name | upper }} in {{ env_upper }}.

      samplecertrepo URL: {{ samplecertrepo_url }}
      KV mount: {{ samplecertrepo_cert_mount_point }}
      Base path: {{ samplecertrepo_cert_base_path }}

      Problem path(s):
      {% for failure in _samplecertrepo_preflight_failures %}
      - {{ failure.cert_type }}: {{ failure.kv_path }}
        Required capabilities: {{ _samplecertrepo_preflight_required_capabilities_effective | join(', ') }}
        Current capabilities: {{ failure.capabilities | join(', ') | default('none', true) }}
        Missing capabilities: {{ failure.missing_capabilities | join(', ') | default('unknown', true) }}
        Detail: {{ failure.detail }}
      {% endfor %}

      Certificate processing was stopped before contacting samplecertca. No samplecertca action was taken, no samplecertrepo secret was changed, and no registry update was made.
      Please ask the samplecertrepo administrator to grant the listed capabilities on the KV v2 data path(s), then rerun the job.
  when: _samplecertrepo_preflight_failures | length > 0

# Purpose: Record that samplecertrepo permissions are ready for the requested operation.
- name: "samplecertrepo - Preflight passed"
  ansible.builtin.debug:
    msg: >-
      samplecertrepo preflight passed for {{ qmgr_name | upper }} in {{ env_upper }}.
      Verified {{ _samplecertrepo_preflight_required_capabilities_effective | join(', ') }}
      on {{ _samplecertrepo_preflight_paths | length }} samplecertrepo path(s).
