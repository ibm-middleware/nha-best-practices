---
#  update_registry.yaml - Git-backed Certificate Registry Update
#  PURPOSE:
#  CALLED BY:
#  REQUIRED VARIABLES:
#  INPUTS FROM certs_control_vars.yaml:
#  LOCAL FACTS:

# Purpose: Ensure the required output directory exists before writing files.
- name: "Registry - Create temporary working directory"
  ansible.builtin.tempfile:
    state: directory
    path: "{{ cert_git_work_dir | dirname }}"
    prefix: "{{ cert_git_work_dir | basename }}-"
  register: _cert_git_work_dir_temp

# Purpose: Store the temporary checkout path.
- name: "Registry - Set working directory fact"
  ansible.builtin.set_fact:
    _cert_git_work_dir: "{{ _cert_git_work_dir_temp.path }}"

# Purpose: Clone the certificate registry branch so inventory can be read or updated.
- name: "Registry - Clone repo ({{ cert_registry_git_branch }} branch)"  # noqa name[template]
  ansible.builtin.git:
    repo: "{{ cert_git_base_url }}"
    dest: "{{ _cert_git_work_dir }}"
    version: "{{ cert_registry_git_branch }}"
    force: true
    accept_hostkey: "{{ git_accept_hostkey | default(true) | bool }}"
    ssh_opts: "{{ git_ssh_options | default(omit) }}"

# Purpose: Read Git state so the workflow can enforce allowed-file rules.
- name: "Registry - List tracked files"
  ansible.builtin.command:
    argv: ["git", "ls-files"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  register: _registry_tracked_files
  changed_when: false

# Purpose: Stop if the registry branch contains files outside certificate inventory.
- name: "Registry - Validate state-only branch"
  ansible.builtin.assert:
    that:
      - (_registry_tracked_files.stdout_lines | difference([cert_registry_path])) | length == 0
    fail_msg: |-
      Certificate registry branch {{ cert_registry_git_branch }} must contain only:
      {{ cert_registry_path }}

      Unexpected tracked file(s):
      {{ _registry_tracked_files.stdout_lines | difference([cert_registry_path]) }}

      Registry state is controlled by CERT_REGISTRY_GIT_BRANCH, defaulting to
      state/cert-registry. CERT_GIT_BRANCH is ignored because it is commonly
      used for the AAP/project source branch.

      Refusing to update the registry because this branch is not a dedicated
      state-only branch. Use scripts/bootstrap_cert_registry_branch.sh to create
      or repair the orphan registry branch.
    quiet: true

# Purpose: Set the Git author used for automation commits.
- name: "Registry - Configure git user name"
  community.general.git_config:
    name: "user.name"
    value: "{{ cert_git_user_name }}"
    scope: local
    repo: "{{ _cert_git_work_dir }}"

# Purpose: Set the Git author email used for automation commits.
- name: "Registry - Configure git user email"
  community.general.git_config:
    name: "user.email"
    value: "{{ cert_git_user_email }}"
    scope: local
    repo: "{{ _cert_git_work_dir }}"

# Purpose: Set the SSH command for Git push/pull operations.
- name: "Registry - Configure git SSH command"
  community.general.git_config:
    name: "core.sshCommand"
    value: "{{ git_ssh_command | default('ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null') }}"
    scope: local
    repo: "{{ _cert_git_work_dir }}"

# Purpose: Check whether certificate inventory already exists on the registry branch.
- name: "Registry - Check if inventory file exists"
  ansible.builtin.stat:
    path: "{{ _cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_file

# Purpose: Read certificate inventory before deciding what must change.
- name: "Registry - Read existing inventory"
  ansible.builtin.slurp:
    src: "{{ _cert_git_work_dir }}/{{ cert_registry_path }}"
  register: _registry_raw
  when: _registry_file.stat.exists

# Purpose: Load existing inventory YAML before merging certificate metadata.
- name: "Registry - Parse existing inventory"
  ansible.builtin.set_fact:
    # cert_inventory.yaml stores entries under a top-level certificates key.
    _existing_registry: >-
      {{ (_registry_raw.content | b64decode | from_yaml).certificates | default({}) }}
  when: _registry_file.stat.exists

# Purpose: Start an empty registry structure when no inventory exists yet.
- name: "Registry - Initialize empty registry"
  ansible.builtin.set_fact:
    _existing_registry: {}
  when: not _registry_file.stat.exists

# Purpose: Reject accidental certificate material before committing registry metadata.
- name: "Registry - Assert metadata-only update"
  ansible.builtin.assert:
    that:
      - (registry_update | to_json) is not search('-----BEGIN ')
      - (registry_update | to_json) is not search('tls\\.key')
    fail_msg: "Certificate registry update contains certificate material. Refusing to commit."
    quiet: true

# Purpose: Write certificate inventory metadata on the registry branch.
- name: "Registry - Merge entry for {{ registry_update.qmgr_name }}"
  ansible.builtin.set_fact:
    # registry_update.qmgr_name is the only entry replaced in this run.
    _updated_registry: >-
      {{ _existing_registry | combine({
           registry_update.qmgr_name: registry_update.data
         })
      }}

# Purpose: Check whether the generated queue manager path already exists.
- name: "Registry - Ensure directory exists"
  ansible.builtin.file:
    path: "{{ _cert_git_work_dir }}/{{ cert_registry_path | dirname }}"
    state: directory
    mode: "0755"

# Purpose: Write certificate inventory metadata on the registry branch.
- name: "Registry - Write updated inventory"
  ansible.builtin.copy:
    content: |
      ---
      # MQ NativeHA - Certificate Inventory
      # AUTO-MANAGED - Updated by NativeHA certificate lifecycle playbooks
      # Do NOT edit manually.
      # Last updated: {{ now(utc=true) | string }}

      {{ {'certificates': _updated_registry} | to_nice_yaml(indent=2) }}
    dest: "{{ _cert_git_work_dir }}/{{ cert_registry_path }}"
    mode: "0644"

# Purpose: Read Git status paths so only expected files are allowed.
- name: "Registry - Check changed working tree paths"
  ansible.builtin.command:
    argv: ["git", "status", "--porcelain", "--untracked-files=all"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  register: _registry_worktree_status
  changed_when: false

# Purpose: Standardize changed working tree paths.
- name: "Registry - Normalize changed working tree paths"
  ansible.builtin.set_fact:
    _registry_changed_paths: >-
      {{
        _registry_worktree_status.stdout_lines
        | map('regex_replace', '^.. +', '')
        | map('regex_replace', '^\"(.*)\"$', '\\1')
        | list
      }}

# Purpose: Stop if registry update touched anything except certificate inventory.
- name: "Registry - Validate only registry file changed"
  ansible.builtin.assert:
    that:
      - _registry_changed_paths | difference([cert_registry_path]) | length == 0
    fail_msg: |-
      Certificate registry update changed unexpected file(s).

      Changed path(s): {{ _registry_changed_paths }}
      Expected only: {{ [cert_registry_path] }}

      Refusing to stage or push anything.
    quiet: true

# Purpose: Stage only certificate inventory for the registry commit.
- name: "Registry - Git add registry file"
  ansible.builtin.command:
    argv: ["git", "add", "--", "{{ cert_registry_path }}"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  changed_when: false

# Purpose: Read Git state so the workflow can enforce allowed-file rules.
- name: "Registry - List staged paths"
  ansible.builtin.command:
    argv: ["git", "diff", "--cached", "--name-only"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  register: _registry_staged_paths
  changed_when: false

# Purpose: Confirm only certificate inventory is staged for commit.
- name: "Registry - Validate staged paths"
  ansible.builtin.assert:
    that:
      - _registry_staged_paths.stdout_lines | difference([cert_registry_path]) | length == 0
    fail_msg: |-
      Certificate registry update staged unexpected file(s).

      Staged path(s): {{ _registry_staged_paths.stdout_lines }}
      Expected only: {{ [cert_registry_path] }}

      Refusing to commit or push anything.
    quiet: true

# Purpose: Detect whether the registry commit has anything to publish.
- name: "Registry - Check for changes"
  ansible.builtin.command:
    argv: ["git", "diff", "--cached", "--quiet"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  register: _registry_git_diff
  failed_when: false
  changed_when: false

# Purpose: Commit the certificate inventory update on the registry branch.
- name: "Registry - Git commit"
  ansible.builtin.command:
    argv: ["git", "commit", "-m", "{{ registry_commit_msg }}"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  changed_when: true
  when: _registry_git_diff.rc != 0

# Purpose: Push the certificate inventory update to the registry branch.
- name: "Registry - Git push"
  ansible.builtin.command:
    argv: ["git", "push", "origin", "HEAD:refs/heads/{{ cert_registry_git_branch }}"]
  args:
    chdir: "{{ _cert_git_work_dir }}"
  changed_when: true
  when: _registry_git_diff.rc != 0

# Purpose: Skip registry commit when inventory content did not change.
- name: "Registry - No changes to commit"
  ansible.builtin.debug:
    msg: "Registry unchanged - nothing to commit."
  when: _registry_git_diff.rc == 0

# Purpose: Remove the temporary certificate registry checkout.
- name: "Registry - Cleanup working directory"
  ansible.builtin.file:
    path: "{{ _cert_git_work_dir }}"
    state: absent
