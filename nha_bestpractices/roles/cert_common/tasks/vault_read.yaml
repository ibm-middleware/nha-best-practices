---
# Purpose: Read the existing OpenShift Secret before merge, delete, or diagnostics.
- name: "samplecertrepo - Read certificate KV secret"
  community.hashi_samplecertrepo.samplecertrepo_kv2_get:
    url: "{{ samplecertrepo_url }}"
    auth_method: "{{ samplecertrepo_cert_auth_method }}"
    token: "{{ samplecertrepo_cert_token if samplecertrepo_cert_auth_method == 'token' else omit }}"
    role_id: "{{ samplecertrepo_cert_role_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
    secret_id: "{{ samplecertrepo_cert_secret_id if samplecertrepo_cert_auth_method == 'approle' else omit }}"
    validate_certs: "{{ samplecertrepo_validate_certs | default(true) }}"
    engine_mount_point: "{{ samplecertrepo_cert_mount_point }}"
    namespace: "{{ samplecertrepo_namespace if (samplecertrepo_namespace | default('') | length > 0) else omit }}"
    path: "{{ _samplecertrepo_cert_path }}"
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
  register: _samplecertrepo_read
  failed_when: false
  no_log: true
