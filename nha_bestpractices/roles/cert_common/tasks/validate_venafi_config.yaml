---
# Validate samplecertca settings immediately before a workflow needs samplecertca.

# Purpose: Stop early if samplecertca connection settings are incomplete.
- name: "samplecertca - Validate connection settings"
  ansible.builtin.assert:
    that:
      - samplecertca_url is defined and samplecertca_url | length > 0
      - samplecertca_username is defined and samplecertca_username | length > 0
      - samplecertca_password is defined and samplecertca_password | length > 0
      - samplecertca_client_id is defined and samplecertca_client_id | length > 0
      - samplecertca_scope is defined and samplecertca_scope | length > 0
      - samplecertca_policy_dn is defined and samplecertca_policy_dn | length > 0
      - samplecertca_oauth is defined and samplecertca_oauth | length > 0
      - samplecertca_cert_request is defined and samplecertca_cert_request | length > 0
      - samplecertca_cert_renew is defined and samplecertca_cert_renew | length > 0
      - samplecertca_cert_retrieve is defined and samplecertca_cert_retrieve | length > 0
      - samplecertca_token_revoke is defined and samplecertca_token_revoke | length > 0
    fail_msg: >-
      samplecertca connection configuration is incomplete. Verify samplecertca_url,
      samplecertca username/password credential injection, client_id, scope, and
      policy DN.
    quiet: true
