---
# Purpose: Revoke the samplecertca bearer token to limit its usable lifetime.
- name: "samplecertca - Revoke bearer token"
  ansible.builtin.uri:
    url: "{{ samplecertca_url }}{{ samplecertca_token_revoke }}"
    method: GET
    headers:
      Authorization: "Bearer {{ samplecertca_token }}"
    validate_certs: "{{ samplecertca_validate_certs }}"
    status_code: [200, 401]
    timeout: "{{ nativeha_api_timeout | default(45) | int }}"
    use_netrc: false
    unredirected_headers:
      - Authorization
  when: samplecertca_token | default('', true) | length > 0
  failed_when: false
  no_log: true

# Purpose: Clear the samplecertca token after provider calls finish.
- name: "samplecertca - Clear bearer token fact"
  ansible.builtin.set_fact:
    samplecertca_token: ""
  when: samplecertca_token is defined
  no_log: true
