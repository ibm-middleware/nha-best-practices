---
# Retrieve the signer chain from samplecertca TPP for an existing certificate object.
# The chain is requested root-first and without the private key.

# Purpose: Download the samplecertca signer chain for {{ cert_type }} diagnostics.
- name: "Diagnostics - Retrieve samplecertca chain {{ cert_type }}"
  ansible.builtin.uri:
    url: "{{ samplecertca_url }}{{ samplecertca_cert_retrieve }}"
    method: POST
    headers:
      accept: "application/json"
      Authorization: "Bearer {{ samplecertca_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      CertificateDN: "{{ samplecertca_policy_dn }}\\{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}"
      Format: "Base64"
      IncludeChain: true
      IncludePrivateKey: false
      RootFirstOrder: true
    validate_certs: "{{ samplecertca_validate_certs }}"
    status_code: [200, 202, 400, 404]
  register: _samplecertca_chain
  failed_when: false
  no_log: true

# Purpose: Check whether the generated queue manager path already exists.
- name: "Diagnostics - Ensure diagnostic output directory exists"
  ansible.builtin.file:
    path: "{{ diagnostic_output_dir }}"
    state: directory
    mode: "0700"
  when:
    - diagnostic_output_dir is defined
    - diagnostic_output_dir | length > 0
    - _samplecertca_chain.status | default(0) == 200
    - _samplecertca_chain.json is defined
    - _samplecertca_chain.json.CertificateData is defined

# Purpose: Save the downloaded samplecertca chain to the diagnostics file.
- name: "Diagnostics - Write samplecertca chain to file"
  ansible.builtin.copy:
    content: "{{ _samplecertca_chain.json.CertificateData | b64decode }}"
    dest: "{{ diagnostic_output_dir }}/{{ qmgr_name }}_{{ cert_type }}_chain_root_first.pem"
    mode: "0600"
  when:
    - diagnostic_output_dir is defined
    - diagnostic_output_dir | length > 0
    - _samplecertca_chain.status | default(0) == 200
    - _samplecertca_chain.json is defined
    - _samplecertca_chain.json.CertificateData is defined

# Purpose: Choose samplecertca chain output path {{ cert_type }} from inputs and defaults.
- name: "Diagnostics - Resolve samplecertca chain output path {{ cert_type }}"
  ansible.builtin.set_fact:
    _samplecertca_chain_output_path: >-
      {{
        diagnostic_output_dir ~ '/' ~ qmgr_name ~ '_' ~ cert_type ~ '_chain_root_first.pem'
        if (
          diagnostic_output_dir is defined
          and diagnostic_output_dir | length > 0
          and _samplecertca_chain.json is defined
          and _samplecertca_chain.json.CertificateData is defined
        )
        else 'not written'
      }}

# Purpose: Record the downloaded signer chain path for {{ cert_type }} diagnostics.
- name: "Diagnostics - samplecertca chain result {{ cert_type }}"
  ansible.builtin.debug:
    msg:
      - "Cert Type : {{ cert_type }}"
      - "DN        : {{ samplecertca_policy_dn }}\\{{ qmgr_name }}_{{ cert_type_csr_suffix[cert_type] }}"
      - "HTTP      : {{ _samplecertca_chain.status | default('unknown') }}"
      - "Chain     : {{ 'retrieved' if (_samplecertca_chain.json is defined and _samplecertca_chain.json.CertificateData is defined) else 'not available' }}"
      - "Output    : {{ _samplecertca_chain_output_path }}"

# Purpose: Store samplecertca chain diagnostics for the final report.
- name: "Diagnostics - Record samplecertca chain result {{ cert_type }}"
  ansible.builtin.set_fact:
    nativeha_report_diagnostic_results: >-
      {{
        nativeha_report_diagnostic_results | default([])
        + [
          {
            'mode': diagnostic_mode_effective,
            'qmgr_name': qmgr_name,
            'namespace': namespace,
            'target': qmgr_name | upper,
            'check': 'samplecertca signer chain: ' ~ cert_type,
            'status': (
              'passed'
              if (_samplecertca_chain.json is defined and _samplecertca_chain.json.CertificateData is defined)
              else 'attention'
            ),
            'detail': (
              'HTTP ' ~ (_samplecertca_chain.status | default('unknown') | string)
              ~ '; output=' ~ _samplecertca_chain_output_path
            )
          }
        ]
      }}
