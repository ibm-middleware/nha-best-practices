---
# NativeHA_Image_Upgrade.yaml - MQ Version/Image Upgrade Playbook
# Purpose:
#   Updates only the shared qm-image-patch.yaml under overlays/_shared/patches/.
#   The base qmgr.yaml and regional overlays remain unchanged.
# AAP survey variables:
# Variables loaded from nativeha_qmgr_control_vars.yaml:
# Variables derived inside the role:

# Purpose: Update the MQ image patch for the selected queue managers.
- name: "NativeHA MQ Upgrade - {{ qmgr_name | default('UNDEFINED') | upper }}"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../../../nativeha_templates/global_vars/nativeha_qmgr_control_vars.yaml

  tasks:
    # Purpose: Update the MQ image patch for the selected queue managers.
    - name: "Initialize NativeHA run context"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/init_run_context.yaml"

    # Purpose: Update the MQ image patch for the selected queue managers.
    - name: "Run MQ image upgrade workflow"
      block:
        # Purpose: Update the MQ image patch for the selected queue managers.
        - name: "MQ image upgrade - Execute"
          ansible.builtin.include_role:
            name: qmgr_image_upgrade

        # Purpose: Update the MQ image patch for the selected queue managers.
        - name: "MQ image upgrade - Mark success"
          ansible.builtin.set_fact:
            nativeha_playbook_status: "success"

      rescue:
        # Purpose: Update the MQ image patch for the selected queue managers.
        - name: "MQ image upgrade - Capture failure"
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../common/capture_failure.yaml"

      always:
        # Purpose: Update the MQ image patch for the selected queue managers.
        - name: "MQ image upgrade - Send final report"
          ansible.builtin.include_role:
            name: final_report
          vars:
            final_report_title: "MQ Image Upgrade"
            final_report_status: "{{ nativeha_playbook_status | default('failed') }}"
            final_report_error: "{{ nativeha_playbook_error | default('') }}"
            final_report_summary: >-
              Update the shared MQ image patch for selected queue managers and
              publish the GitOps change.

        # Purpose: Update the MQ image patch for the selected queue managers.
        - name: "MQ image upgrade - Re-raise failure"
          ansible.builtin.fail:
            msg: "{{ nativeha_playbook_error | default('MQ image upgrade failed.') }}"
          when: nativeha_playbook_status | default('failed') != 'success'
