---
# MQ NativeHA Automation - Central Configuration
# ALL configurable values live here. Nothing is hardcoded in
# playbooks, roles, or templates. Update this file to switch
# between lab / company environments.

# IBM MQ Operator Version & Licensing
mq_versions:
  NONPROD: "9.4.3.1-r1"
  PROD: "9.4.5.0-r1"

license_ids:
  NONPROD: "DUMMY-LICENSE-ID" # pragma: allowlist secret
  PROD: "DUMMY-LICENSE-ID" # pragma: allowlist secret

# Global Switchboard: dependent runtime choices
# Change these first when moving between lab and company environments. The
# lower sections consume these normalized values so related switches stay
# aligned.
nativeha_runtime_profile: "{{ lookup('ansible.builtin.env', 'NATIVEHA_RUNTIME_PROFILE', default='lab') }}"  # lab | company
nativeha_target_repo_change_mode: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_TARGET_REPO_CHANGE_MODE',
      default=((nativeha_runtime_profile | lower | trim == 'company')
               | ternary('pull_request', 'direct'))
    ) | lower | trim
  }}
nativeha_git_strict_host_key_checking: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_GIT_STRICT_HOST_KEY_CHECKING',
      default=((nativeha_runtime_profile | lower | trim == 'company') | string)
    ) | bool
  }}
nativeha_email_enabled: "{{ lookup('ansible.builtin.env', 'NATIVEHA_EMAIL_ENABLED', default='true') | bool }}"
nativeha_cert_delivery_backend: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_DELIVERY_BACKEND', default='openshift_secret') | lower | trim }}"  # openshift_secret | samplecertrepo
nativeha_vso_secret_sync_requested: "{{ lookup('ansible.builtin.env', 'NATIVEHA_ENABLE_VSO_SECRET_SYNC', default='false') | bool }}"
nativeha_vso_secret_sync_enabled: "{{ nativeha_vso_secret_sync_requested | bool and nativeha_cert_delivery_backend == 'samplecertrepo' }}"
nativeha_app_mqsc_apply_strategy: "{{ lookup('ansible.builtin.env', 'NATIVEHA_APP_MQSC_APPLY_STRATEGY', default='restart') | lower | trim }}"  # restart | manual
nativeha_app_mqsc_activation_strategy: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_APP_MQSC_ACTIVATION_STRATEGY',
      default=((nativeha_app_mqsc_apply_strategy | lower | trim == 'restart')
               | ternary('restart_patch', 'manual'))
    ) | lower | trim
  }}
nativeha_internal_registry_enabled: "{{ lookup('ansible.builtin.env', 'NATIVEHA_INTERNAL_REGISTRY_ENABLED', default='true') | bool }}"

# Node Scheduling
# All MQ pods use taint/toleration: mqha=true:NoSchedule
node_selector_key: "mqha"
node_selector_value: "true"

# Git Configuration
# Dedicated repo per environment - same SSH key is used for all repos.
# QA1 and QA2 intentionally share the QA repo, and are separated by
# queue_managers/<ENV>/ and argocd_mq_applications/<ENV>/ folders in that repo.
# Each repo uses its own 'develop' branch as the deployment target.

# Per-environment target repository URLs
env_repo_map:
  DEV: "git@git.example.lab:example.lab/mq-nativeha-dev.git"
  QA1: "git@git.example.lab:example.lab/mq-nativeha-qa.git"
  QA2: "git@git.example.lab:example.lab/mq-nativeha-qa.git"
  QA3: "git@git.example.lab:example.lab/mq-nativeha-QA3.git"
  PROD: "git@git.example.lab:example.lab/mq-nativeha-prod.git"

# Environments listed here are written below shared-repo environment folders:
# queue_managers/<ENV>/ and argocd_mq_applications/<ENV>/.
# Environments not listed use the default flat dedicated-repo layouts:
# queue_managers/<qmgr_name>/ and argocd_mq_applications/<region>/.
qmgr_env_subdir_map:
  QA1: "QA1"
  QA2: "QA2"

# Target branch in each dedicated repo (all use 'develop')
env_branch_map:
  DEV: "develop"
  QA1: "develop"
  QA2: "develop"
  QA3: "develop"
  PROD: "develop"

# Git commit identity (used for automation commits)
git_user_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_GIT_USER_NAME', default='MQ Automation') }}"
git_user_email: "{{ lookup('ansible.builtin.env', 'NATIVEHA_GIT_USER_EMAIL', default='mq-automation@example.lab') }}"

# Git SSH policy. Lab defaults accept unknown hosts for convenience. Company
# environments should set NATIVEHA_GIT_STRICT_HOST_KEY_CHECKING=true and provide
# known_hosts through the AAP execution environment or NATIVEHA_GIT_KNOWN_HOSTS_FILE.
git_ssh_strict_host_key_checking: "{{ nativeha_git_strict_host_key_checking }}"
git_ssh_known_hosts_file: "{{ lookup('ansible.builtin.env', 'NATIVEHA_GIT_KNOWN_HOSTS_FILE', default='') }}"
git_accept_hostkey: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_GIT_ACCEPT_HOSTKEY',
      default=((not (git_ssh_strict_host_key_checking | bool)) | string)
    ) | bool
  }}
git_ssh_command: >-
  ssh -o StrictHostKeyChecking={{ (git_ssh_strict_host_key_checking | bool) | ternary('yes', 'no') }}
  {% if git_ssh_known_hosts_file | default('', true) | length > 0 -%}
  -o UserKnownHostsFile={{ git_ssh_known_hosts_file }}
  {%- elif not (git_ssh_strict_host_key_checking | bool) -%}
  -o UserKnownHostsFile=/dev/null
  {%- endif %}
git_ssh_options: >-
  -o StrictHostKeyChecking={{ (git_ssh_strict_host_key_checking | bool) | ternary('yes', 'no') }}
  {% if git_ssh_known_hosts_file | default('', true) | length > 0 -%}
  -o UserKnownHostsFile={{ git_ssh_known_hosts_file }}
  {%- elif not (git_ssh_strict_host_key_checking | bool) -%}
  -o UserKnownHostsFile=/dev/null
  {%- endif %}

# Annotation prefix used for restart tracking on QueueManager CRs. Override this
# in company environments if a different internal domain/prefix is required.
restart_annotation_prefix: "{{ lookup('ansible.builtin.env', 'NATIVEHA_RESTART_ANNOTATION_PREFIX', default='nativeha.example.lab') }}"
restart_annotation_json_pointer_prefix: "{{ restart_annotation_prefix | replace('~', '~0') | replace('/', '~1') }}"

# MQ Client/Signer Trust Store
# QueueManager base CRs always reference one deterministic public trust Secret.
# Certificate onboarding seeds this Secret with the company CA. In samplecertrepo/VSO
# mode, the public trust material is stored once per app at the shared samplecertrepo
# path below and synced into each queue-manager namespace.
mq_client_trust_source_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CLIENT_TRUST_SOURCE_NAME', default='clientcerts') }}"
mq_client_trust_secret_suffix: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CLIENT_TRUST_SECRET_SUFFIX', default='client-certs') }}"
mq_client_trust_default_ca_item: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CLIENT_TRUST_DEFAULT_CA_ITEM', default='example.lab-ca.crt') }}"
mq_client_trust_samplecertrepo_shared_path: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CLIENT_TRUST_samplecertrepo_SHARED_PATH', default=(app_prefix | default(app_sys_id | default('')) | lower) ~ '/ibm-mq/shared') }}"

# Final HTML Email Reports
# Shared completion reports for every MQ NativeHA playbook. Credentials are
# intentionally injected at runtime through AAP/environment variables; do not
# store SMTP passwords in Git.
notification_email_enabled: "{{ nativeha_email_enabled }}"
notification_email_send_success: true
notification_email_send_failure: true
notification_email_host: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_HOST', default='smtp.example.lab') }}"
notification_email_port: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_PORT', default='587') | int }}"
notification_email_secure: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_SECURE', default='starttls') }}"
notification_email_from: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_FROM', default='example.lab.mail@example.lab') }}"
notification_email_username: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_USERNAME', default='example.lab.mail@example.lab') }}"
notification_email_password: >-
  {{
    lookup('ansible.builtin.env', 'NATIVEHA_SMTP_PASSWORD', default='')
    | default(lookup('ansible.builtin.env', 'SMTP_PASSWORD', default=''), true)
    | default(lookup('ansible.builtin.env', 'GMAIL_APP_PASSWORD', default=''), true)
  }}
notification_email_to: >-
  {{
    lookup('ansible.builtin.env', 'NATIVEHA_SMTP_TO', default='admin@example.lab').split(',')
    | map('trim')
    | reject('equalto', '')
    | list
  }}
notification_email_subject_prefix: "{{ lookup('ansible.builtin.env', 'NATIVEHA_EMAIL_SUBJECT_PREFIX', default='[MQ NativeHA]') }}"
notification_email_timeout: "{{ lookup('ansible.builtin.env', 'NATIVEHA_SMTP_TIMEOUT', default='20') | int }}"
notification_email_no_log: true

# Temp working directory for git clone operations
git_work_dir: "/tmp/mqnativeha_automation"

# Target Repository Publish Mode
# direct:
# pull_request:
target_repo_change_mode: "{{ nativeha_target_repo_change_mode }}"

# git-provider Pull Request Automation
# Used when target_repo_change_mode is "pull_request".
# Backend selection:
# Credentials injected by AAP environment variables:
git-provider_cloud_api_url: "https://api.git.example.lab/2.0"
# Override below only when auto-detection from git_repo_url fails:
# git-provider_internal_api_url: ""
# git-provider_workspace: ""
# git-provider_project_key: ""
# git-provider_repo_slug: ""
git-provider_validate_certs: true

# MQ Container Image (Internal Registry)
# When using an internal/mirrored registry instead of registry.example.lab, set these.
# The operator uses spec.queueManager.image when provided.
# Full image at render time: {{ mq_image_registry }}/{{ mq_image_repository }}:{{ mq_version }}
mq_image_registry: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_MQ_IMAGE_REGISTRY',
      default=((nativeha_internal_registry_enabled | bool)
               | ternary('services.example.lab:5000', 'registry.example.lab'))
    )
  }}
mq_image_repository: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_MQ_IMAGE_REPOSITORY',
      default=((nativeha_internal_registry_enabled | bool)
               | ternary('ibm-mq/mq', 'ibm-messaging/mq'))
    )
  }}

# Certificate Delivery Backend
# Shared switch used by certificate management. openshift_secret creates TLS
# secrets directly in OpenShift. samplecertrepo writes certs to samplecertrepo KV v2.
mq_cert_delivery_backend: "{{ nativeha_cert_delivery_backend }}" # openshift_secret | samplecertrepo

# samplecertrepo Secrets Operator sync
# Controls whether queue-manager onboarding generates samplecertrepoConnection,
# samplecertrepoAuth, ServiceAccount, and samplecertrepoStaticSecret resources. Keep this false
# for direct OpenShift Secret injection. Set true only with
# mq_cert_delivery_backend=samplecertrepo after VSO is approved and installed, because
# VSO is then responsible for creating the Kubernetes Secrets consumed by MQ.
enable_vso_secret_sync: "{{ nativeha_vso_secret_sync_enabled }}"

# Regions and OpenShift Clusters
# regions is a region-code catalog used for folder names, labels, and role
# patch file names. Environment-specific cluster membership and domains are in
# env_region_map and openshift_clusters below.
regions:
  cluster1:
    region_label: "east"
  cluster2:
    region_label: "west"

# Environments may have one or more OpenShift clusters. QA3 is intentionally
# single-region; QA2 and PROD are the CRR environments.
env_region_map:
  DEV:
    - "cluster1"
  QA1:
    - "cluster1"
  QA2:
    - "cluster1"
    - "cluster2"
  QA3:
    - "cluster1"
  PROD:
    - "cluster1"
    - "cluster2"

# Queue manager instance type is derived from environment, not from survey.
env_instance_type_map:
  DEV: "nha"
  QA1: "nha"
  QA2: "nhacrr"
  QA3: "nha"
  PROD: "nhacrr"

# Non-secret OpenShift connection metadata. API tokens are injected by AAP via
# the token_env names and must never be stored in Git.
# Lab note:
openshift_clusters:
  DEV:
    cluster1:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_DEV_USE_TOKEN"
      validate_certs: false
  QA1:
    cluster1:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_QA1_USE_TOKEN"
      validate_certs: false
  QA2:
    cluster1:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_QA2_USE_TOKEN"
      validate_certs: false
    cluster2:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_QA2_USW_TOKEN"
      validate_certs: false
  QA3:
    cluster1:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_QA3_USE_TOKEN"
      validate_certs: false
  PROD:
    cluster1:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_PROD_USE_TOKEN"
      validate_certs: false
    cluster2:
      api_url: "https://api.ocp-cluster1-001.example.lab:6443"
      cluster_domain: "apps.ocp-cluster1-001.example.lab"
      token_env: "MQ_OCP_PROD_USW_TOKEN"
      validate_certs: false

# Environment Abbreviation Maps
# Used by the automation to build namespace and qmgr names.
# Namespace uses 3-char codes; Queue Manager uses 2-char codes.
# Pattern: namespace = <SYSID>-MQ-<3-CHAR-ENV>-<SEQ>
# Temporary survey variable custom_openshift_namespace can override only the
# generated OpenShift namespace. When omitted, this pattern remains unchanged.
# Note: PROD queue manager names use the 2-char code "PR".
env_namespace_abbr:
  DEV: "DEV"
  QA1: "QA1"
  QA2: "QA2"
  QA3: "QA3"
  PROD: "PRD"

env_qmgr_abbr:
  DEV: "DV"
  QA1: "Q1"
  QA2: "Q2"
  QA3: "Q3"
  PROD: "PR"

# Sizing tier order (smallest -> largest) for auto-match
# When auto-computing sizing, iterate these in order and pick
# the first tier whose qmgr_storage >= computed requirement.
sizing_order:
  - small
  - medium
  - large
  - xlarge

# ArgoCD
argocd_namespace: "openshift-gitops"
argocd_project: "default"

# Certificate Management
# MQ consumes Kubernetes TLS Secrets regardless of backend. Direct OpenShift
# mode creates those Secrets through certificate automation. VSO mode creates
# them by syncing pre-provisioned material from samplecertrepo KV v2.

# MQ Web Console Configuration
# Compatibility alias for older callers. The effective WebUI toggle is
# enable_webui in the Monitoring & WebUI section below. Templates prefer
# enable_webui when it is defined, and fall back to web_enabled only for older
# variable files.
web_enabled: false
web_authentication: "manual"
web_authorization: "manual"
web_configmap: "webconsole-config"    # ConfigMap name suffix: {{ qmgr_name }}-webconsole-config

# MQ Operator Built-in Metrics
# Enables the MQ Operator native metrics endpoint. This is separate from the
# optional external Prometheus exporter controlled by enable_prometheus_monitor.
enable_metrics: true

# CRR TLS Cipher
# Used in nativeHAGroups.local.tls.cipherSpec for CRR queue managers
crr_cipher: "ANY_TLS12_OR_HIGHER"

# CRR Replication Port
# Port used for nativeHAGroups.remotes[].addresses (443 for OCP routes via TLS passthrough)
crr_replication_port: 443

# Storage behavior
# Allows the MQ Operator to expand existing PVCs when desired queue-manager or
# recovery-log storage is increased and the storage class supports expansion.
allow_volume_expansion: true

# MQSC Layout
# Core MQSC is generated in base/mqsc and is intended to be immutable
# after queue manager create. App MQSC is generated later under
# overlays/_shared/mqsc-app/<group>/ so use/cluster2 consume one shared app
# definition with fixed ConfigMap names.
app_mqsc_apply_strategy: "{{ nativeha_app_mqsc_apply_strategy }}"    # restart | manual
app_mqsc_activation_strategy: "{{ nativeha_app_mqsc_activation_strategy }}"  # restart_patch | manual | none
app_mqsc_mount_in_pod: true            # mount app MQSC under /mq-app-config for scripts
app_mqsc_default_group: "54-app-objects"
app_mqsc_group_dirs:
  - "50-app-chlauth"
  - "52-app-channel"
  - "54-app-objects"
  - "56-app-authrec"
app_mqsc_max_bytes: 131072
app_mqsc_allow_delete: false
app_mqsc_allowed_prefixes_by_group:
  "50-app-chlauth":
    - "(?i)^\\s*SET\\s+CHLAUTH\\b"
  "52-app-channel":
    - "(?i)^\\s*(DEFINE|ALTER)\\s+CHANNEL\\b"
    - "(?i)^\\s*DELETE\\s+CHANNEL\\b"
  "54-app-objects":
    - "(?i)^\\s*(DEFINE|ALTER)\\s+(QLOCAL|QALIAS|QREMOTE|QMODEL|QUEUE|TOPIC|SUB|PROCESS|NAMELIST|SERVICE)\\b"
    - "(?i)^\\s*DELETE\\s+(QLOCAL|QALIAS|QREMOTE|QMODEL|QUEUE|TOPIC|SUB|PROCESS|NAMELIST|SERVICE)\\b"
  "56-app-authrec":
    - "(?i)^\\s*SET\\s+AUTHREC\\b"
app_mqsc_disallowed_regexes:
  - "(?i)^\\s*(ALTER|RESET|REFRESH|START|STOP)\\s+QMGR\\b"
  - "(?i)^\\s*DISPLAY\\b"
  - "(?i)\\b(SYSTEM\\.|AMQ\\.)"
  - "(?i)-----BEGIN\\s+.*(PRIVATE KEY|CERTIFICATE)-----"

# Custom external MQ client route
# Creates a passthrough OpenShift Route such as <qmgr>.example.lab for
# external MQ clients. DNS/GSLB must point that host to the active cluster
# router; the Route host itself must match the client DNS name for SNI.
custom_client_route_enabled: true
custom_client_dns_domain: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CUSTOM_CLIENT_DNS_DOMAIN', default='example.lab') }}"
custom_client_route_name_suffix: "client-custom"
custom_client_route_target_port: 1414
custom_client_route_include_san: true

# samplecertrepo Secrets Operator (VSO)
# Replaces ESO - cluster1s samplecertrepoStaticSecret CRDs for static cert sync
# _zone safe default: qmgr_onboard/workflow.yaml and cert_common/build_target.yaml
# derive _zone from samplecertrepo_security_zones before rendering VSO templates. This
# lazy fallback prevents an undefined-variable error when the vars file is loaded
# outside the onboarding context (e.g. during linting or dry-run validation).
# The explicit set_fact in the workflow always takes precedence.
_zone: >-
  {{
    _zone | default(
      'hra' if (app_prefix | default('unknown')) in (samplecertrepo_security_zones.hra.apps | default([]))
      else 'sra'
    )
  }}
vso_samplecertrepo_connection_name: "{{ app_prefix }}-samplecertrepo-connection"
vso_samplecertrepo_auth_name: "{{ app_prefix }}-samplecertrepo-auth"
vso_samplecertrepo_role: "{{ samplecertrepo_security_zones[_zone].vso_role }}"
vso_service_account: "{{ samplecertrepo_security_zones[_zone].vso_sa }}"
vso_kubernetes_auth_mount: "{{ samplecertrepo_security_zones[_zone].auth_mount | default('kubernetes') }}"
vso_samplecertrepo_skip_tls: false
vso_samplecertrepo_ca_secret: "samplecertrepo-ca-cert" # K8s secret containing samplecertrepo CA chain as ca.crt
vso_refresh_after: "60s"             # How often VSO re-checks samplecertrepo for cert changes

# samplecertrepo URL (used by samplecertrepoConnection CR)
samplecertrepo_url: "{{ lookup('ansible.builtin.env', 'samplecertrepo_ADDR', default='https://services.example.lab:8200') }}"

# samplecertrepo Security Zones
# Logic: If app_sys_id is in 'hra.apps', use hra settings. Otherwise, default to sra.
# NOTE:
# - 'label' is the samplecertrepo Enterprise namespace value sent as X-samplecertrepo-Namespace.
# - When 'label' is set, keep 'mount' relative to that samplecertrepo namespace
# - 'auth_mount' is the Kubernetes auth mount path inside that samplecertrepo namespace.
samplecertrepo_security_zones:
  hra:
    mount: "hra/kv"
    label: ""                        # Example for Enterprise: "hra"
    auth_mount: "kubernetes"
    vso_role: "{{ app_prefix }}-hra-vso-role"
    vso_sa: "{{ app_prefix }}-hra-vso-sa"
    apps: ["dmq", "amq", "mqp"]
  sra:
    mount: "sra/kv"
    label: ""                        # Example for Enterprise: "sra"
    auth_mount: "kubernetes"
    vso_role: "{{ app_prefix }}-sra-vso-role"
    vso_sa: "{{ app_prefix }}-sra-vso-sa"

# samplecertrepo role will be derived dynamically in the playbook based on the zone:
# vso_samplecertrepo_role: "{{ samplecertrepo_security_zones[_zone].vso_role }}"

# Sizing Matrix
# sizing[ENVIRONMENT][SIZE] defines CPU, memory, storage, and log sizing.
# request = normal operating resources; limits = burst ceiling
sizing:
  DEV:
    small:
      request_cpu: "250m"
      limits_cpu: "500m"
      request_memory: "512Mi"
      limits_memory: "1Gi"
      qmgr_storage: "2Gi"
      log_storage: "2Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    medium:
      request_cpu: "500m"
      limits_cpu: "1"
      request_memory: "1Gi"
      limits_memory: "2Gi"
      qmgr_storage: "3Gi"
      log_storage: "3Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
  QA1:
    small:
      request_cpu: "250m"
      limits_cpu: "500m"
      request_memory: "512Mi"
      limits_memory: "1Gi"
      qmgr_storage: "2Gi"
      log_storage: "2Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    medium:
      request_cpu: "500m"
      limits_cpu: "1"
      request_memory: "1Gi"
      limits_memory: "2Gi"
      qmgr_storage: "3Gi"
      log_storage: "3Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
  QA2:
    small:
      request_cpu: "300m"
      limits_cpu: "500m"
      request_memory: "512Mi"
      limits_memory: "1Gi"
      qmgr_storage: "2Gi"
      log_storage: "2Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    medium:
      request_cpu: "500m"
      limits_cpu: "1"
      request_memory: "1Gi"
      limits_memory: "2Gi"
      qmgr_storage: "4Gi"
      log_storage: "4Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    large:
      request_cpu: "1"
      limits_cpu: "2"
      request_memory: "2Gi"
      limits_memory: "4Gi"
      qmgr_storage: "6Gi"
      log_storage: "6Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    xlarge:
      request_cpu: "2"
      limits_cpu: "4"
      request_memory: "4Gi"
      limits_memory: "8Gi"
      qmgr_storage: "7Gi"
      log_storage: "7Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
  QA3:
    small:
      request_cpu: "300m"
      limits_cpu: "500m"
      request_memory: "512Mi"
      limits_memory: "1Gi"
      qmgr_storage: "1Gi"
      log_storage: "1Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    medium:
      request_cpu: "500m"
      limits_cpu: "1"
      request_memory: "1Gi"
      limits_memory: "2Gi"
      qmgr_storage: "5Gi"
      log_storage: "5Gi"
      log_file_pages: 32768
      storage_class: "lvms-vg1"
    large:
      request_cpu: "1"
      limits_cpu: "2"
      request_memory: "2Gi"
