---
# ============================================================
# MQ NativeHA — Certificate Lifecycle Configuration
# ============================================================
# Dedicated control file for DummyCertManager ↔ Vault certificate
# provisioning and revocation.
#
# This file is loaded together with nativeha_qmgr_control_vars.yaml.
# Certificate-specific values live here; shared naming, regions,
# Vault zones, and vault_url come from nativeha_qmgr_control_vars.yaml.
#
# Loaded by: NativeHA_Cert_Management.yaml
# ============================================================

# ────────────────────────────────────────────────────
# Shared Constants — sourced from qmgr_control_vars
# ────────────────────────────────────────────────────
# vault_url: loaded from nativeha_qmgr_control_vars.yaml (single source of truth).
# cluster_domains: derived at runtime from the regions map in qmgr_control_vars
#   so cert SANs and QM routes can never go out of sync.
#   Override: {{ regions.values() | map(attribute='cluster_domain') | list }}
# ============================================================

# ────────────────────────────────────────────────────
# Cluster Domains — Derived from regions map
# ────────────────────────────────────────────────────
# This Jinja2 expression reads the 'regions' dict from
# nativeha_qmgr_control_vars.yaml and extracts the cluster_domain
# from each region entry. Both cert and QM playbooks share the
# same source of truth.
cluster_domains: "{{ regions.values() | map(attribute='cluster_domain') | list }}"

# ────────────────────────────────────────────────────
# Multi-Cert Profile: Instance Type → Cert Types
# ────────────────────────────────────────────────────
# Defines which certificates to generate based on instance_type.
#   single → 1 cert  (app)
#   nha    → 2 certs (app + nha)
#   nhacrr → 3 certs (app + nha + nhacrr)
instance_cert_map:
  single:
    - app
  nha:
    - app
    - nha
  nhacrr:
    - app
    - nha
    - nhacrr

# CSR filename suffix per cert type
# Each generates: <qmgr_name>_<suffix>.csr
cert_type_csr_suffix:
  app: "app"
  nha: "nha"
  nhacrr: "nhacrr"

# Vault sub-path per cert type (maps exactly to VSO templates)
# Full Vault path:
#   {app_prefix}/ibm-mq/{ENV}/{NAMESPACE}/{QMGR_NAME}/{subpath}
# Must match what VSO VaultStaticSecrets read from.
cert_type_vault_subpath:
  app: "app-pki"
  nha: "nha-tls"
  nhacrr: "nhacrr-tls"

# MQ Operator-created service/route SAN names are built in generate_csr.yaml.
# We keep only custom SAN input here to avoid duplicating operator conventions
# as configurable variables.

# Extra SANs — appended to ALL cert types (leave empty for none)
qmgr_extra_sans: []

# ────────────────────────────────────────────────────
# DummyCertManager Connection & Authentication
# ────────────────────────────────────────────────────
dummycertmanager_url: "https://mypki.example.lab"
dummycertmanager_oauth: "/VEDAuth/Authorize/oauth"
dummycertmanager_revoke: "/vedsdk/certificates/Revoke"
dummycertmanager_cert_search: "/vedsdk/certificates"
dummycertmanager_token_revoke: "/VEDAuth/Revoke/token"

dummycertmanager_username: >-
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_USERNAME')
    | default(lookup('ansible.builtin.env', 'DUMMYCERTMANAGER_USERNAME'), true)
  }}
dummycertmanager_password: >-  # pragma: allowlist secret
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_PASSWORD')
    | default(lookup('ansible.builtin.env', 'DUMMYCERTMANAGER_PASSWORD'), true)
  }}
dummycertmanager_client_id: "MQAutomation"
dummycertmanager_scope: "certificate:approve,delete,discover,manage,revoke;configuration:manage"
dummycertmanager_policy_dn: "\\VED\\Policy\\Certificates\\DMQ Automated Certificates"
dummycertmanager_validate_certs: true

# ────────────────────────────────────────────────────
# Certificate Key & CSR Configuration
# ────────────────────────────────────────────────────
cert_key_size: 4096
cert_key_type: "RSA"

cert_common_name: "{{ qmgr_name }}.example.lab"
cert_country_name: "US"
cert_state_or_province: "NY"
cert_locality_name: "New York"
cert_organization_name: "Example Lab"
cert_organizational_unit: "IT"

# ────────────────────────────────────────────────────
# Pre-Request Validation & Renewal Threshold
# ────────────────────────────────────────────────────
# Before requesting a new cert from DummyCertManager, the automation
# checks Vault and DummyCertManager for existing valid certs.
# If a cert exists and has MORE than this many days until
# expiry, it is SKIPPED (no new request).
# If it has FEWER days remaining, it is RENEWED.
cert_renewal_threshold_days: 30

# ────────────────────────────────────────────────────
# DummyCertManager Polling Configuration
# ────────────────────────────────────────────────────
dummycertmanager_poll_retries: 30
dummycertmanager_poll_delay: 20

# ────────────────────────────────────────────────────
# DummyCertManager Revocation Settings (Offboard)
# ────────────────────────────────────────────────────
dummycertmanager_revoke_reason: 0
dummycertmanager_revoke_disable: true
dummycertmanager_revoke_comments: "Decommissioned via Ansible AAP NativeHA Offboard — {{ qmgr_name }}"

# ────────────────────────────────────────────────────
# Vault KV Configuration
# ────────────────────────────────────────────────────
# Skips Vault interactions for testing DummyCertManager in isolation
# WARNING: Set to true ONLY for isolated DummyCertManager testing.
#          PROD must always use Vault (false).
skip_vault_operations: false

# Vault KV token — accepts an explicit Ansible var or runtime env injection.
# Supported sources, in order:
#   1. vault_token / hashi_vault_token Ansible vars (for AAP credential injectors)
#   2. VAULT_TOKEN env var
#   3. vault_token env var
# This keeps local CLI runs and AAP launches aligned even when the controller
# injects a variable instead of a literal VAULT_TOKEN environment variable.
vault_cert_token: >-  # pragma: allowlist secret
  {{
    vault_token
    | default(hashi_vault_token, true)
    | default(lookup('ansible.builtin.env', 'VAULT_TOKEN', default=''), true)
    | default(lookup('ansible.builtin.env', 'vault_token', default=''), true)
  }}
# Runtime-derived from nativeha_qmgr_control_vars.yaml → vault_security_zones
# so cert lifecycle and VSO always use the same Vault mount and, when enabled,
# the same Vault Enterprise namespace.
vault_cert_mount_point: ""
# Shared path helpers so cert lifecycle and generated VSO manifests
# point at the exact same Vault location.
vault_path_prefix: "{{ app_prefix_normalized | default(app_prefix | lower) }}"
vault_cert_namespace_path: "{{ namespace | lower }}"
vault_cert_qmgr_path: "{{ qmgr_name_upper | default(qmgr_name | upper) }}"

# Full Vault KV path:
#   {mount}/data/{vault_path_prefix}/ibm-mq/{ENV}/{namespace-lower}/{QMGR_NAME}/{cert-type}
# Aligns with nativeha_templates/base/secrets/*.yaml
vault_cert_base_path: "{{ vault_path_prefix }}/ibm-mq/{{ mq_environment | upper }}/{{ vault_cert_namespace_path }}/{{ vault_cert_qmgr_path }}"

# ────────────────────────────────────────────────────
# Git Configuration (for Certificate Registry)
# ────────────────────────────────────────────────────
# The cert registry (cert_inventory.yaml) is committed to the
# repo after every cert action (onboard/offboard/renew/monitor).
# Certificate registry repository settings are kept here because the registry
# is owned by the certificate lifecycle, even though shared naming and Vault
# settings come from nativeha_qmgr_control_vars.yaml.
cert_git_base_url: "git@bitbucket.org:example/mq-native-ha-v1.git"
cert_git_branch: "main"
cert_git_work_dir: "/tmp/mq-cert-registry"
cert_git_user_name: "MQ Cert Automation"
cert_git_user_email: "mq-cert-automation@example.lab"

# ────────────────────────────────────────────────────
# Certificate Registry
# ────────────────────────────────────────────────────
# Path (relative to repo root) to the auto-managed inventory file.
# Updated by every cert action; read by monitor for "all" scope.
cert_registry_path: "nativeha_templates/cert_registry/cert_inventory.yaml"

# ────────────────────────────────────────────────────
# SMTP Alerting Configuration
# ────────────────────────────────────────────────────
# Enable SMTP alerts for certificate health issues
smtp_enabled: true
smtp_host: "smtp.example.lab"
smtp_port: 25
smtp_from: "mq-cert-automation@example.lab"
smtp_to:
  - "mq-support@example.lab"
  - "middleware-ops@example.lab"
smtp_subject_prefix: "[MQ Certificate Alert]"

# Alert thresholds - send alerts for these statuses
alert_on_statuses:
  - "expiring_soon"
  - "expired"
  - "missing"
  - "corrupt"
  - "desync"
