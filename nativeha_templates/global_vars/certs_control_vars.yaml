---
# MQ NativeHA - Certificate Lifecycle Configuration
# Dedicated control file for samplecertca-backed certificate lifecycle operations.
# This file is loaded together with nativeha_qmgr_control_vars.yaml.
# Certificate-specific values live here. Shared naming, OpenShift topology,
# delivery backend, samplecertrepo zones, and samplecertrepo_url come from
# nativeha_qmgr_control_vars.yaml.
# Loaded by: NativeHA_Cert_Onboard/Renew/Monitor/Offboard/Diagnostics.yaml

# Shared Constants - sourced from qmgr_control_vars
# samplecertrepo_url, mq_cert_delivery_backend, openshift_clusters, env_region_map, and
# samplecertrepo_security_zones are loaded from nativeha_qmgr_control_vars.yaml.
# cluster_domains is derived per queue manager target at runtime from
# openshift_clusters[ENV][region].cluster_domain.

# Multi-Cert Profile: Instance Type -> Cert Types
# Defines which certificates to generate based on instance_type.
instance_cert_map:
  single:
    - app
  nha:
    - app
    - nha
  nhacrr:
    - app
    - nha
    - nhacrr

# CSR filename suffix per cert type
# Each generates: <qmgr_name>_<suffix>.csr
cert_type_csr_suffix:
  app: "app"
  nha: "nha"
  nhacrr: "nhacrr"

# samplecertrepo sub-path per cert type (maps exactly to VSO templates)
# Full samplecertrepo path:
# Must match what VSO samplecertrepoStaticSecrets read from.
cert_type_samplecertrepo_subpath:
  app: "app-pki"
  nha: "nha-tls"
  nhacrr: "nhacrr-tls"

# MQ Operator-created service/route SAN names are built in generate_csr.yaml.
# We keep only custom SAN input here to avoid duplicating operator conventions
# as configurable variables.

# Extra SANs - appended to ALL cert types (leave empty for none)
qmgr_extra_sans: []

# Extra SANs by certificate type. Prefer this for client-only custom DNS names
# so NHA and CRR internal certs do not receive unrelated app route SANs.
qmgr_extra_sans_by_type:
  app: []
  nha: []
  nhacrr: []

# samplecertca Connection & Authentication
samplecertca_url: "{{ lookup('ansible.builtin.env', 'samplecertca_URL', default='https://mypki.example.lab') }}"
samplecertca_oauth: "/VEDAuth/Authorize/oauth"
samplecertca_cert_request: "/vedsdk/certificates/Request"
samplecertca_cert_renew: "/vedsdk/certificates/Renew"
samplecertca_revoke: "/vedsdk/certificates/Revoke"
samplecertca_cert_search: "/vedsdk/certificates"
samplecertca_cert_retrieve: "/vedsdk/certificates/Retrieve"
samplecertca_token_revoke: "/VEDAuth/Revoke/token"

samplecertca_username: >-
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_USERNAME')
    | default(lookup('ansible.builtin.env', 'samplecertca_USERNAME'), true)
  }}
samplecertca_password: >-
  {{
    lookup('ansible.builtin.env', 'ANSIBLE_NET_PASSWORD')
    | default(lookup('ansible.builtin.env', 'samplecertca_PASSWORD'), true)
  }}
samplecertca_client_id: "{{ lookup('ansible.builtin.env', 'samplecertca_CLIENT_ID', default='MQAutomation') }}"
samplecertca_scope: "{{ lookup('ansible.builtin.env', 'samplecertca_SCOPE', default='certificate:approve,delete,discover,manage,revoke;configuration:manage') }}"
samplecertca_policy_dn: "{{ lookup('ansible.builtin.env', 'samplecertca_POLICY_DN', default='\\VED\\Policy\\Certificates\\DMQ Automated Certificates') }}"
samplecertca_validate_certs: "{{ lookup('ansible.builtin.env', 'samplecertca_VALIDATE_CERTS', default='true') | bool }}"

# Certificate Key & CSR Configuration
cert_key_size: 4096
cert_key_type: "RSA"

cert_common_name_domain: >-
  {{
    lookup(
      'ansible.builtin.env',
      'NATIVEHA_CERT_COMMON_NAME_DOMAIN',
      default=custom_client_dns_domain | default('example.lab')
    )
  }}
cert_common_name: "{{ qmgr_name }}.{{ cert_common_name_domain }}"
cert_country_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_COUNTRY', default='US') }}"
cert_state_or_province: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_STATE', default='NY') }}"
cert_locality_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_LOCALITY', default='New York') }}"
cert_organization_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_ORGANIZATION', default='example.lab Lab') }}"
cert_organizational_unit: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_ORG_UNIT', default='IT') }}"

# Pre-Request Validation & Renewal Threshold
# Before requesting a new cert from samplecertca, the automation
# checks samplecertrepo and samplecertca for existing valid certs.
# If a cert exists and has MORE than this many days until
# expiry, it is SKIPPED (no new request).
# If it has FEWER days remaining, it is RENEWED.
cert_renewal_threshold_days: 30

# Certificate registry is SRE-facing operational metadata. Keep it enabled by
# default, but isolate it on the dedicated state-only branch below so registry
# updates do not create PR noise against app/GitOps branches. Set
# NATIVEHA_CERT_REGISTRY_ENABLED=false only for one-off lab runs that should not
# publish registry metadata.
cert_registry_enabled: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_REGISTRY_ENABLED', default='true') | bool }}"

# Monitor source default lives in cert_monitor/defaults/main.yaml.
# Do not duplicate it here; the role default is authoritative.

# OpenShift Secret backend settings.
cert_openshift_secret_type: "kubernetes.io/tls"

# samplecertca Polling Configuration
samplecertca_poll_retries: 30
samplecertca_poll_delay: 20

# samplecertca Revocation Settings (Offboard)
samplecertca_revoke_reason: 0
samplecertca_revoke_disable: true
samplecertca_revoke_comments: "Decommissioned via Ansible AAP NativeHA Offboard - {{ qmgr_name }}"

# samplecertrepo KV Configuration
# samplecertrepo auth - token for current testing, AppRole ready for the later service
# account / automation credential model.
samplecertrepo_cert_auth_method: >-
  {{
    samplecertrepo_auth_method
    | default(lookup('ansible.builtin.env', 'samplecertrepo_AUTH_METHOD', default='token'), true)
  }}
samplecertrepo_validate_certs: "{{ not (lookup('ansible.builtin.env', 'samplecertrepo_SKIP_VERIFY', default='false') | bool) }}"

# samplecertrepo KV token - accepts an explicit Ansible var or runtime env injection.
# Supported sources, in order:
# This keeps local CLI runs and AAP launches aligned even when the controller
# injects a variable instead of a literal samplecertrepo_TOKEN environment variable.
samplecertrepo_cert_token: >-
  {{
    samplecertrepo_token
    | default(hashi_samplecertrepo_token, true)
    | default(lookup('ansible.builtin.env', 'samplecertrepo_TOKEN', default=''), true)
    | default(lookup('ansible.builtin.env', 'samplecertrepo_token', default=''), true)
  }}
samplecertrepo_cert_role_id: >-
  {{
    samplecertrepo_role_id
    | default(lookup('ansible.builtin.env', 'samplecertrepo_ROLE_ID', default=''), true)
  }}
samplecertrepo_cert_secret_id: >-
  {{
    samplecertrepo_secret_id
    | default(lookup('ansible.builtin.env', 'samplecertrepo_SECRET_ID', default=''), true)
  }}

# Git Configuration (for Certificate Registry)
# The cert registry (cert_inventory.yaml) is optional metadata. It is committed
# only when NATIVEHA_CERT_REGISTRY_ENABLED=true.
# Certificate registry repository settings are kept here because the registry
# is owned by the certificate lifecycle, even though shared naming and samplecertrepo
# settings come from nativeha_qmgr_control_vars.yaml.
# Registry should live on a dedicated orphan state branch that contains only
# nativeha_state/cert_registry/cert_inventory.yaml. Keep this separate from
# main/master, AAP project branches, and GitOps promotion branches to avoid PR
# noise.
# Do not use CERT_GIT_BRANCH for registry state. That name is too generic and
# is often used by AAP/project setup to mean the playbook source branch.
# Use CERT_REGISTRY_GIT_BRANCH only when the state-only branch name must differ
# from the default below.
cert_git_base_url: >-
  {{
    lookup('ansible.builtin.env', 'CERT_GIT_BASE_URL', default='git@git.example.lab:example.lab/mq-native-ha-v1.git')
  }}
cert_registry_git_branch: >-
  {{
    lookup(
      'ansible.builtin.env',
      'CERT_REGISTRY_GIT_BRANCH',
      default=lookup('ansible.builtin.env', 'NATIVEHA_CERT_REGISTRY_BRANCH', default='state/cert-registry')
    )
  }}
# NOTE: cert_git_branch alias removed — use cert_registry_git_branch directly.
# The alias had zero consumers and created confusion with the registry branch.
cert_git_work_dir: "/tmp/mq-cert-registry"
cert_git_user_name: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_GIT_USER_NAME', default='MQ Cert Automation') }}"
cert_git_user_email: "{{ lookup('ansible.builtin.env', 'NATIVEHA_CERT_GIT_USER_EMAIL', default='mq-cert-automation@example.lab') }}"

# Certificate Registry
# Path (relative to repo root) to the auto-managed inventory file.
# Updated only when cert_registry_enabled=true; read by monitor for "all" scope.
cert_registry_path: "nativeha_state/cert_registry/cert_inventory.yaml"

# SMTP Alerting Configuration
# Enable SMTP alerts for certificate health issues. These defaults mirror the
# lab OpenShift Alertmanager Gmail relay, while keeping the password in
# runtime credential injection only.
smtp_enabled: "{{ notification_email_enabled | default(lookup('ansible.builtin.env', 'NATIVEHA_EMAIL_ENABLED', default='true') | bool) }}"
smtp_host: "{{ notification_email_host | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_HOST', default='smtp.example.lab')) }}"
smtp_port: "{{ notification_email_port | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_PORT', default='587') | int) }}"
smtp_secure: "{{ notification_email_secure | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_SECURE', default='starttls')) }}"
smtp_from: "{{ notification_email_from | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_FROM', default='example.lab.mail@example.lab')) }}"
smtp_username: "{{ notification_email_username | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_USERNAME', default='example.lab.mail@example.lab')) }}"
smtp_password: "{{ notification_email_password | default(lookup('ansible.builtin.env', 'NATIVEHA_SMTP_PASSWORD', default=''), true) }}"
smtp_to: "{{ notification_email_to | default([lookup('ansible.builtin.env', 'NATIVEHA_SMTP_TO', default='admin@example.lab')]) }}"
smtp_subject_prefix: "[MQ Certificate Alert]"
smtp_timeout: "{{ notification_email_timeout | default(20) }}"
smtp_no_log: true

# Alert thresholds - send alerts for these statuses
alert_on_statuses:
  - "expiring_soon"
  - "expired"
  - "missing"
  - "corrupt"
  - "revoked"
  - "desync"
