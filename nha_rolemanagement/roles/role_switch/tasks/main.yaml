---
# =============================================================
# CRR role switch role
# =============================================================
#
# Variable map for readers:
# - AAP survey provides mq_environment, qmgr_name, and new_live_region.
# - nativeha_qmgr_control_vars.yaml provides env_repo_map,
#   env_branch_map, env_qmgr_abbr, qmgr_env_subdir_map, regions,
#   git_work_dir, and git identity.
# - This role derives env_upper, qmgr_name_normalized,
#   requested_live_region, git_repo_url, target_branch,
#   qmgr_rel_path, _target_regions, _current_role_state,
#   role_switch_stage, and _desired_role_state.
# - Before calling target_repo_publish.yaml, this role sets the
#   target_repo_pr_* facts that describe the role switch for direct
#   commit mode and pull-request mode.
#
# Important behavior:
# - This role is only valid for QA2/PROD CRR queue managers.
# - It changes only regional role patch files.
# - Role switch is staged: first demote the current Live region,
#   then a later run promotes the requested new Live region.
# =============================================================

- name: "Role switch - Execute with guaranteed workspace cleanup"
  block:
    - name: "Pre-flight - Validate role switch inputs"
      ansible.builtin.assert:
        that:
          - mq_environment is defined and mq_environment | length > 0
          - qmgr_name is defined and qmgr_name | length > 0
          - new_live_region is defined and new_live_region | length > 0
        fail_msg: >-
          Required inputs: mq_environment, qmgr_name, new_live_region.

    - name: "Identity - Normalize input values"
      ansible.builtin.set_fact:
        # env_upper is the normalized map key for all global variables.
        env_upper: "{{ mq_environment | upper | trim }}"
        # qmgr_name_normalized is the lowercase folder name in the target repo.
        qmgr_name_normalized: "{{ qmgr_name | lower | trim }}"
        # requested live region is compared against keys in the regions map.
        new_live_region_input: "{{ new_live_region | lower | trim }}"

    - name: "Pre-flight - Validate environment is configured"
      ansible.builtin.assert:
        that:
          - env_upper in env_qmgr_abbr
          - env_upper in env_repo_map
          - env_upper in env_branch_map
        fail_msg: >-
          mq_environment={{ env_upper }} is not configured in
          nativeha_qmgr_control_vars.yaml.

    - name: "Pre-flight - Validate qmgr_name belongs to selected environment"
      ansible.builtin.assert:
        that:
          - qmgr_name_normalized is match('^[a-z0-9]{3}' ~ (env_qmgr_abbr[env_upper] | lower) ~ '[0-9]{3}$')
        fail_msg: >-
          qmgr_name={{ qmgr_name }} does not belong to mq_environment={{ env_upper }}.
          Expected pattern: <3-char-app>{{ env_qmgr_abbr[env_upper] | lower }}<3-digit-seq>.

    - name: "Pre-flight - Validate requested live region"
      ansible.builtin.assert:
        that:
          - new_live_region_input in regions
        fail_msg: >-
          new_live_region={{ new_live_region }} is not valid.
          Use one of: {{ regions.keys() | list }}.

    - name: "Identity - Derive target repo and paths"
      ansible.builtin.set_fact:
        # git_repo_url/target_branch come from environment maps in global vars.
        git_repo_url: "{{ env_repo_map[env_upper] }}"
        target_branch: "{{ env_branch_map[env_upper] }}"
        # Role switch is only for CRR layouts.
        instance_type: "nhacrr"
        requested_live_region: "{{ new_live_region_input }}"
        # qmgr_rel_path is the queue manager folder inside the target repo.
        qmgr_rel_path: >-
          {{
            ('queue_managers/' ~ qmgr_env_subdir_map[env_upper])
            if env_upper in (qmgr_env_subdir_map | default({}))
            else 'queue_managers'
          }}/{{ qmgr_name_normalized }}
        role_patch_json_path: "/spec/queueManager/availability/nativeHAGroups/local/role"

    - name: "Pre-flight - Ensure role switch is only used for CRR"
      ansible.builtin.assert:
        that:
          - env_upper in ['QA2', 'PROD']
        fail_msg: "Role switching only applies to QA2/PROD CRR queue managers."

    - name: "Identity - Compute target regions and expected patch paths"
      ansible.builtin.set_fact:
        # All configured regions participate in a CRR role switch.
        _target_regions: "{{ regions.keys() | list }}"
        # Used later to prove no files outside role patches changed.
        _expected_role_patch_paths: >-
          {% set paths = [] -%}
          {% for rname, rinfo in regions.items() -%}
          {{ paths.append(qmgr_rel_path ~ '/overlays/' ~ rname ~ '/' ~ rinfo.region_label ~ '-patch-role.yaml') or '' }}
          {%- endfor -%}
          {{ paths }}

    - name: "Git - Isolate working directory for this run"
      ansible.builtin.set_fact:
        # Preserve configured base path and then create a unique clone folder.
        git_work_dir_base: "{{ git_work_dir }}"
        git_work_dir: "{{ git_work_dir }}/role_switch_{{ qmgr_name_normalized }}_{{ now(utc=false, fmt='%Y%m%d%H%M%S') }}_{{ 1000000 | random }}"

    - name: "Git - Ensure work base exists"
      ansible.builtin.file:
        path: "{{ git_work_dir_base }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: "Git - Clone and configure target repo"
      ansible.builtin.include_tasks:
        file: "../../../../nativeha_templates/shared_tasks/git_clone_and_configure.yaml"

    - name: "Pre-flight - Check expected role patch files"
      ansible.builtin.stat:
        path: "{{ git_work_dir }}/{{ item }}"
      loop: "{{ _expected_role_patch_paths }}"
      register: _role_patch_stats

    - name: "Pre-flight - Collect missing role patches"
      ansible.builtin.set_fact:
        _missing_role_patches: "{{ _role_patch_stats.results | rejectattr('stat.exists') | map(attribute='item') | list }}"

    - name: "Pre-flight - Fail if role patches are missing"
      ansible.builtin.fail:
        msg: >-
          Missing role patch files for {{ qmgr_name_normalized }}:
          {{ _missing_role_patches }}. Role switching requires a CRR queue
          manager onboarded with the Base + Overlays layout.
      when: _missing_role_patches | length > 0

    - name: "State - Read current role patch files"
      ansible.builtin.slurp:
        src: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/{{ item.key }}/{{ item.value.region_label }}-patch-role.yaml"
      loop: "{{ regions | dict2items }}"
      register: _role_patch_contents

    - name: "State - Extract current role value per region"
      ansible.builtin.set_fact:
        _current_role_state: "{{ (_current_role_state | default({})) | combine({item.item.key: (_role_values | first | default(''))}) }}"
      vars:
        _patch_yaml: "{{ item.content | b64decode | from_yaml }}"
        _role_values: "{{ _patch_yaml | selectattr('path', 'equalto', role_patch_json_path) | map(attribute='value') | list }}"
      loop: "{{ _role_patch_contents.results }}"

    - name: "State - Classify current role state"
      ansible.builtin.set_fact:
        _invalid_role_regions: "{{ _current_role_state | dict2items | rejectattr('value', 'match', '^(Live|Recovery)$') | map(attribute='key') | list }}"
        _current_live_regions: "{{ _current_role_state | dict2items | selectattr('value', 'equalto', 'Live') | map(attribute='key') | list }}"

    - name: "Pre-flight - Validate current role state is safe"
      ansible.builtin.assert:
        that:
          - _invalid_role_regions | length == 0
          - _current_live_regions | length <= 1
        fail_msg: >-
          Unsafe role state for {{ qmgr_name_normalized }}. Current roles:
          {{ _current_role_state }}. Invalid role regions:
          {{ _invalid_role_regions }}. Live regions:
          {{ _current_live_regions }}.

    - name: "State - Infer role switch stage"
      ansible.builtin.set_fact:
        role_switch_stage: >-
          {% if _current_live_regions | length == 1 and _current_live_regions[0] == requested_live_region %}
          noop
          {% elif _current_live_regions | length == 1 %}
          stage1_demote
          {% elif _current_live_regions | length == 0 %}
          stage2_promote
          {% else %}
          invalid
          {% endif %}

    - name: "Pre-flight - Validate inferred stage"
      ansible.builtin.assert:
        that:
          - role_switch_stage | trim in ['noop', 'stage1_demote', 'stage2_promote']
        fail_msg: >-
          Could not infer a safe role switch stage for {{ qmgr_name_normalized }}.
          Current roles: {{ _current_role_state }}.

    - name: "State - Build desired role state"
      ansible.builtin.set_fact:
        _desired_role_state: "{{ (_desired_role_state | default({})) | combine({item: _desired_role | trim}) }}"
      vars:
        _stage: "{{ role_switch_stage | trim }}"
        _desired_role: >-
          {% if _stage == 'noop' %}
          {{ _current_role_state[item] }}
          {% elif _stage == 'stage2_promote' and item == requested_live_region %}
          Live
          {% else %}
          Recovery
          {% endif %}
      loop: "{{ _target_regions }}"

    - name: "Role switch - Display summary"
      ansible.builtin.debug:
        msg:
          - "Role switch plan"
          - "Queue Manager : {{ qmgr_name_normalized | upper }}"
          - "Environment   : {{ env_upper }}"
          - "Target Live   : {{ requested_live_region }} ({{ regions[requested_live_region].region_label }})"
          - "Current Roles : {{ _current_role_state }}"
          - "Stage         : {{ role_switch_stage | trim }}"
          - "Desired Roles : {{ _desired_role_state }}"

    - name: "Role switch - Update local role in each region patch"
      ansible.builtin.replace:
        path: "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/{{ item.key }}/{{ item.value.region_label }}-patch-role.yaml"
        regexp: '(^  path: /spec/queueManager/availability/nativeHAGroups/local/role\n  value: )(Live|Recovery)$'
        replace: '\g<1>{{ _desired_role_state[item.key] | trim }}'
      loop: "{{ regions | dict2items }}"
      when: role_switch_stage | trim != 'noop'

    - name: "Validation - Render each regional overlay with kubectl"
      ansible.builtin.command:
        argv:
          - kubectl
          - kustomize
          - "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/{{ item }}"
      loop: "{{ _target_regions }}"
      register: _render_results_kubectl
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "Validation - Render each regional overlay with kustomize fallback"
      ansible.builtin.command:
        argv:
          - kustomize
          - build
          - "{{ git_work_dir }}/{{ qmgr_rel_path }}/overlays/{{ item }}"
      loop: "{{ _target_regions }}"
      register: _render_results_kustomize
      changed_when: false
      failed_when: false
      when: >-
        _render_results_kubectl.results
        | selectattr('rc', 'ne', 0)
        | list
        | length > 0
      check_mode: false

    - name: "Validation - Select renderer results"
      ansible.builtin.set_fact:
        _render_results: >-
          {{
            _render_results_kubectl
            if (
              _render_results_kubectl.results
              | selectattr('rc', 'ne', 0)
              | list
              | length == 0
            )
            else _render_results_kustomize
          }}

    - name: "Validation - Fail when overlays cannot be rendered"
      ansible.builtin.assert:
        that:
          - _render_results.results | selectattr('rc', 'ne', 0) | list | length == 0
        fail_msg: >-
          Could not render regional overlays with kubectl kustomize or
          kustomize build. Install one renderer on the AAP execution node.

    - name: "Validation - Check rendered overlays"
      ansible.builtin.assert:
        that:
          - "'PLACEHOLDER_ROLE' not in item.stdout"
          - "'PLACEHOLDER_REGION' not in item.stdout"
          - "'PLACEHOLDER_REMOTE' not in item.stdout"
          - "'PLACEHOLDER_ADDRESS' not in item.stdout"
          - "('role: ' ~ (_desired_role_state[item.item] | trim)) in item.stdout"
        fail_msg: >-
          Render validation failed for region {{ item.item }}. Expected role
          {{ _desired_role_state[item.item] | trim }} and no PLACEHOLDER values.
      loop: "{{ _render_results.results }}"

    - name: "Git - Check pending changes"  # noqa command-instead-of-module
      ansible.builtin.command:
        cmd: git status --porcelain
      args:
        chdir: "{{ git_work_dir }}"
      register: _git_status
      changed_when: false
      check_mode: false

    - name: "Git - Classify pending change paths"
      ansible.builtin.set_fact:
        _git_changed_paths: "{{ _git_status.stdout_lines | map('regex_replace', '^..\\s+', '') | list }}"
        _git_unexpected_paths: "{{ (_git_status.stdout_lines | map('regex_replace', '^..\\s+', '') | list) | difference(_expected_role_patch_paths) }}"

    - name: "Git - Fail if unexpected files changed"
      ansible.builtin.assert:
        that:
          - _git_unexpected_paths | length == 0
        fail_msg: >-
          Role switch changed unexpected files: {{ _git_unexpected_paths }}.
          Expected only: {{ _expected_role_patch_paths }}.

    - name: "Git - Prepare target repo publish metadata"
      ansible.builtin.set_fact:
        target_repo_pr_action_slug: "role-switch"
        target_repo_pr_action_label: "Role Switch"
        target_repo_pr_repo_path: "{{ qmgr_rel_path }}"
        target_repo_pr_summary: >-
          Switch {{ qmgr_name_normalized | upper }} in {{ env_upper }} toward
          live region {{ requested_live_region }} using stage
          {{ role_switch_stage | trim }}.
        target_repo_pr_validation: >-
          Rendered all regional overlays and verified role values for regions
          {{ _target_regions | join(', ') }}. Confirmed only expected role
          patch files changed before adding CHANGELOG.md.

    - name: "Git - Publish target repo changes"
      ansible.builtin.include_tasks: "../../../../nativeha_templates/shared_tasks/target_repo_publish.yaml"

    - name: "Role switch - No changes required"
      ansible.builtin.debug:
        msg: "{{ qmgr_name_normalized | upper }} already has {{ requested_live_region }} as Live."
      when:
        - not ansible_check_mode
        - not target_repo_pr_result.changed | bool

    - name: "Role switch - Complete"
      ansible.builtin.debug:
        msg:
          - "Role switch complete"
          - "Queue Manager : {{ qmgr_name_normalized | upper }}"
          - "Environment   : {{ env_upper }}"
          - "Stage         : {{ role_switch_stage | trim }}"
          - "Target Live   : {{ requested_live_region }}"
          - "Base Branch   : {{ target_branch }}"
          - "Change Mode   : {{ target_repo_pr_result.mode | default(target_repo_change_mode | default('pull_request')) }}"
          - "Publish Branch: {{ target_repo_pr_result.branch | default('not created') }}"
          - "PR URL        : {{ target_repo_pr_result.pull_request_url | default('not created') }}"

  rescue:
    - name: "Rescue - Log role switch failure"
      ansible.builtin.debug:
        msg:
          - "Role switch failed"
          - "Queue Manager : {{ qmgr_name | default('not supplied') | upper }}"
          - "Environment   : {{ mq_environment | default('not supplied') | upper }}"

    - name: "Rescue - Re-raise role switch failure"
      ansible.builtin.fail:
        msg: "Role switch failed. Review the task output above."

  always:
    - name: "Always - Remove git working directory"
      ansible.builtin.file:
        path: "{{ git_work_dir }}"
        state: absent
      when:
        - git_work_dir is defined
        - git_work_dir_base is defined
        - git_work_dir != git_work_dir_base
      check_mode: false
